version: '3'
services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST}:${DB_PORT_CONTAINER}"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    networks:
      - network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile.vetbot
    depends_on:
      - postgres
    ports:
      - "${API_SERVICE_HOST_PORT}:${API_SERVICE_CONTAINER_PORT}"
    volumes:
      - ./logs:/app/logs
      - ./user_dialog_history:/app/user_dialog_history
      - ./database_data/dumps:/app/database_data/dumps
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DOCKER_CONTAINER=true
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_PORT_CONTAINER=${DB_PORT_CONTAINER}
      - DB_PORT_HOST=${DB_PORT_HOST}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - network
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    restart: always

  # VetRetro MCP Server - Provides veterinary knowledge base access
  mcp-server:
    build:
      context: .
      dockerfile: ./investigations/mcp-server/Dockerfile
    container_name: vetretro-mcp-http
    depends_on:
      - postgres
    ports:
      - "8765:8765"
    volumes:
      - ./investigations/mcp-server:/app
      - ./investigations/agent-workspace:/app/agent-workspace
    environment:
      - PYTHONPATH=/app:$PYTHONPATH
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT_CONTAINER}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - OPENAI_API_KEY=${VSEGPT_API_KEY}
      - OPENAI_API_BASE=${VSEGPT_BASE_URL}
      - LOG_LEVEL=INFO
    networks:
      - network
    restart: unless-stopped

  # VetRetro Web Backend - FastAPI + Langchain backend for veterinary investigations
  web-backend:
    build:
      context: .
      dockerfile: ./investigations/web-backend/Dockerfile
    container_name: vetretro-backend
    depends_on:
      - postgres
      - mcp-server
    ports:
      - "8001:8000"
    volumes:
      - ./investigations/web-backend:/app
      - ./investigations/agent-workspace:/agent-workspace
    environment:
      - PYTHONPATH=/app:$PYTHONPATH
      - LLM_API_KEY=${OPENROUTER_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://openrouter.ai/api/v1}
      # - LLM_API_KEY=${VSEGPT_API_KEY}
      # - LLM_API_BASE=${VSEGPT_BASE_URL:-https://api.vsegpt.ru/v1}
      # - LLM_MODEL=${LLM_MODEL:-minimax/minimax-m2}
      - API_KEY=${API_KEY}
      - VETRETRO_MCP_URL=http://mcp-server:8765
      - INVESTIGATIONS_PATH=/agent-workspace/investigations
      - AGENT_WORKSPACE_PATH=/agent-workspace
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT_CONTAINER}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=true
    networks:
      - network
    restart: unless-stopped

  webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - app
      - web-backend
    ports:
      - "0.0.0.0:3000:8080"
    environment:
      - 'OLLAMA_BASE_URL=http://app:8000/v1'
      - 'OLLAMA_API_BASE_URL=http://app:8000/v1'
      # - 'OPENAI_API_BASE=http://web-backend:8000/v1'
      # - 'OPENAI_API_KEY=${API_KEY}'
      # - 'OPENAI_API_BASE_2=http://web-backend:8000/v1'
      # - 'OPENAI_API_KEY_2=${API_KEY}'
      - 'ENABLE_MODEL_FILTER=True'
      - 'MODEL_FILTER_LIST=INLINE Vet-bot'
      - 'WEBUI_NAME=INLINE VetBot'
      - 'SESSION_TIMEOUT=604800'
    volumes:
      - webui_data:/app/backend/data
    networks:
      - network
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - network
    restart: always

volumes:
  postgres_volume:
  logs:
  user_dialog_history:
  webui_data:
  investigations_data:

networks:
  network:
    driver: bridge
  agropredict_network:
    external: true
    name: agropredict-network
 