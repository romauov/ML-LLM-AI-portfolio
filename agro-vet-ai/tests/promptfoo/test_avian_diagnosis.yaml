description: "Тестирование модуля диагностики болезней птиц"

evaluateOptions:
  maxConcurrency: 1
  delay: 2000

tracing:
  enabled: true

env:
  PROMPTFOO_REQUEST_TIMEOUT_MS: 120000
 

# Провайдер для тестируемой системы
providers:
  - id: file://scripts/vetBotProvider.js
    label: vetbot

# Промпт-шаблон (используется переменная query из vars)
prompts:
  - "{{query}}"

# DeepSeek JUDGE
#defaultTest:
# options:
#   provider:
#       id: "deepseek:deepseek-chat"
#       config:
#         temperature: 0.0

# LM Studio JUDGE
defaultTest:
  options:
    provider:
      id: https
      config:
        url: '{{env.PROMPTFOO_API_URL}}/chat/completions'
        method: POST
        headers:
          Content-Type: application/json
          Authorization: 'Bearer {{env.PROMPTFOO_API_KEY}}'
        body:
          model: '{{env.PROMPTFOO_LOCAL_MODEL}}'
          messages:
            - role: user
              content: '{{prompt}}'
          temperature: 0.0
          max_tokens: 1024
        transformResponse: file://scripts/transformResponse.js


tests:
  - description: "Инфекционный бронхит птиц (почечная форма)"
    vars:
      query: "Птицы толпятся у поилок, исхудали. Обнаружен быстрый падёж цыплят. Помёт белёсый."
      context: ""
    assert:
      # Context Faithfulness
      - type: context-faithfulness
        metric: "Контекст"
        contextTransform: 'typeof context === "string" ? context : JSON.stringify(context)'
        threshold: 0.8
        weight: 0.5

      # Вхождение
      - type: icontains-any
        metric: "Вхождение"
        value:
        - 'Инфекционный бронхит птиц'
        - 'Почечная форма'
        weight: 0.3

      # LLM Rubric
      - type: llm-rubric
        metric: "Качество"
        value: |
          Оцените качество ответа по следующим критериям:
          - Указан список предполагаемых диагнозов (количество диагнозов 3 - оценка "отлично", 2 - "удовлетворительно", 1 - "непримелимо")
          - Обоснование для каждого диагноза
          - Перечислена инеформация, которая необходима для точной постановки диагноза
          Поставьте оценку от 0 до 1, где 1 - отличный ответ.
        threshold: 0.7
        weight: 0.2


  - description: "Инфекционный бронхит птиц (респираторная форма)"
