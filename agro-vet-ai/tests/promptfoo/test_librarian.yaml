  - description: "Формирование витамина D3 у птиц"
    vars:
      query: "Посмотри в книгах: Где формируется Холекальциферол у птиц?"
      context: ""
      expected_answer: |
        Холекальциферол (витамин D3) у птиц формируется в коже под действием ультрафиолетового излучения. Этот процесс происходит в эпидермисе, где 7-дезоксихолестерол преобразуется в холекальциферол при воздействии солнечного света.
        • Формирование холекальциферола происходит в коже птиц под действием ультрафиолетового излучения.
        • Ключевым фактором является инсоляция (световое облучение), что подчеркивает важность доступа к естественному свету для синтеза витамина D3.

  - description: "Факторы развития заболеваний дыхательной и репродуктивной систем у птиц"
    vars:
      query: "посмотри в книгах: Какие общие и специфические факторы способствуют развитию заболеваний дыхательной и репродуктивной систем у птиц, и какие профилактические стратегии рекомендуются для минимизации рисков?"
      context: ""
      expected_answer: |
        Общие факторы, способствующие развитию заболеваний репродуктивной системы: 
        - высокая яичная продуктивность
        - зависимость от внешних неблагоприятных факторов
        - недостаточное содержание и кормление
        
        Специфические факторы:
        - Несовершенство технологии промышленного выращивания
        - Клеточное содержание (патология репродуктивных органов наблюдается в 2,5 раза чаще по сравнению с напольным)
        - Микотоксины в кормах — вызывают нарушение овогенеза, прекращение яйцекладки, истончение скорлупы
        
        Профилактические стратегии:
        - Строгое соблюдение правил содержания и кормления
        - Поддержание коэффициента однородности стада не ниже 85%
        - Оптимальная плотность посадки, фронт кормления и поения
        - Использование витаминов (витамин Е, аскорбиновая кислота), селенита натрия для повышения антиоксидантного статуса
        - Аэрозольная дезинфекция помещений при выделении больных птиц

  - description: "Методы лечения и диагностики дерматофитии"
    vars:
      query: "Посмотри в книгах: Какие методы диагностики и лечения рекомендуются при дерматофитии у домашней птицы?"
      context: ""
      expected_answer: |
        Методы диагностики при дерматофитии у домашней птицы:
        - Осмотр клинических проявлений: характерные серовато-белые коричневатые коросты на безоперных частях тела (клюв, гребешок, волосяной покров), напоминающие посыпанный мукой.
        - Микроскопическое исследование кожных соскобов: после обработки 10% раствором KOH, для выявления грибковых гиф.
        - Культуральное исследование: подтверждение возбудителя (Microsporum gallinae) путем посева на питательные среды.
        
        Методы лечения и профилактики:
        - Применение местных антимикотических мазей для отдельных птиц.
        - Изоляция пораженных особей для предотвращения распространения инфекции в стаде.
        
        Примечание: В книге не указывается эффективность системной терапии. Основная рекомендация — изоляция и уничтожение заражённых птиц при массовом поражении, особенно если лечение неэффективно.

  - description: ""
    vars:
      query: "посмотри в книгах: Как называется деформация скакательного сустава, вызываемая недостатком марганца у молодых кур, и какие её основные признаки?"
      context: ""
      expected_answer: |
        Деформация скакательного сустава, вызываемая недостатком марганца у молодых кур, называется перозис (perosis). 
        Основные признаки включают: 
        - отек и сплющивание суставов голеней
        - изгибание дистального конца большеберцовой кости и проксимального конца пяточной кости
        - вывих сухожилия икроножной мышцы из его бугорков
        - наблюдается укорочение ног, крыльев и позвоночника.

  - description: "Клинические формы стафилококковой инфекции у птиц"
    vars:
      query: "Посмотри в книгах: Основные клинические формы стафилококковой инфекции у птиц и какие факторы способствуют их развитию?"
      context: ""
      expected_answer: |
        Основные клинические формы стафилококковой инфекции у птиц включают:
        - Подкожные абсцессы («бумблфут»), чаще поражающие подошву и грудину, что приводит к хромоте, иногда с казеозным некрозом. Более характерно для тяжелых пород.
        - Артрит и теносиновит, преимущественно поражающий голеностопные суставы, вызывающие боль, хромоту и депрессию; синовиальные оболочки сухожильных влагалищ отекают и могут становиться казеозными.
        - Остеомиелит — распространение инфекции через кровь с локализацией в костях, приводящее к некрозу головки бедренной кости, а также поражению верхней части большеберцовой кости и позвонков. Является частой причиной хромоты у бройлеров и индеек.
        - Дерматит — влажные гангренозные участки кожи, чаще на спине или кончиках крыльев; S. aureus часто выделяется одновременно с клостридиями.
        
        Факторы, способствующие развитию инфекции:
        - Повреждение кожных покровов или слизистых оболочек.
        - Иммуносупрессия, включая инфекцию вирусами (например, вирус болезни Гамборо — IBD).
        - Условия содержания: плохая вентиляция, высокие уровни аммиака, высокая плотность посадки и стрессовые практики (например, обработка птицы для прививки или транспортировка).
        - Нарушения управления кормлением и биобезопасностью.
        - Условия в инкубаторах и на выращивающих предприятиях

  - description: "особенности клинического течения ВГПУ у уток и отличия от кур"
    vars:
      query: "Посмотри в книгах: Какие особенности клинического течения высокопатогенного птичьего гриппа (ВГПУ) у уток были выявлены в казусе и чем они отличаются от проявлений у кур?"
      context: ""
      expected_answer: |
        У уток при высокопатогенном птичьем гриппе (ВГПУ) клинические проявления могут быть минимальными или отсутствовать, несмотря на то что они являются эффективными переносчиками вируса. Некоторые линии домашних уток демонстрируют почти полную резистентность к клиническим эффектам ВГПУ, хотя способны к размножению и выделению вируса через дыхательные и кишечные пути.
        Утки могут быть носителями вируса без выраженных симптомов, что усложняет диагностику и контроль за распространением заболевания.
        В отличие от кур, у которых наблюдается резкое повышение смертности (до 100% за несколько дней), уток при ВГПУ часто не проявляют выраженных клинических признаков, что делает их "скрытыми" источниками инфекции.
        Утки могут быть более резистентны к клиническим эффектам из-за менее активной цитокиновой реакции по сравнению с курами, у которых наблюдается сильная воспалительная реакция.

  - description: "Защита попросят при вакцинации матери"
    vars:
      query: "Посмотри в книгах: Как вакцинация матери защищает поросят в первые дни жизни, и почему эта защита ослабевает у более старших поросят?"
      context: ""
      expected_answer: |
        Вакцинация свиноматок стимулирует выработку специфических IgG-антител, которые передаются поросятам через молозиво. 
        Эти антитела нейтрализуют патогенные штаммы E. coli в кишечнике новорожденных, предотвращая колонизацию и развитие диареи. 
        
        Однако защита носит временный характер:
        - У новорожденных (до 3–5 дней) IgG из молозива обеспечивает пассивный иммунитет.
        - У поросят старше 1 недели уровень IgG резко снижается, и защита зависит от лактогенных IgA-антител, вырабатываемых самими поросятами. Поэтому вакцинация матерей эффективна только для самых ранних этапов жизни поросят.


  - description: "периодический кашель, но нет признаков острой инфекции у свиней на земляном дворе"
    vars:
      query: "Посмотри в книгах: У свиней, содержащихся на земляном дворе с доступом к грязи, наблюдается периодический кашель, но нет признаков острой инфекции. Какие паразитарные причины нужно рассматривать, и как их дифференцировать от бактериальных инфекций?"
      context: ""
      expected_answer: |
        При содержании на земле или в условиях, где могут выживать дождевые черви, необходимо учитывать легочные нематоды — Metastrongylus spp. Их личинки мигрируют через лёгкие, вызывая хронический кашель, особенно у свиней на пастбищах или в небольших хозяйствах. Также возможны мигрирующие личинки Ascaris suum — они проходят через лёгкие на 2–3-й неделе жизни, вызывая кашель и временные нарушения дыхания.
        
        Для дифференциации:
        - Провести микроскопическое исследование кала на яйца гельминтов — для Metastrongylus и Ascaris;
        - Провести вскрытие у погибших или эвтаназированных животных — у Metastrongylus находят взрослых червей в бронхах, у Ascaris — личинки в лёгочной ткани;
        - ПЦР и культура — чтобы исключить бактериальные причины (M. hyopneumoniae, P. multocida)
        - Лечение: если паразиты подтверждены — эффективны левамизол, морантел или ивермектин.
        
        Важно: кашель от паразитов не сопровождается лихорадкой, внезапной смертью или кровотечением из носа — это ключевые отличия от бактериальных пневмоний.

  - description: "идентификация отстающих поросят"
    vars:
      query: "Посмотри в книгах: Какие признаки позволяют идентифицировать отстающих/больных поросят при ежедневном обходе станков?"
      context: ""
      expected_answer: |
        Согласно разделу 7 руководства, признаки отстающих поросят включают:
        - Жесткую шерсть или взъерошенный вид
        - Пустой на вид живот (при проверке следует поднять поросенка и пощупать его живот)
        - Угнетенное состояние или вялость, с наклоненной вниз или вбок головой
        - Неактивность, неспособность конкурировать с другими поросятами за корм и воду
        - Склонность собираться вместе или стоять поодиночке в стороне от других животных
        - Ректальную температуру выше 39°C
        - Часто этому состоянию предшествуют такие проблемы, как хромота, бактериальные или вирусные инфекции, анемия или низкая температура в станке

  - description: "Влияние микроклимата на здоровье свиней"
    vars:
      query: "Посмотри в книгах: Как микроклимат влияет на здоровье свиней и какие параметры считаются критически важными для профилактики заболеваний?"
      context: ""
      expected_answer: |
        Согласно разделу 4 руководства, правильный микроклимат критически важен для здоровья животных, так как он:
        - Стимулирует потребление корма
        - Позволяет животным избегать излишних энергозатрат на поддержание температуры тела
        - Снижает риск развития заболеваний
        
        Критически важные параметры микроклимата:
        - Температура воздуха (зависит от возраста и веса животных)
        - Влажность воздуха (не должна превышать 65%)
        - Скорость движения воздуха (2,0 м/с для минимальной вентиляции, 4,0 м/с для высоких режимов)
        - Концентрация газов: NH3 <20 мг/м3, CO2 <3 000 мг/м3, CO <30 мг/м3, H2S <5 мг/м3
        - Содержание пыли и микроорганизмов в воздухе
        - Скорость воздухообмена (зависит от веса животных и температуры)

  - description: "Диагностика респираторных заболеваний птиц"
    vars:
      query: "Посмотри в книгах: Почему при диагностике респираторных заболеваний птиц необходимо учитывать возможность смешанных инфекций, и как это влияет на выбор вакцин?"
      context: ""
      expected_answer: |
        При диагностике респираторных заболеваний необходимо учитывать возможность смешанных инфекций (например, вирус инфекционного бронхита в сочетании с Mycoplasma gallisepticum или бактериями Escherichia coli), потому что они взаимно усиливают патогенность друг друга. Исследования показывают, что инфекция вирусом инфекционного бронхита снижает местный иммунитет и повреждает эпителий дыхательных путей, создавая благоприятные условия для вторичных патогенов. Это влияет на выбор вакцин, поскольку вакцинация должна проводиться стратегически для создания иммунитета на разных уровнях защиты: вакцины против вирусных агентов должны использоваться до вакцин против бактериальных патогенов, а интервал между вакцинациями должен быть достаточным для формирования иммунного ответа без иммунодепрессии. Также важно учитывать антагонизм между определенными штаммами вакцинных вирусов при их одновременном применении.

  - description: "особенности применения живых и инактивированных вакцин против болезни Ньюкасла"
    vars:
      query: "Посмотри в книгах: Каковы особенности применения живых и инактивированных вакцин против болезни Ньюкасла, и какие факторы следует учитывать при составлении программы вакцинации?"
      context: ""
      expected_answer: |
        Живые вакцины против болезни Ньюкасла (обычно штаммы Hitchner B1, La Sota, Mukteswar) обеспечивают быстрый местный иммунитет на слизистых оболочках дыхательных путей, но могут вызывать поствакцинальные реакции и временно снижать яйценоскость у кур-несушек. Они применяются методом аэрозоля, в питьевую воду или закапыванием в глаз/ноздри. Инактивированные вакцины (на основе высоковирулентных штаммов) обеспечивают длительный гуморальный иммунитет, но требуют парентерального введения (внутримышечно или подкожно). При составлении программы вакцинации необходимо учитывать: возраст птицы, уровень материнских антител, наличие вирусов в окружающей среде, генотип циркулирующих штаммов, способ разведения птиц, а также возможную интерференцию с другими вакцинами. Оптимальный подход часто включает применение живой вакцины для первичной иммунизации с последующей бустерной иммунизацией инактивированной вакциной, что обеспечивает комплексную защиту.

  - description: "возбудители атрофического ринита свине"
    vars:
      query: "Посмотри в книгах: Какие возбудители вызывают различные формы атрофического ринита свиней и в чем их отличие по тяжести течения заболевания?"
      context: ""
      expected_answer: |
        Существует две формы атрофического ринита свиней, которые различаются по возбудителям и тяжести течения:

        - Тяжелая прогрессирующая форма вызывается токсинообразующими изолятами Pasteurella multocida (чаще всего с оболочкой типов D или A), по отдельности или в комбинации с Bordetella bronchiseptica. Эта форма характеризуется значительной атрофией носовой раковины, деформацией рыла и снижением продуктивности.
        - Менее тяжелая непрогрессирующая форма вызывается Bordetella bronchiseptica по отдельности и проявляется слабой или умеренной атрофией носовой раковины, часто без значительной деформации рыла. Эта форма не прогрессирует со временем.

  - description: "методы для выявления токсинообразующих штаммов Pasteurella multocida при диагностике атрофического ринита"
    vars:
      query: "Посмотри в книгах: Какие методы используются для выявления токсинообразующих штаммов Pasteurella multocida при диагностике прогрессирующего атрофического ринита, и какой из них является наиболее эффективным?"
      context: ""
      expected_answer: |
        Для выявления токсинообразующих штаммов P. multocida используются следующие методы:

        - Цитопатический тест на культурах клеток (клетки легких эмбриона КРС, клетки Vero или клетки носовой раковины КРС), где оценивается цитопатическое действие фильтрата бактериальной культуры.
        - Быстрый тест на культуре клеток с агаровой аппликацией.
        - Твердофазный иммуноферментный анализ (ИФА) с использованием моноклональных антител, который позволяет выявить токсин в смеси бактерий из первичной среды для выделения.
        - Молекулярные методы, такие как ПЦР и ДНК-зонды.
        
        Наиболее эффективным методом является коммерческий твердофазный ИФА, так как он обладает высокой специфичностью и чувствительностью, позволяет обнаруживать токсин непосредственно в первичных культурах без необходимости выделения отдельных колоний P. multocida, что особенно важно при смешанной колонизации токсинообразующими и нетоксинообразующими штаммами.

  - description: "Период рисков развития железодефицитной анемии у поросят"
    vars:
      query: "Посмотри в книгах: В какой период жизни поросята наиболее подвержены развитию железодефицитной анемии и почему?"
      context: ""
      expected_answer: |
        Поросята наиболее подвержены развитию железодефицитной анемии в возрасте 2-3 недель. Это связано с несколькими факторами: в материнском молоке содержится всего около 1 мг железа при суточной потребности поросенка в 7-10 мг; у поросят этого возраста наблюдается ослабление общего физиологического состояния организма и резистентности, что характеризуется понижением в крови уровня гамма-глобулиновой фракции; происходит затухание эритропоэза в селезенке и печени при еще недостаточной перестройке кроветворной способности костного мозга. Кроме того, в этот период у поросят прорезаются коренные зубы, что сопровождается сильным зудом десен и беспокойством, а бактерицидность материнского молока резко снижается.

  - description: "Железосодержащие препараты для профилактики анемии"
    vars:
      query: "Посмотри в книгах: Какие железосодержащие препараты наиболее эффективны для профилактики анемии у поросят и как их применяют?"
      context: ""
      expected_answer: |
        Наиболее эффективными для профилактики анемии у поросят являются ферродекстрановые препараты, такие как ферроглюкин, гликоферон, фербитол, импозил, миофер. Эти препараты содержат трехвалентное железо в коллоидном состоянии в соединении с углеводами. Преимущество этих препаратов состоит в том, что одна внутримышечная инъекция в дозе 2-3 мл (150 мг железа) в 2-3-дневном возрасте обычно достаточно для профилактики анемии. Ферродекстрановые препараты вводят внутримышечно в мышцы бедра или верхней трети шеи. В холодное время года препараты подогревают в водяной бане до 37-38°C перед применением. Также эффективен сукцинат железа(II) дигидрат, который можно применять как поросятам, так и свиноматкам.

  - description: "Патоморфологические изменения характерны для стрептококкоза у свиней в группе доращивания"
    vars:
      query: "Посмотри в книгах: Какие патоморфологические изменения характерны для стрептококкоза у свиней в группе доращивания и как они отличаются от изменений у свиней в группе откорма?"
      context: ""
      expected_answer: |
        У свиней в группе доращивания стрептококкоз преимущественно проявляется в суставной форме в виде серозно-фибринозного, фибринозного и гнойного артрита, часто осложненного остеомиелитом и абсцессами в окружающих тканях. В меньшей степени поражаются дыхательная и сердечно-сосудистая системы. У свиней в группе откорма основными проявлениями являются поражения сердца: серозный и серозно-фибринозный перикардиты, миокардит и бородавчатый эндокардит, часто обнаруживаемые в сочетании. Бородавчатый эндокардит локализуется на двухстворчатом или трехстворчатом клапанах и приводит к эмболическим инфарктам в почках и тромбам в легочной артерии.

  - description: "дифференциальная диагностика стрептококкоза свиней"
    vars:
      query: "Посмотри в книгах: Какие заболевания необходимо исключить при дифференциальной диагностике стрептококкоза свиней с поражением нервной системы?"
      context: ""
      expected_answer: |
        При обнаружении нервных явлений (атаксия, нарушение координации, парез, тремор) необходимо дифференцировать стрептококковый менингит от: бешенства, болезни Ауески, колибактериоза, листериоза, столбняка, отравления поваренной солью, а также менингоэнцефалита, вызванного Haemophilus parasuis или возникшего на фоне отита или травмы. Микроскопически стрептококковый менингит характеризуется нейтрофильной инфильтрацией, в то время как при болезни Ауески преобладает мононуклеарная инфильтрация. Для точной дифференциации рекомендуется использовать лабораторные методы (бактериологический/вирусологический и ПЦР).

  - description: "типичные патологоанатомические изменения лавсониоза свиней"
    vars:
      query: "Посмотри в книгах: Какие типичные патологоанатомические изменения характерны для лавсониоза свиней?"
      context: ""
      expected_answer: |
        Для лавсониоза свиней типичны пролиферативные изменения подвздошной, слепой и начальной части ободочной кишок. Находят диффузное утолщение слизистой оболочки с образованием поперечных складок и валикообразных утолщений. Нередко на поверхности слизистой оболочки видны мелкие очаги некроза или тонкие пленки фибрина. В толстой кишке утолщенная слизистая оболочка образует полипоподобные выпячивания с эрозиями и наложениями фибрина. Важным диагностическим признаком является складчатость со стороны серозной оболочки. Также характерен некротический энтерит с наложениями фибрина и очагами казеозного некроза, а также регионарный илеит с утолщением стенки кишки и сужением просвета.

  - description: "дифференциальная диагностика микотоксикоза и гиповитаминоза Е-гипоселеноза"
    vars:
      query: "Посмотри в книгах: Как проводится дифференциальная диагностика микотоксикоза и гиповитаминоза Е-гипоселеноза у свиней?"
      context: ""
      expected_answer: |
        Дифференциальную диагностику микотоксикоза и гиповитаминоза Е-гипоселеноза проводят с учетом особенностей патологоанатомических изменений и анамнестических данных. При микотоксикозе, помимо типичных изменений (токсическая дистрофия печени, зернистая дистрофия и некроз миокарда), всегда находят признаки воспаления желудка (катаральный, геморрагический, эрозивный гастрит). При гиповитаминозе Е-гипоселенозе воспаление желудка отсутствует, но характерны центральные изменения в миокарде (ценкеровский некроз) и поражение печени. Окончательный диагноз устанавливают с учетом результатов микологического исследования кормов, а также гистологического исследования тканей, где при микотоксикозе выявляют обширные участки зернистой дистрофии и ценкеровского некроза миокардиоцитов.

  - description: "признаки проблемы с кормлением поросят"
    vars:
      query: "Посмотри в книгах: Какие признаки указывают на то, что свиноматка испытывает проблемы с кормлением поросят, и какие ветеринарные меры необходимо предпринять в этом случае?"
      context: ""
      expected_answer: |
        Свиноматка может испытывать проблемы с кормлением поросят, если она лежит на брюхе, отказывается кормить поросят, проявляет беспокойство, имеет пониженный аппетит или у нее наблюдается очень твердый кал. Это часто указывает на болевой синдром, связанный с воспалением кишечного тракта. Причиной может быть быстрый рост рациона после опороса, что приводит к нарушению микрофлоры и развитию патогенных бактерий, выделяющих эндотоксины. Ветеринарные меры включают введение противовоспалительных препаратов парентеральным путем (что снижает температуру тела и тормозит аутоиммунную реакцию на эндотоксины), улучшение аппетита. При слишком твердом кале применяют слабительные препараты. Также рекомендуется постепенно увеличивать суточный рацион: после опороса его следует стабилизировать на уровне 2-3 кг с ежедневным прибавлением по 0,5 кг, делая прорыв на 5-6 день до максимального объема корма.

  - description: "Влияние теплового стресса на репродуктивную функцию свиноматок"
    vars:
      query: "Посмотри в книгах: Как тепловой стресс влияет на репродуктивную функцию свиноматок и какие меры рекомендуется предпринимать для его предотвращения?"
      context: ""
      expected_answer: |
        Тепловой стресс негативно влияет на репродуктивную функцию свиноматок: они проявляют пониженную активность, у них сокращается период половой охоты, что затрудняет определение оптимального времени для осеменения. В некоторых случаях возможны аборты и замирание беременности. Для предотвращения теплового стресса рекомендуется: не проводить кормление в самое жаркое время суток (так как переваривание корма повышает температуру тела), закрыть окна на солнечной стороне жалюзи или покрасить их белой известью/латексной краской, обеспечить хорошую вентиляцию в помещении, избегать проведения вакцинации в жаркое время, регулярно контролировать температуру воздуха на площадках осеменения и опороса, а также предотвращать резкие температурные перепады, особенно в осенний сезон.

  - description: "Влияние хронического стресса на здоровье и рост свиней"
    vars:
      query: "посмотри в книгах: Как хронический стресс влияет на здоровье и рост свиней, и какие основные факторы могут вызывать стрессовую реакцию у животных на откорме?"
      context: ""
      expected_answer: |
        Хронический стресс негативно влияет на здоровье и продуктивность свиней несколькими способами. Во-первых, он нарушает обмен веществ в организме животного и замедляет процессы роста. Во-вторых, стресс ослабляет иммунную систему, что делает свиней более восприимчивыми к инфекционным заболеваниям. В-третьих, организм перераспределяет энергетические ресурсы на борьбу со стрессом вместо роста и развития, что приводит к сокращению мышечной массы. Основные факторы, вызывающие стресс у свиней: сквозняки, недостаточная или избыточная температура в помещении, перегруппировка с незнакомыми животными, высокая плотность посадки, шум, яркий свет, болезни, недостаток воды или корма, а также нарушение социальной иерархии в группе. Свиньи являются очень чувствительными к изменениям в окружающей среде и могут остро реагировать даже на незначительные изменения условий содержания.

  - description: "заболевания дыхательных путей у свиней влияющие на рост"
    vars:
      query: "Посмотри в книгах: Какие заболевания дыхательных путей у свиней могут наиболее сильно повлиять на их рост и конверсию корма, и какие экономические последствия это имеет для свиноводческого предприятия?"
      context: ""
      expected_answer: |
        Наиболее серьезное влияние на рост и конверсию корма оказывают такие заболевания дыхательных путей как PRRS (синдром респираторных и репродуктивных нарушений), острый и хронический формы микоплазмоза, а также атрофический ринит. При PRRS наблюдается общая симптоматика (стресс подает на манок), при микоплазмозе - сухой кашель, при атрофическом рините - чихание, носовое кровотечение. Экономический ущерб от этих заболеваний оценивается как +/++ (значительный), что связано с замедлением роста, увеличением затрат на лечение, снижением конверсии корма и возможной гибелью поголовья. Для оптимального роста свиней необходимо поддерживать правильную вентиляцию, избегать сквозняков и поддерживать оптимальные температурные параметры в свинарниках.

  - description: "основные этапы клинического осмотра свиней"
    vars:
      query: "Посмотри в книгах: Какие основные этапы включает пошаговая инструкция клинического осмотра свиней?"
      context: ""
      expected_answer: |
        Пошаговая инструкция клинического осмотра включает следующие этапы:

        - Сбор истории (описание образа жизни животного, кормления, ухода, типа содержания)
        - Общее впечатление (наблюдение за свиньей и другими членами стада на основе основных принципов свиноводства)
        - Общий осмотр по основным пунктам: потребление пищи и работа кишечника, дыхание, температура, состояние кожи-шерсти-копыт, сосков и вульвы, слизистых оболочек, положение тела и движения, наличие отклонений
        - Дальнейший осмотр (лабораторные исследования, вскрытие животных или материала от убоя, оценка климата)
        
        После этого необходимо проанализировать результаты, убедиться в правильности диагноза и подхода, а также провести дополнительные исследования при необходимости.

  - description: "внутримышечнная инъекция свиньям разного возраста"
    vars:
      query: "посмотри в книгах: Где правильно делать внутримышечные инъекции свиньям разного возраста и почему важно соблюдать технику введения?"
      context: ""
      expected_answer: |
        Внутримышечные инъекции необходимо делать в определенные места в зависимости от возраста свиньи:
        
        - Поросятам: инъекцию делают в мышечную ткань впереди лопатки над шейным позвонком
        - Взрослым свиньям: инъекцию делают спереди лопатки над шейным позвонком, в мышцы шеи
        
        Важно соблюдать технику введения, потому что при неправильном введении игла может задеть кости, кровеносные сосуды, сухожилия и нервы. Кроме того, через иглу или раствор легко передаются болезнетворные микроорганизмы. Необходимо использовать только новые иглы соответствующей длины и диаметра, обездвижить животное во время процедуры, помечать обработанных свиней и регулярно менять съемные иглы для предотвращения инфицирования.

  - description: "Оптимальная температура воздуха в зоне головы поросят"
    vars:
      query: "посмотри в книгах: Какая температура воздуха считается оптимальной в зоне головы поросят при использовании пластиковых перекрытий в свинарниках, и почему это важно для их здоровья?"
      context: ""
      expected_answer: |
        При использовании пластиковых перекрытий в свинарниках в зоне головы поросят создается микроклимат с температурой около 30°C. Это очень важно, так как поросята особенно чувствительны к температуре, и наличие эффективно функционирующей отопительной системы является крайне важным для их здоровья и продуктивности. Поддержание оптимальной температуры в зоне головы животных помогает предотвратить заболевания и обеспечивает комфортные условия для роста и развития.


  - description: "Проблемы жидкого кормления свиней"
    vars:
      query: "Посмотри в книгах: Какие ветеринарные проблемы могут возникнуть при использовании жидкого кормления свиней, и какие меры профилактики рекомендуются в тексте?"
      context: ""
      expected_answer: |
        При использовании жидкого кормления особое внимание следует уделять микотоксинам в корме, так как при наличии различных токсинов свиноматки резко реагируют снижением продуктивности. Также существует риск порчи остатков корма в трубопроводах между кормлениями, что может привести к проблемам со здоровьем животных. Для профилактики рекомендуется использовать систему так называемого "безостаточного" кормления, при которой остатки корма после раздачи выталкиваются из кормопровода с помощью воды или сжатого воздуха, применять более короткие трубопроводы с уменьшенным поперечным сечением, а также регулярно проводить очистку и дезинфекцию кормопроводов с использованием специальных щеток и кислотных моющих средств.
