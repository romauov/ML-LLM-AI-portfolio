description: "Тестирование библиотекаря"

evaluateOptions:
  maxConcurrency: 1
  delay: 2000

tracing:
  enabled: true

env:
  PROMPTFOO_REQUEST_TIMEOUT_MS: 120000

# Провайдер для тестируемой системы
providers:
  - id: file://scripts/vetBotProvider.js

prompts:
  - "{{query}}"

defaultTest:
  threshold: 0.75

  assert:
    - type: context-faithfulness
      metric: "Контекст"
      provider: file://tests/promptfoo/providers/deepseekProvider.yaml
      threshold: 0.5
      weight: 0.3
      contextTransform: 'typeof context === "string" ? context : JSON.stringify(context)'

    - type: llm-rubric
      metric: "Качество"
      provider: file://tests/promptfoo/providers/deepseekProvider.yaml
      threshold: 0.5
      weight: 0.2
      value: |
        Вопрос пользователя: {{query}}
        Оцените качество ответа по следующим критериям:
        - Ответ дан на все вопросы
        - Ответ не содержит лишней информации, например приветствие, конструкции по типу "чем я могу помочь?", "Готов ответить на любые вопросы" и т.д.
        - В ответе указан хотябы один источник из списка (название книги или источника, название главы, страницы, название таблицы и др.)
        Поставьте оценку от 0 до 1 по каждому критерию, где 1 - отличный ответ.
        Итоговая оценка = среднее арифметическое трёх критериев

    - type: similar
      metric: "embedding"
      provider: file://tests/promptfoo/providers/embeddingProvider.yaml
      weight: 0.5
      threshold: 0.75
      value: "{{expected_answer}}"

tests:
  - description: "Механизмы антибиотикорезистентности"
    vars:
      query: "посмотри в книгах: Какие четыре основные категории механизмов антибиотикорезистентности?"
      context: ""
      expected_answer: |
        Четыре основные категории механизмов антибиотикорезистентности следующие:
        
        Снижение проницаемости клеточной оболочки — препятствует проникновению антимикробного агента внутрь бактериальной клетки (например, за счёт уменьшения экспрессии поринов у грамотрицательных бактерий).
        Активный вывод (эффлюкс) — экспульсия антимикробного препарата из клетки с помощью специфических или общих насосов выведения (например, TetA-насос для тетрациклинов у Enterobacteriaceae).
        Инактивация антимикробного агента — модификация или разрушение антибиотика бактериальными ферментами до или после его проникновения в клетку (например, гидролиз β-лактамного кольца под действием β-лактамаз).
        Модификация или защита мишени действия антибиотика — изменение структуры целевой молекулы (например, метилирование рибосомы при устойчивости к макролидам) или активация альтернативных метаболических путей, делающих мишень невосприимчивой к действию препарата.               

  - description: "Приобретенная резистентность"
    vars:
      query: "посмотри в книгах: Как проявляется приобретённая резистентность? Может ли один ген обеспечивать устойчивость к нескольким классам антибиотиков?"
      context: ""
      expected_answer: |
        Приобретённая резистентность проявляется как изменение минимальной ингибирующей концентрации (МИК) антибиотика, необходимой для подавления роста микроорганизма. В большинстве случаев это изменение выражается в виде дискретных скачков МИК, что приводит к бимодальному или полимодальному распределению значений — отчётливому разделению на чувствительные и резистентные подпопуляции. Такое распределение указывает на наличие устойчивых штаммов, возникших в результате генетических изменений: либо мутаций в хромосомных генах (например, в генах топоизомераз при устойчивости к фторхинолонам), либо приобретения чужеродных генов через горизонтальный перенос (конъюгация, трансдукция, трансформация). В отдельных случаях, таких как фторхинолоновая резистентность, накопление нескольких мутаций приводит к постепенному повышению МИК и формированию непрерывного, плавного распределения.
        
        Да, один ген может обеспечивать устойчивость к нескольким классам антибиотиков. Такое явление называется перекрёстной резистентностью. Примеры включают:
        
        Cfr — рибосомальную метилтрансферазу, которая модифицирует мишень действия антибиотиков на 23S рРНК и обеспечивает устойчивость к макролидам, линкозамидам, стрептограминам и другим препаратам, связывающимся с 50S субъединицей рибосомы;
        Aac(6')-Ib-cr — модифицированную ацетилтрансферазу аминогликозидов, которая также ацетилирует и инактивирует определённые фторхинолоны;
        активацию мультидраговых систем выведения, таких как AcrAB-TolC, способных экспортировать антибиотики различных классов (включая β-лактамы, тетрациклины, фторхинолоны и др.).
        Кроме того, широкая множественная резистентность часто обусловлена одновременным приобретением нескольких генов устойчивости, локализованных на одном мобильном генетическом элементе (например, плазмиде или интегроне), что способствует быстрому распространению полирезистентных штаммов.

  - description: "Вражденная устойчивость к макролидам"
    vars:
      query: "посмотри в книгах: Почему грамотрицательные бактерии обладают врожденной устойчивостью к макролидам?"
      context: ""
      expected_answer: |
        Грамотрицательные бактерии обладают врождённой (интринсической) устойчивостью к макролидам в первую очередь из-за структурных особенностей их клеточной оболочки. Наружная мембрана грамотрицательных бактерий содержит липополисахариды и порины, которые создают эффективный барьер для проникновения крупных и полярных молекул, таких как макролиды. Эти антибиотики плохо диффундируют через липофильную наружную мембрану и не проходят эффективно через пориновые каналы, что препятствует достижению ими внутриклеточной мишени — 50S субъединицы рибосомы.

        В отличие от грамположительных бактерий, у которых устойчивость к макролидам часто обусловлена приобретёнными механизмами (например, метилированием рРНК с участием erm-генов или активным выведением антибиотика), у грамотрицательных бактерий основной причиной резистентности является именно физиологический барьер, а не наличие специфических генов устойчивости.
        
        Эта врождённая устойчивость характерна для большинства грамотрицательных микроорганизмов, включая представителей семейства Enterobacteriaceae, Pseudomonas spp. и Campylobacter spp., что подтверждается данными по интринсической резистентности.

  - description: "Ген устойчивости Staphylococcus aureus к оксациллину и метициллину"
    vars:
      query: "посмотри в книгах: Какой ген отвечает за устойчивость Staphylococcus aureus к оксациллину и метициллину, и к какой категории механизмов это относится?"
      context: ""
      expected_answer: |
        Ген, отвечающий за устойчивость Staphylococcus aureus к оксациллину и метициллину, — mecA. Этот ген кодирует аномальный пенициллин-связывающий белок — PBP2a (также обозначаемый как PBP2′), который обладает низким сродством к бета-лактамным антибиотикам. Благодаря этому бактерия сохраняет способность синтезировать клеточную стенку даже в присутствии оксациллина, метициллина и других бета-лактамов.

        Данный механизм относится к категории изменения целевых белков — конкретно, к модификации пенициллин-связывающих белков (PBPs), что является одним из ключевых путей приобретённой устойчивости к бета-лактамным антибиотикам. Такой тип резистентности характерен для метициллин-устойчивого Staphylococcus aureus (MRSA).

  - description: "Отличие структуры цефалоспоринов от пеницилинов"
    vars:
      query: "посмотри в книгах: Чем структура цефалоспоринов принципиально отличается от пенициллинов, и как это влияет на их устойчивость к бета-лактамазам?"
      context: ""
      expected_answer: |
        Структура цефалоспоринов принципиально отличается от пенициллинов тем, что бета-лактамное кольцо у цефалоспоринов соединено с шестичленным дигидротиазиновым (диатиазиновым) кольцом, тогда как у пенициллинов оно связано с пятичленным тиазолидиновым кольцом. Эта особенность строения делает цефалоспориновое ядро врождённо более устойчивым к гидролизу бета-лактамазами по сравнению с пенициллиновым ядром.

        Дополнительно, молекула 7-аминоцефалоспораниевой кислоты предоставляет больше возможностей для химической модификации при создании полусинтетических препаратов. Заместители в положении 7 (R1) в значительной степени определяют устойчивость к бета-лактамазам и спектр антимикробной активности, тогда как заместители в положении 3 (R2) преимущественно влияют на метаболическую стабильность и фармакокинетические свойства.

        Благодаря этой структурной устойчивости, многие цефалоспорины сохраняют активность против бактерий, продуцирующих плазмидные бета-лактамазы широкого распространения, такие как TEM-1 и SHV-1, в отличие от большинства пенициллинов. Однако эффективность цефалоспоринов может снижаться под действием более современных ферментов — в частности, бета-лактамаз расширенного спектра (ESBL, например CTX-M, SHV) и хромосомных или плазмидных AmpC-цефалоспориназ (например, CMY-2), что ограничивает их применение при инфекциях, вызванных устойчивыми штаммами.

  - description: "Преимущества цефалоспоринов четвёртого поколения"
    vars:
      query: "посмотри в книгах: Какие ключевые преимущества цефалоспоринов четвёртого поколения по сравнению с предыдущими поколениями?"
      context: ""
      expected_answer: |
        Цефалоспорины четвёртого поколения (например, цефепим, цефпиром, цефквином) обладают рядом ключевых преимуществ по сравнению с предыдущими поколениями:
        
        Расширенный спектр активности: они эффективны как против грамположительных (включая стафилококки), так и против грамотрицательных бактерий (включая Enterobacteriaceae, Pseudomonas aeruginosa, Pasteurella spp., Haemophilus spp. и Actinobacillus spp.).
        Повышенная устойчивость к β-лактамазам: устойчивы к гидролизу многими плазмидными и хромосомными β-лактамазами, в том числе продуцируемыми резистентными штаммами, что обеспечивает эффективность при инфекциях, вызванных β-лактамазопродуцирующими патогенами.
        Слабая индукция β-лактамаз типа 1: снижает риск селекции устойчивых штаммов.
        Улучшенная проницаемость через бактериальные мембраны, что способствует более высокой бактерицидной активности.
        В отличие от предыдущих поколений, у которых часто наблюдался компромисс между активностью против грамположительных и грамотрицательных микроорганизмов, препараты четвёртого поколения сочетают высокую эффективность в отношении обоих типов патогенов.
        Эти свойства делают цефалоспорины четвёртого поколения особенно ценными при лечении тяжёлых и потенциально угрожающих жизни инфекций, вызванных как чувствительными, так и резистентными к предыдущим поколениям антибиотиков бактериями.

  - description: "Основные механизмы устойчивости к цефалоспоринам"
    vars:
      query: "посмотри в книгах: Какие три основных механизма устойчивости к цефалоспоринам, и какой из них считается наиболее значимым?"
      context: ""
      expected_answer: |
        Три основных механизма устойчивости к цефалоспоринам включают:

        модификацию пенициллинсвязывающих белков (ПСБ), которые являются мишенями действия антибиотиков;
        снижение проницаемости клеточной мембраны и/или усиление выведения препарата из клетки;
        ферментативную инактивацию цефалоспоринов посредством бета-лактамаз.
        Наиболее значимым из этих механизмов считается продукция бета-лактамаз, поскольку известно более 1000 различных типов таких ферментов, а гены, кодирующие их, часто локализованы на мобильных генетических элементах и легко передаются между бактериями, что способствует быстрому распространению устойчивости, особенно под давлением широкого применения цефалоспоринов расширенного спектра.

  - description: "целевые патогены для доксициклина при применении ни свиньях"
    vars:
      query: "посмотри в книгах: Какие патогены указаны как целевые для доксициклина при применении ни свиньях?"
      context: ""
      expected_answer: |
        Целевыми патогенами для доксициклина при применении у свиней являются:

        Mycoplasma hyopneumoniae
        Haemophilus parasuis
        Lawsonia intracellularis
        Escherichia coli (в том числе резистентные штаммы, обозначаемые как R*)
        Salmonella spp. (в том числе резистентные штаммы, обозначаемые как R*)
        Actinobacillus pleuropneumoniae
        Porphyromonas levii
        Brachyspira spp.
        Доксициклин применяется как для профилактики, так и для терапии инфекций, вызванных указанными микроорганизмами.

  - description: "Антибиотик показывающий 0% устойчивости у кишечных изолятов E. coli при применении на свиньях"
    vars:
      query: "посмотри в книгах: Какой антибиотик показывает 0% устойчивости у кишечных изолятов E. coli при применении на свиньях?"
      context: ""
      expected_answer: |
        Антибиотики, демонстрирующие 0% устойчивости у кишечных (энтеральных) изолятов Escherichia coli, включают:

        Амоксициллин + клавулановая кислота
        Апрамицин
        Колистин
    assert:
      - type: assert-set
        threshold: 0.5
        weight: 0.3
        metric: "Вхождение"
        assert:
          - type: icontains-any
            value:
              - 'Апрамицин'
              - 'apramycin'
          - type: icontains-any
            value:
              - 'Колистин'
              - 'Colistin'
          - type: icontains-any
            value:
              - 'Амоксициллин + клавулановая кислота'
              - 'amoxicillin + clavulanic acid'

  - description: "дозировка окситетрациклина при применении на свиньях"
    vars:
      query: "посмотри в книгах: Какая дозировка окситетрациклина указана для применения через инъекции при применении на свиньях?"
      context: ""
      expected_answer: |
        Для свиней рекомендуемая дозировка окситетрациклина при инъекционном (внутримышечном) применении составляет 10–20 мг/кг массы тела с интервалом 12–24 часа. Для препаратов с пролонгированным (длительным) действием (long-acting, LA) доза составляет 20 мг/кг, вводимая однократно с интервалом 48 часов.

  - description: "Бройлеры, признаки в кишечнике для отличия аденовирусной лимфоидной инфильтрации от кокцидиоза"
    vars:
      query: "посмотри в книгах: В условиях выращивания бройлеров, какие макроскопические признаки в кишечнике позволяют быстро отличить аденовирусную лимфоидную инфильтрацию от кокцидиоза (Eimeria acervulina)?"
      context: ""
      expected_answer: |
        В условиях выращивания бройлеров ключевым макроскопическим признаком, позволяющим быстро отличить аденовирусную лимфоидную инфильтрацию от кокцидиоза, вызванного Eimeria acervulina, является характер поражения кишечной стенки.

        При аденовирусной лимфоидной инфильтрации наблюдается выраженная гиперплазия и увеличение лимфоидных бляшек (GALT), преимущественно в тонком кишечнике, без признаков некроза, эрозий, кровоизлияний или повреждения эпителия. Изменения носят исключительно лимфопролиферативный характер.
        
        В отличие от этого, при кокцидиозе, вызванном Eimeria acervulina, поражаются преимущественно верхние отделы тонкого кишечника (двенадцатиперстная и начальная часть тощей кишки), где выявляются гиперемия, отёк, точечные кровоизлияния, эрозии и в тяжёлых случаях — фибринозные налёты или белесоватые некротические участки. Эти изменения связаны с прямым повреждением эпителия паразитом.
        
        Таким образом, наличие лимфоидной гиперплазии без повреждения слизистой указывает на аденовирусную инфильтрацию, тогда как эрозии, гиперемия и кровоизлияния в верхней трети тонкого кишечника характерны для Eimeria acervulina.

  - description: "Бройлеры, признаки исключения некротического энтерита"
    vars:
      query: "посмотри в книгах: Почему при лечении бройлеров отсутствие эрозий и некроза в кишечнике является решающим критерием для исключения некротического энтерита?"
      context: ""
      expected_answer: |
        Отсутствие эрозий и некроза в кишечнике является решающим критерием для исключения некротического энтерита у бройлеров, поскольку именно эти патологические изменения — эрозии и некрозы слизистой оболочки тонкой кишки — представляют собой характерные патоморфологические признаки данного заболевания. Некротический энтерит, вызываемый Clostridium perfringens, сопровождается специфическими макроскопическими поражениями кишечника, которые легко выявляются при вскрытии. В отсутствие таких изменений диагноз некротического энтерита не может быть подтверждён, даже если присутствуют неспецифические клинические симптомы (например, понос, депрессия, снижение привесов), так как они могут наблюдаться и при других заболеваниях, таких как болезнь Гамборо или дисбактериоз. Кроме того, подтверждение диагноза может включать лабораторную изоляцию C. perfringens, особенно из печени, что считается патогномоничным признаком. Таким образом, отсутствие эрозий и некрозов позволяет уверенно исключить некротический энтерит из дифференциального диагноза и избежать необоснованного применения антибиотиков, что важно для предотвращения развития резистентности и сохранения здоровья птицы.

  - description: "Бройлеры, профилактические меры в инкубаторе"
    vars:
      query: "посмотри в книгах: Какие профилактические меры в инкубаторе и на ранних этапах выращивания бройлеров (до 24 дней) являются критически важными для предотвращения заражения спорами Aspergillus?"
      context: ""
      expected_answer: |
        Критически важные профилактические меры в инкубаторе и на ранних этапах выращивания бройлеров (до 24 дней) для предотвращения заражения спорами Aspergillus включают следующие ключевые аспекты:

        Гигиена при сборе и хранении яиц:
        — Необходимо избегать помещения холодных яиц в тёплое и влажное помещение, так как это вызывает образование конденсата на скорлупе («потение яйца»), что создаёт благоприятные условия для проникновения спор Aspergillus.
        — Следует строго предотвращать разбивание яиц при транспортировке и подготовке к инкубации, поскольку разбитые грязные яйца становятся источником грибковой инфекции, особенно опасной на 16-й день инкубации.
        Санитарное состояние инкубатора:
        — Конструкция инкубатора должна соответствовать принципу «одностороннего движения» — от чистых зон к загрязнённым — для предотвращения перекрёстного заражения между яйцами на разных стадиях инкубации.
        — Обязательна регулярная тщательная очистка и дезинфекция всех поверхностей, оборудования и воздушного пространства с использованием противогрибковых дезинфицирующих средств.
        Контроль качества материалов:
        — Корм и подстилка должны быть высокого качества, без признаков плесени, пыли или загрязнения. Запрещено использовать заплесневелую или пыльную солому.
        — Регулярный микробиологический контроль подстилки, корма, воздуха и поверхностей (например, с помощью чаш Петри с агаром Сабуро) позволяет своевременно выявлять споры Aspergillus.
        Поддержание оптимальных условий выращивания:
        — Влажность подстилки должна поддерживаться на уровне 30–35% для предотвращения роста плесени и накопления аммиака.
        — Обеспечение надлежащей вентиляции, стабильной температуры, равномерного освещения и постоянного доступа к чистой воде снижает стресс и укрепляет иммунитет птицы.
        Профилактика иммунодефицита:
        — Необходимо выявлять и устранять факторы, ослабляющие иммунную систему: инфекционные агенты (например, вирус Гамборо, ИАК), микотоксины в корме, стрессовые условия содержания.
        — Внедрение унифицированной программы вакцинации родительских стай (особенно при смешанном происхождении яиц) способствует иммунной однородности потомства и снижает риск вторичных инфекций, включая аспергиллёз.
        Ранняя выбраковка:
        — Строгий отбор и удаление слабых, отстающих в росте цыплят в первые дни жизни минимизирует риск распространения инфекций в стаде.
        Эти меры в совокупности формируют комплексную стратегию профилактики аспергиллёза, направленную на разрыв цепи передачи спор Aspergillus и поддержание высокого уровня здоровья бройлеров на критически уязвимых ранних этапах жизни.

  - description: "Бройлеры, признаки точного диагностирования аспергиллеза у бройлеров"
    vars:
      query: "посмотри в книгах: Какие патоморфологические признаки в воздухоносных мешках и легких позволяют точно диагностировать аспергиллез у бройлеров, и почему лечение, например, Энилконазолом через генератор дыма, часто неэффективно для уже инфицированных птиц?"
      context: ""
      expected_answer: |
        Патоморфологические признаки аспергиллеза у бройлеров в легких и воздухоносных мешках характеризуются наличием гранулёзных узелков белого, сероватого или желтовато-зелёного цвета, представляющих собой плотные воспалительные очаги с гифами и спорами гриба Aspergillus. Эти поражения локализуются преимущественно в паренхиме лёгких и на стенках воздухоносных мешков, часто сопровождаясь фибринозным экссудатом, некрозом и при хроническом течении — фиброзным замещением тканей. Диагноз подтверждается микроскопическим выявлением характерных септированных гиф и спороносных структур, а также гистологическими и микологическими исследованиями образцов, взятых в стерильных условиях.

        Лечение аспергиллеза, например Энилконазолом через генератор дыма, обычно неэффективно у уже инфицированных птиц по нескольким причинам. Во-первых, к моменту появления клинических признаков гриб глубоко проникает в ткани дыхательной системы и формирует плотные гранулемы, которые плохо проницаемы для лекарственных веществ. Во-вторых, ингаляционное введение препарата обеспечивает лишь поверхностное воздействие на споры в воздушной среде, но не достигает терапевтической концентрации в поражённых участках лёгких и воздухоносных мешков. В-третьих, хронические очаги инфекции содержат споры и гифы в защищённой форме, устойчивой к антимикотикам. Поэтому терапия больных птиц малоперспективна, и основной акцент следует делать на профилактике — устранении источников инфекции (заплесневелая подстилка, корм, пыль) и поддержании санитарных условий в птичнике.

  - description: "Эффективность аминогликозидов при пероральном применении для системного лечения респираторных инфекций у свиней"
    vars:
      query: "посмотри в книгах: Почему аминогликозиды (например, гентамицин) неэффективны при пероральном применении для системного лечения респираторных инфекций у свиней, несмотря на их высокую in vitro активность против грамотрицательных бактерий?"
      context: ""
      expected_answer: |
        Аминогликозиды, такие как гентамицин, неэффективны при пероральном применении для системного лечения респираторных инфекций у свиней из-за их крайне низкой абсорбции из желудочно-кишечного тракта. Несмотря на высокую in vitro активность против грамотрицательных бактерий, эти препараты практически не всасываются в системный кровоток при оральном приёме и, следовательно, не достигают терапевтических концентраций в лёгочной ткани или других органах-мишенях. В связи с этим аминогликозиды, а также другие плохо абсорбируемые антибиотики (например, аминокиклитолы и полимиксины), не подходят для перорального назначения при системных или респираторных инфекциях. Для достижения необходимых плазменных и тканевых концентраций их следует применять парентерально (например, внутримышечно).
  - description: "физиологические особенности сухих свиноматок"
    vars:
      query: "посмотри в книгах: Какие физиологические особенности сухих свиноматок обуславливают необходимость увеличения концентрации хлортетрациклина в корме в 5 раз по сравнению с обычной дозой, и как это связано с принципами фармакокинетики (PK)?"
      context: ""
      expected_answer: |
        Физиологические особенности сухих свиноматок, обуславливающие необходимость увеличения концентрации хлортетрациклина в корме в 5 раз по сравнению с обычной дозой, связаны прежде всего с их крайне низким уровнем потребления корма. В период сухостоя свиноматки получают корм в количестве около 1 % от массы тела в сутки, что значительно ниже, чем у других возрастных и физиологических групп свиней: например, у поросят массой 20 кг потребление корма может достигать 5 %, а у лактирующих свиноматок — около 2,5 %. В результате даже при стандартной концентрации хлортетрациклина в корме (300–400 ppm) общее количество поступающего в организм активного вещества оказывается недостаточным для достижения терапевтических концентраций в плазме крови и тканях, необходимых для эффективного лечения инфекций репродуктивной системы, включая бактериальные и микоплазмальные инфекции матки.

        С точки зрения фармакокинетики (PK), данная особенность напрямую влияет на биодоступность и системную экспозицию препарата. При пероральном введении через корм абсорбция хлортетрациклина из желудочно-кишечного тракта ограничена: тетрациклины характеризуются неполным и нестабильным всасыванием, особенно при медленной эвакуации содержимого из желудка и наличии пищевых компонентов, способных связывать антибиотик. Кроме того, оральный путь введения обеспечивает значительно более низкие и вариабельные концентрации в плазме по сравнению с парентеральным. В таких условиях общая доза, поступающая с кормом, становится критическим фактором, определяющим достижение терапевтического уровня.
        
        Увеличение концентрации хлортетрациклина в корме в 5 раз (например, до 1500–2000 ppm) компенсирует низкое потребление корма и позволяет достичь необходимой общей суточной дозы, обеспечивающей адекватный площадь под кривой «концентрация–время» (AUC) — ключевой PK-параметр для бактериостатических антибиотиков, к которым относится хлортетрациклин. Это соответствует принципам фармакокинетико-фармакодинамического (PK/PD) взаимодействия, согласно которым эффективность терапии зависит от поддержания концентрации препарата выше минимальной подавляющей концентрации (МПК) на протяжении достаточного времени. Таким образом, коррекция дозы через повышение концентрации в корме является фармакокинетически обоснованной мерой, направленной на обеспечение терапевтической эффективности при ограничениях, накладываемых физиологией сухих свиноматок.

  - description: "комбинированная терапия"
    vars:
      query: "посмотри в книгах: Нужно ли при назначении комбинированной терапии учитывать не только MIC целевого патогена, но и соотношение концентраций препаратов в легочной ткани, чтобы избежать подавления одного антибиотика другим?"
      context: ""
      expected_answer: |
        При назначении комбинированной антибактериальной терапии необходимо учитывать не только минимальную ингибирующую концентрацию (MIC) целевого патогена, но и соотношение концентраций препаратов в тканях, особенно в легочной ткани. Это обусловлено тем, что фармакокинетические характеристики различных антибиотиков могут существенно различаться: одни препараты (например, макролиды, азалиды, тиамулин, тилмикозин) активно накапливаются в легочной ткани и фагоцитирующих клетках, достигая концентраций, в десятки и даже сотни раз превышающих плазменные уровни, тогда как другие распределяются преимущественно в системном кровотоке. В результате соотношение концентраций в очаге инфекции может значительно отличаться от такового в плазме, что напрямую влияет на характер взаимодействия между препаратами — будь то синергия или антагонизм.

        Особое внимание следует уделять комбинациям бактериостатических и бактерицидных антибиотиков. Например, бактериостатические агенты (такие как тетрациклины, хлорамфеникол, макролиды) могут подавлять рост бактерий, тем самым снижая эффективность бактерицидных препаратов (например, β-лактамов или аминогликозидов), действие которых зависит от активного деления клеток. Такой антагонизм особенно опасен при тяжелых инфекциях (например, пневмониях, менингитах или эндокардитах), где требуется максимальная бактерицидная активность.
        
        Кроме того, даже при наличии синергии in vitro, несбалансированное соотношение концентраций в легочной ткани может привести к отсутствию клинического эффекта или, наоборот, к подавлению одного препарата другим. Поэтому для оптимизации комбинированной терапии важно ориентироваться не только на MIC и плазменные уровни, но и на данные о распределении антибиотиков в тканях, включая эпителиальную жидкость легких (ELF) и клетки иммунной системы, которые могут служить резервуарами для высвобождения препарата в очаг инфекции.
        
        Таким образом, для обеспечения максимальной эффективности и предотвращения антагонистических взаимодействий при комбинированной терапии респираторных инфекций необходимо учитывать как MIC патогена, так и фармакокинетико-фармакодинамические (PK/PD) параметры, отражающие реальные концентрации препаратов в легочной ткани.

  - description: "формы классической чумы свиней"
    vars:
      query: "посмотри в книгах: Какие формы классической чумы свиней выделяют по клиническим проявлениям, и как особенности патогенеза (включая вирулентность штаммов и пути распространения вируса) определяют разнообразие симптомов, течение болезни и эпизоотологические последствия?"
      context: ""
      expected_answer: |
        По клиническим проявлениям классическая чума свиней подразделяется на три основные формы: типичную, хроническую и атипичную.

        Типичная форма может протекать в сверхостром, остром или слабовыраженном варианте. Характеризуется резким повышением температуры тела, угнетением, отказом от корма, нарушениями со стороны желудочно-кишечного тракта (диарея, запоры), кашлем, анемией, бледностью кожи, геморрагическими высыпаниями, парезами задних конечностей, судорогами. При сверхостром и остром течении смерть наступает в течение нескольких часов — 2–3 суток.

        Хроническая форма обычно развивается как исход острой инфекции после частичного клинического выздоровления. Отмечается волнообразное течение с периодами ухудшения и временного улучшения состояния. Клинические признаки включают колебания температуры, неустойчивый аппетит, кашель, чередование диареи и запоров, анемию, кровоизлияния, парезы и судороги. У части животных формируются иммунокомплексные поражения (особенно почек), что способствует длительному сохранению вируса в организме. Летальность при хронической форме достигает 50 %.

        Атипичная форма наблюдается преимущественно при заражении слабовирулентными штаммами вируса. Клинические проявления стёрты: умеренное повышение температуры, снижение аппетита, задержка роста, периодическая диарея, параличи и судороги. Инкубационный период может длиться до нескольких месяцев, болезнь распространяется медленно. У части животных инфекция протекает бессимптомно. Особое значение имеет поражение репродуктивной системы: снижение плодовитости, выкидыши, внутриутробное инфицирование плодов, рождение мёртвых или ослабленных поросят, а также поросят с врождённым тремором вследствие поражения центральной нервной системы.

        Особенности патогенеза, в первую очередь вирулентность штаммов, определяют клиническую картину и течение болезни. Высоковирулентные штаммы вызывают острое, часто фульминантное течение с высокой смертностью, тогда как слабовирулентные — хроническое или бессимптомное инфицирование с длительным выделением вируса и трудностями в диагностике. Вирус проникает в организм через слизистые оболочки желудочно-кишечного и дыхательного трактов, конъюнктиву, а также через повреждённую кожу (например, при ветеринарных процедурах — кастрации, кольцевании, вакцинации).

        Эпизоотологические последствия обусловлены способностью вируса сохраняться в популяции за счёт бессимптомных носителей, особенно свиноматок, передающих вирус потомству трансплацентарно. Это приводит к эндемическому циркулированию инфекции, снижению воспроизводства, гибели молодняка и затрудняет эрадикацию болезни, особенно в популяциях диких кабанов.

  - description: "биологические и эпидемиологические особенности вируса болезни Ауески (ADV)"
    vars:
      query: "посмотри в книгах: Какие биологические и эпидемиологические особенности вируса болезни Ауески (ADV) создают основные трудности в борьбе с заболеванием, и как его устойчивость во внешней среде влияет на распространение инфекции?"
      context: ""
      expected_answer: |
        Биологические и эпидемиологические особенности вируса болезни Ауески (ADV) создают значительные трудности в борьбе с заболеванием. Ключевыми факторами являются его высокая заразность и способность вызывать латентную инфекцию у свиней. При латентной форме вирус сохраняется в организме без клинических проявлений, но может периодически реактивироваться, сопровождаясь выделением вируса во внешнюю среду и способствуя скрытому распространению инфекции.

        ADV относится к семейству Herpesviridae, что обусловливает его устойчивость к внешним воздействиям. Во внешней среде вирус сохраняет инфекционную активность: в зимний период — до 15–40 дней, в моче и навозной жиже — зимой до 1–15 недель, летом — до 3 недель. При комнатной температуре вирус теряет патогенность через 8 дней, при 60 °C инактивируется за 30 минут, при 80 °C — за 3 минуты, а при кипячении (100 °C) погибает мгновенно. Такая устойчивость, особенно в холодное время года, способствует длительному сохранению вируса в условиях свиноводческих хозяйств и облегчает его передачу между животными.

        Эпидемиологически значимым является также механизм передачи: заражение происходит преимущественно через носоглотку, а вирус выделяется с молоком, слюной, назальными и половыми выделениями. Особенно опасно заражение сосущих поросят через молоко инфицированных свиноматок, что приводит к тяжёлому течению болезни у новорождённых. Кроме того, ADV обладает иммуносупрессивным действием — он ослабляет иммунную систему, повышая восприимчивость свиней к другим инфекциям, в частности респираторным, что усугубляет эпизоотическую ситуацию на фермах.

        Таким образом, сочетание латентной персистенции вируса в организме, высокой устойчивости во внешней среде и иммуносупрессивного эффекта создаёт условия для хронического циркулирования инфекции и затрудняет её полную ликвидацию даже при отсутствии клинических признаков заболевания.

  - description: "клинические признаки и патоморфологические изменения наиболее характерны для инфекционного атрофического ринита"
    vars:
      query: "посмотри в книгах: Какие клинические признаки и патоморфологические изменения наиболее характерны для инфекционного атрофического ринита, и как они связаны с условиями содержания свиней и вторичными осложнениями?"
      context: ""
      expected_answer: |
        Инфекционный атрофический ринит у свиней характеризуется специфическими клиническими признаками и патоморфологическими изменениями, тесно связанными с условиями содержания животных и склонностью к вторичным осложнениям.

        Клинические признаки наиболее выражены у новорождённых поросят и сосунов, особенно в первые дни жизни. К ним относятся: серозные или гнойные выделения из носа, затруднённое дыхание, снижение аппетита, замедление роста, ухудшение коэффициента использования корма, а в тяжёлых случаях — деформация носовой части черепа. У взрослых свиней заболевание часто протекает бессимптомно или в субклинической форме, однако у свиноматок возможны аборты или рождение мёртвых плодов при заражении в ранние сроки беременности.

        Патоморфологические изменения обусловлены действием токсинов, продуцируемых токсигенными штаммами Pasteurella multocida, и проявляются атрофией и разрушением носовых раковин, воспалением и деструкцией слизистой оболочки носовой полости. В тяжёлых случаях отмечается некроз тканей и выраженная деформация лицевого скелета, что приводит к стойкому нарушению функции дыхательных путей и снижению продуктивности.

        Условия содержания играют решающую роль в развитии и тяжести заболевания. Неблагоприятные факторы — низкая температура, повышенная влажность, скученность, отсутствие вольеров, плохая вентиляция и низкий санитарный уровень — способствуют активации патогена, усугубляют клинические проявления и облегчают распространение инфекции. Особенно уязвимы поросята с низкой массой при рождении и животные с высокими темпами роста.

        Вторичные осложнения возникают вследствие нарушения защитных функций верхних дыхательных путей из-за разрушения носовых раковин. Это приводит к повышенной восприимчивости к другим респираторным инфекциям — микоплазменной пневмонии, пастереллёзу, актинобациллёзному плевропневмониту и другим бактериальным и вирусным заболеваниям. Хроническое течение болезни может сопровождаться рецидивами на фоне стрессов (смена корма, перемещение, введение новых животных), что дополнительно ухудшает зоотехнические показатели и экономические результаты свиноводства.

  - description: "Основные пути заражения стронгилоидозом у поросят"
    vars:
      query: "посмотри в книгах: Каковы основные пути заражения стронгилоидозом у поросят и какие клинические проявления характерны для каждого этапа патогенеза этого заболевания?"
      context: ""
      expected_answer: |
        Основные пути заражения стронгилоидозом у поросят включают:

        Перкутанный путь — проникновение инвазионных личинок через неповреждённую кожу (чаще всего при контакте с загрязнённой подстилкой, почвой или полом);
        Пероральный путь — заражение при поедании корма, воды или подстилки, загрязнённых личинками;
        Трансмаммарный путь — передача личинок с молозивом от инвазированных супоросных свиноматок.
        Клинические проявления стронгилоидоза у поросят зависят от этапа патогенеза и проходят в три основные фазы:

        Кожный период — возникает при проникновении личинок через кожу. Характеризуется появлением мелких кровоизлияний (пунктиков), особенно на брюшной поверхности, зудом, болезненностью и снижением общей активности. Возможно раздражение слизистых оболочек рта и глотки, что может вызывать отказ от корма.
        Легочный период — связан с миграцией личинок через лёгочную ткань. Проявляется кашлем, затруднённым дыханием, удушьем, серозно-слизистыми выделениями из носа.
        Кишечный период — наступает после завершения миграции и заселения тонкого кишечника партеногенетическими самками паразита. Клинически проявляется угнетением аппетита, запорами, прогрессирующей анемией, истощением и задержкой роста вследствие повреждения слизистой оболочки кишечника и нарушения всасывания питательных веществ. При массивной инвазии возможны неврологические расстройства и высокая смертность среди поросят.

  - description: "клинические стадии проявления розовой перхоти у свиней"
    vars:
      query: "посмотри в книгах: Какие последовательные клинические стадии проявления розовой перхоти у свиней, какие патологические процессы в коже их обуславливают?"
      context: ""
      expected_answer: |
        Розовая перхоть у свиней проявляется в виде последовательных клинических стадий. На начальной стадии на коже появляются розовые пятна, возвышающиеся над её поверхностью, преимущественно локализующиеся на внешней и внутренней сторонах бёдер, животе и боках; в тяжёлых случаях поражение может охватывать всю кожу. Через 2–3 дня по краям пятен формируются мелкие пузырьки, заполненные сывороточной жидкостью. После их разрыва образуются струпья, которые склонны к слиянию. На последующей стадии в центре очагов наблюдается побледнение кожи с последующим слущиванием эпидермиса. Завершающая стадия характеризуется регенерацией кожи и отрастанием здорового эпидермиса.

        Патологические процессы в коже обусловлены воспалением эпидермиса и дермы с сывороточным инфильтратом, что приводит к образованию пузырьков, гиперкератозу и шелушению. Эти изменения, как правило, связаны с грибковой инфекцией, предположительно вызванной микроорганизмами рода Pityrosporum (или родственными видами), нарушающими нормальную функцию эпидермальных клеток.

        Заболевание протекает доброкачественно: животные сохраняют аппетит и общее состояние. Самоизлечение наступает, как правило, через 2–3 недели, в отдельных случаях — не позднее 8 недель.

  - description: "ключевые этиологические факторы способствующие возникновению каннибализма"
    vars:
      query: "посмотри в книгах: Какие ключевые этиологические факторы, включая условия содержания и нарушения в питании, способствуют возникновению каннибализма у свиней?"
      context: ""
      expected_answer: |
        Каннибализм у свиней возникает под влиянием комплекса этиологических факторов, связанных преимущественно с условиями содержания, нарушениями в питании и наличием определённых болезненных состояний.

        К факторам содержания относятся:

        чрезмерная скученность животных;
        избыточная освещённость помещений;
        высокая влажность воздуха;
        повышенная концентрация вредных газов (аммиак — более 20 ppm, двуокись углерода — более 3000 ppm, сероводород — более 10 ppm);
        значительные суточные колебания температуры;
        отсутствие подстилки;
        недостаточное количество питьевой воды;
        мокрые и неухоженные загоны.
        Среди нарушений в питании выделяют:

        дефицит соли в рационе;
        недостаточное количество корма;
        низкую усвояемость питательных веществ.
        Кроме того, провоцирующими факторами могут служить болезни, сопровождающиеся зудом или повреждением кожи, такие как экссудативный эпидерматит, чесотка и оспа, которые вызывают раздражение и способствуют развитию аномального поведения, включая каннибализм.

