# ============================================================
# ШАБЛОН ТЕСТОВЫХ КЕЙСОВ ДЛЯ DEEPEVAL
# ============================================================

# Метаданные модуля (опционально)
module: "template_tests"
description: "Примеры тестовых кейсов с различными типами проверок"

# Описание тестов
test_cases:

  # Пример 1: Простой тест с базовыми критериями
  - id: simple_test_example
    description: "Базовый тест с проверкой ключевых элементов ответа"
    query: "Что такое пульмосол?"
    expected_criteria:
      - "Предоставлена краткая информация о назначении препарата"
      - "Указаны активные компоненты или состав"
      - "Ответ не содержит лишней информации"

  # Пример 2: Тест со списком элементов
  - id: list_test_example
    description: "Тест с проверкой списка и множественных требований"
    query: "Выведи список 5 препаратов с энрофлоксацином"
    expected_criteria:
      - "Предоставлен список из 5 препаратов"
      - "Указано действующее вещество энрофлоксацин"
      - "Указаны торговые названия препаратов"
      - "Приведены формы выпуска (таблетки, инъекции, раствор и т.д.)"

  # Пример 3: Детальная проверка полной инструкции
  - id: detailed_instruction_example
    description: "Комплексная проверка полноты документации"
    query: "Выведи инструкцию для препарата Тиланик 5%"
    expected_criteria:
      - "Приведена инструкция для препарата Тиланик 5%"
      - "Указан механизм действия"
      - "Указаны показания к применению"
      - "Даны дозировки для разных видов животных"
      - "Описаны побочные эффекты и противопоказания"
      - "Приведены условия хранения"


# ============================================================
# КОНФИГУРАЦИЯ МЕТРИК
# ============================================================
# Доступные метрики:
# - geval_quality: оценка качества по кастомным критериям
# - answer_relevancy: релевантность ответа запросу
# - faithfulness: соответствие ответа контексту (отсутствие галлюцинаций)

metrics_config:

  # GEval - качество ответа на основе expected_criteria
  geval_quality:
    provider: "openrouter"           # Варианты: openrouter, vsegpt, deepseek, inline
    model: "openai/gpt-4o-mini"      # Модель для оценки (для openrouter)
    threshold: 0.7                   # Минимальный порог для прохождения теста (0-1)

  # Answer Relevancy - релевантность ответа
  answer_relevancy:
    provider: "deepseek"
    threshold: 0.7

  # Faithfulness - проверка на галлюцинации
  faithfulness:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    threshold: 0.5


# ============================================================
# ПРИМЕЧАНИЯ ПО ИСПОЛЬЗОВАНИЮ
# ============================================================
#
# Запуск тестов:
#   python tests/deepeval/run_tests.py --file test_cases/template.yaml
#   python tests/deepeval/run_tests.py --test simple_test_example
#   python tests/deepeval/run_tests.py -v -x  # verbose, остановка на первой ошибке
#
# Просмотр результатов:
#   python tests/deepeval/run_viewer.py
#
# Провайдеры LLM для оценки:
#   - deepseek: рекомендуется (быстро, дешево, качественно)
#   - openrouter: доступ к различным моделям (gpt-4o-mini, claude и др.)
#   - vsegpt: альтернативный провайдер
#   - inline: локальная модель
