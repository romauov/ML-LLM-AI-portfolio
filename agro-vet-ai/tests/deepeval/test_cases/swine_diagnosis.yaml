    threshold: 0.7

  answer_relevancy:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    threshold: 0.7

  faithfulness:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    threshold: 0.5