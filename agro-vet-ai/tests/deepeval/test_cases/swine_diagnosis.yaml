test_cases:
  - id: swine_clostridiosis_subacute
    description: "Клостридиоз (подострая форма)"
    query: "Свиньи плохо едят, спустя 7 часов - зловонный понос. Поведение апатичное"
    expected_strings:
      - "Клостридиоз"
      - "Clostridiosis"
      - "Clostridial infection"
      - "Клостридиоза"
      - "Клостридиозу"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан клостридиоз"

  - id: swine_mycoplasma_pneumonia_acute
    description: "Микоплазменная пневмония свиней (острая форма)"
    query: "Свиньи кашляют, дыхание учащённое, выраженный цианоз. Появились слизистые выделения из носа."
    expected_strings:
      - "Микоплазменная пневмония"
      - "Микоплазменной пневмонии"
      - "Микоплазменной пневмонии"
      - "Микоплазмоз"
      - "Микоплазмоза"
      - "Микоплазмозу"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указана микоплазменная пневмония свиней"

  - id: swine_aujeszky_disease_nervous
    description: "Болезнь Ауэски (нервная форма у поросят)"
    query: "Поросята не могут перемещаться и сосать, наблюдаются судороги и слюнотечение. Температура тела повышена до 41°С. Некоторые поросята двигаются по кругу, появился паралич конечностей."
    expected_strings:
      - "Болезнь Ауэски"
      - "Болезни Ауэски"
      - "Болезнь Ауески"
      - "Болезни Ауески"
      - "Вирус болезни Ауэски"
      - "Вирус болезни Ауески"
      - "Псевдобешенство"
      - "Pseudorabies"
      - "Morbus Aujeszky"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указана болезнь Ауэски"

  - id: swine_prrs
    description: "РРСС (Репродуктивно-респираторный синдром свиней)"
    query: "У свиноматок проявился респираторный синдром. Они отказываются от корма, температура тела повышена (41 градус). В результате родов появляются мумифицированные плоды или уродливые поросята, которые быстро умирают. Что это может быть?"
    expected_strings:
      - "РРСС"
      - "Репродуктивно-респираторный синдром"
      - "Репродуктивно-респираторного синдрома"
      - "Репродуктивно-респираторному синдрому"
      - "PRRS"
      - "синий аборт"
      - "синее ухо"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан РРСС (Репродуктивно-респираторный синдром свиней)"

  - id: swine_haemophilosis_glasser
    description: "Гемофилез (Болезнь Глессера)"
    query: "Поросята малоподвижны, отказываются от корма, наблюдается кашель, отекают веки. Температура тела 41°С. Некоторые подгибают задние лапы под живот."
    expected_strings:
      - "Гемофилез"
      - "Гемофилеза"
      - "Болезнь Глессера"
      - "Болезни Глессера"
      - "Haemophilosis"
      - "Glässer's disease"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан гемофилез (болезнь Глессера)"


