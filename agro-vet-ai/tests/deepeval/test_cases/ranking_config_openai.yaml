module: "ranking_evaluation"
description: "Оценка качества ranking — openai text-embedding-3-small"

dataset: "tests/deepeval/ranking_datasets/librarian_ground_truth.json"

# Конфигурация БД и поиска
ranking:
  table: "knowledge_base_chunks"
  embedding_column: "embedding"
  doc_limit: 10
  similarity_threshold: 0.75

# Модель для векторизации запросов
embedding:
  provider: "vsegpt"
  model: "emb-openai/text-embedding-3-small"

# Пороги метрик (pass/fail)
metrics_thresholds:
  precision_at_k: 0.3
  mrr: 1.0
  ndcg_at_k: 0.5
