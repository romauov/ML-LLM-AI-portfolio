test_cases:
  - id: drug_description_pulmosol
    description: "Описание препарата Пульмосол"
    query: "Что такое пульмосол?"
    expected_criteria:
      - "Предоставлена краткая информация о назначении препарата"
      - "Указаны активные компоненты или состав"

  - id: drug_search_by_animal
    description: "Поиск препарата по классу животного"
    query: "Найди антибиотики, которые подходят телятам."
    expected_criteria:
      - "Предоставлен список препаратов-антибиотиков"
      - "Препараты могут применяться для лечения телят"
      - "Указаны дозировки согласно возрасту животного"

  - id: drug_list_by_active_ingredient
    description: "Вывести список с одним действующим веществом"
    query: "Выведи список 5 препаратов с энрофлоксацином."
    expected_criteria:
      - "Предоставлен список из 5 препаратов"
      - "Указано действующее вещество энрофлоксацин"
      - "Указаны торговые названия препаратов"
      - "Приведены формы выпуска (таблетки, инъекции, раствор и т.д.)"

  - id: drug_full_instruction
    description: "Инструкция к препарату Тиланик 5%"
    query: "Выведи инструкцию для тиланика 5%."
    expected_criteria:
      - "Приведена инструкция для препарата тиланик 5%"
      - "Указан механизм действия"
      - "Указаны показания к применению"
      - "Даны дозировки для разных видов животных"
      - "Описаны побочные эффекты и противопоказания"
      - "Приведены условия хранения"

  - id: drug_search_by_properties
    description: "Поиск препарата по свойствам"
    query: "Найди препараты от поноса для птиц."
    expected_criteria:
      - "Предоставлен список препаратов"
      - "Указаны торговые названия и действующие вещества"
      - "В показания к применению входит лечение поноса/диареи/болезней, способных вызвать диарею"
      - "Препараты могут применяться для лечения птиц"
      - "Указаны механизмы действия препаратов"

  # ===== ТЕСТЫ ПРЕПАРАТОВ С ID: 89 по 166 =====

  - id: drug_summarization_ketoprofen
    description: "Описание препарата Кетопрофен 10%"
    query: "Что такое Кетопрофен 10%?"
    expected_criteria:
      - "Информация соответствует препарату Кетопрофен 10%"
      - "Предоставлена краткая информация о назначении препарата"
      - "Указаны активные компоненты или состав"

  - id: drug_side_effects_ditrim
    description: "Побочные эффекты препарата Дитрим порошок"
    query: "Что такое Дитрим порошок?"
    expected_criteria:
      - "Информация соответствует препарату Дитрим"
      - "Предоставлена информация о побочных эффектах препарата"
      - "Указаны активные компоненты или состав"

  - id: drug_type_and_application_madeford
    description: "Кокцидиостатик Мадефорд"
    query: "Мадефорд - это кокцидиостатик? Как его использовать?"
    expected_criteria:
      - "Подтверждено, что Мадефорд - кокцидиостатик"
      - "Указано действующее вещество мадурамицин"
      - "Описано применение для профилактики кокцидиоза у птицы"
      - "Приведена дозировка"
      - "Указан способ применения (с кормом)"

  - id: drug_vitamin_tetragidrovit
    description: "Состав витаминного препарата Тетрагидровит"
    query: "Какие витамины входят в состав Тетрагидровит?"
    expected_criteria:
      - "Указан витамин A"
      - "Указан витамин D3"
      - "Указан витамин E"
      - "Указан витамин C"
      - "Приведены дозировки витаминов или показания к применению"

  - id: drug_instruction_flunex
    description: "Инструкция к препарату Флунекс"
    query: "Выведи инструкцию для препарата Флунекс."
    expected_criteria:
      - "Указано действующее вещество флуниксин меглумин"
      - "Описано применение как нестероидного противовоспалительного средства"
      - "Приведены показания к применению"
      - "Указаны дозировки для свиней"
      - "Описаны побочные эффекты и противопоказания"
      - "Приведены условия хранения"


metrics_config:
  geval_quality:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    threshold: 0.7

  answer_relevancy:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    threshold: 0.7

  faithfulness:
    provider: "openrouter"
    model: "openai/gpt-4o-mini"
    threshold: 0.5
