test_cases:
  - id: avian_infectious_bronchitis_renal
    description: "Инфекционный бронхит птиц (почечная форма)"
    query: "Птицы толпятся у поилок, исхудали. Обнаружен быстрый падёж цыплят. Помёт белёсый."
    expected_strings:
      - "Инфекционный бронхит"
      - "Почечная форма"
      - "Почечной формы"
      - "Почечной форме"
      - "Инфекционного бронхита"
      - "Инфекционному бронхиту"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан инфекционный бронхит птиц (почечная форма)"

  - id: avian_infectious_bronchitis_respiratory
    description: "Инфекционный бронхит птиц (респираторная форма)"
    query: "Цыплята хрипят, чихают, дышат с открытым клювом. Выделения из носа, отек головы, цианоз гребня."
    expected_strings:
      - "Инфекционный бронхит"
      - "Респираторный"
      - "Респираторная форма"
      - "Респираторной форме"
      - "Респираторной формы"
      - "Инфекционного бронхита"
      - "Инфекционному бронхиту"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан инфекционный бронхит птиц (респираторная форма)"

  # Ньюкаслская болезнь (нервная форма)
  - id: avian_newcastle_disease_nervous
    description: "Ньюкаслская болезнь (нервная форма)"
    query: "Птицы отказываются от корма, наблюдаются судороги и дрожание головы. У некоторых кур шея скручена, они двигаются кругами. Ноги и крылья парализованы."
    expected_strings:
      - "Ньюкаслская болезнь"
      - "Newcastle Disease"
      - "Болезни Ньюкасла"
      - "Ньюкаслской болезни"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указана Ньюкаслская болезнь"

  # Кокцидиоз
  - id: avian_coccidiosis
    description: "Кокцидиоз"
    query: "Цыплята вялые, с взъерошенным оперением, скучиваются. Обнаружен кровавый понос. Гребни и сережки побледнели. Птицы быстро худеют."
    expected_strings:
      - "Кокцидиоз"
      - "Кокцидиоза"
      - "Кокцидиозу"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан кокцидиоз"

  # Птичий грипп
  - id: avian_influenza
    description: "Птичий грипп"
    query: "У кур резко упала яйценоскость. Птицы кашляют, чихают, из глаз текут слезы. Голова и шея опухли, сережки синеватого цвета с кровоизлияниями. Водянистый понос. Внезапная гибель птиц."
    expected_strings:
      - "Птичий грипп"
      - "Avian Influenza"
      - "Птичьего гриппа"
      - "Птичьему гриппу"
    expected_criteria:
      - "Указано 3 диагноза от наиболее веротяного к наименее вероятному."
      - "Для каждого диагноза приведена аргументация, на основе симптомов из запроса"
      - "Выданы рекомендации по дополнительным исследованиям для подтверждения диагноза"
      - "В числе наиболее вероятных диагнозов указан птичий грипп"


