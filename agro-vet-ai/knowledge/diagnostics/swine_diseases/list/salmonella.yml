Salmonella: # Сальмонеллез свиней
  disease_name: |
    Сальмонеллез свиней, Porcine Salmonellosis - международное название,
    Salmonellosis in pigs – латинский вариант, Porcine salmonellosis, Salmonella
    infection in swine
  etiology: |
    Сальмонеллез (паратиф) - инфекционная, широко распространенная болезнь,
    вызываемая бактериями из группы сальмонелл. Болеют преимущественно молодые
    животные всех видов. У свиней болезнь протекает остро, подостро и хронически;
    характеризуется явлениями септицемии или катарально-дифтеритическими,
    некротическими и язвенными поражениями слизистой оболочки кишечника и нередко
    пневмониями. Сальмонеллез (паратиф) свиней известен более 100 лет. Эту болезнь
    описал Ролофф (Roloff) в 1866 г. под названием творожистого воспаления
    кишечника. Сальмонеллезы имеют большое эпидемиологическое и эпизоотологическое
    значение, и к настоящему времени науке и практике известны более 150 их
    представителей, различных по антигенной структуре. Наиболее часто сальмонеллезы
    регистрируют у свиней. Возбудителями у них в основном являются S. choleraesuis,
    S. enteritidis, S. typhimurium, S. typhisuis, значительно реже обнаруживают S.
    gleser, S. dublin, S. voldagsen.   
  epidemiology: |
    Представители сальмонеллезной группы морфологически неотличимы друг от друга.
    Все они - маленькие палочки (1-4x0,5 мкм) с закругленными концами, окрашиваются
    анилиновыми красками, грамотрицательные, спор и капсул не образуют, подвижные,
    хорошо растут на обычных питательных средах при рН 7,2-7,6, и температуре 37°С.
    На мясопептонном агаре сальмонеллы образуют серо-бело-голубоватые колонии, в
    бульоне - интенсивную муть с обильным серо-белым осадком и пленкой на
    поверхности. Современная идентификация сальмонелл основана на определении их
    серологических (антигенных) свойств, которые выявляют в бактериальных клетках
    термостабильный (соматический) Н-антиген, а также используют феномен
    специфической и неспецифической антигенной фазы жгутикового антигена. Для
    серологической дифференциации сальмонелл используют реакцию агглютинации на
    предметном стекле с монорецепторными 0- и Н- воротками. Сальмонеллы сохраняются
    на объектах внешней среды 160 дней, в навозе - 420 суток, на поверхности дерева,
    бетона, кирпича - до 349 дней, в водопроводной воде - 544 сут.; в соленом и
    копченом мясе - 2,5-3 мес, в твороге и масле - до 6 мес. Замораживание переносят
    в течение 4-5 мес, на солнечном свету сохраняются 150 дней, при нагревании до
    70-75°С инактивируются за 15-30 мин. Дезинфицирующие средства, применяемые при
    сальмонеллезе: 3-4%-ные горячие растворы натрия или калия гидроксида, 2-3%-ные
    растворы формальдегида, хлорсодержащие препараты (йододнохлористый, кальция
    гипохлорид и др.) с содержанием не менее 2% активного хлора, 10%-ная эмульсия
    креолина, 20%-ная водная взвесь свежегашеной извести, 5%-ная эмульсия ксилонафта
    при экспозиции не менее 1 ч.   
  clinical_findings: |
    Болезнь протекает остро, подостро и хронически. У поросят-сосунов чаще
    наблюдается острое, а у животных послеотьемного периода - подострое или
    хроническое течение. Инкубационный период болезни длится 10-20 дней. Причем у
    поросят-сосунов он короче. Острое течение болезни характеризуется повышением
    температуры тела до 41-42°С, отсутствием сосательного рефлекса у поросят-сосунов
    и отказом от корма у животных более старшего возраста. Заболев-шие животные
    зарываются в подстилку, тяжело дышат, у них появляется понос. У некоторых
    больных животных наблюдается рвота, развивается конъюнктивит. Иногда отмечаются
    коликообразные боли, при которых больные животные ложатся на грудь, поджимают
    под себя задние конечности и вытягивают передние. Незадолго до смерти у животных
    появляется очаговое покраснение с синевой кожи в области ушей, паха и живота. На
    3-7-й день болезни в 50-80% случаев поросята погибают. У поросят-сосунов первых
    дней жизни болезнь иногда протекает только с явлениями сильно выраженной диареи,
    без развития септицемии. При подостром течении болезни развиваются те же
    симптомы болезни, что и при остром течении, но они менее выражены. При подостром
    течении болезнь продолжается 15-20 дней. Наблюдаются учащенное, напряженное
    дыхание, кашель, вялость, некоторые животные отказываются от корма. Появляется
    понос, который у некоторых животных бывает постоянным, а у большинства
    чередуется с запорами. Больные животные худеют, кожа становится сероватой, она
    собирается в складки и покрывается грязными корками. У некоторых животных
    развивается пневмония. В 40% случаев у животных наступает смерть. Животные,
    оставшиеся в живых, отстают в росте и развитии. Хроническое течение болезни
    характеризуется менее выраженными клиническими признаками и более длительным
    течением. Болезнь продолжается от нескольких недель до трех и более месяцев. У
    больных животных наблюдаются: поносы, которые периодически сменяются запорами;
    кратковременно повышается температура тела; часто развивается пневмония,
    наступает истощение, кожа покрывается струпьями, наблюдается конъюнктивит. У
    взрослых животных сальмонеллез чаще протекает хронически, без четко выраженных
    клинических признаков. Болезнь длится 5-8 дней и заканчивается обычно
    выздоровлением; часть животных погибает. У подсосных свиноматок возможна
    агалактия. Переболевшие свиноматки длительное время являются
    бактериовыделителями.
  postmortem_findings: |
    При вскрытии поросят, павших от острого течения сальмонеллеза, отмечается
    картина общего сепсиса. Селезенка, лимфатические узлы, особенно мезентеральные,
    а также слизистые желудка и кишечника гиперемированые, припухшие, иногда с
    признаками геморрагического воспаления. Практически во всех органах, а также на
    слизистых оболочках желудка и кишечника появляются точечные или диффузные
    кровоизлияния, возможен поверхностный некроз. Трупы поросят, погибших от
    подострого или хронического течения болезни, сильно истощены. Основные
    патоморфологические изменения сосредоточены главным образом в кишечнике,
    лимфатических узлах и легких. Так, на слизистой толстого кишечника
    обнаруживается фибринозное воспаление, возможно ее покрытие серо-желтыми или
    грязно-зелеными сухими пленками, местами проявляются эрозии и язвы.
    Лимфатические узлы брыжейки и кишечника набухшие, на разрезе можно наблюдать
    участки некроза, а в мезентеральных лимфатических узлах - творожистый распад.   
  diagnosis: |
    Диагноз на сальмонеллез ставят на основании эпизоотологических, клинических,
    патологоанатомических данных и результатов лабораторных исследований, проводимых
    в соответствии с действующими методическими указаниями: «Лабораторная
    диагностика сальмонеллезов человека и животных, обнаружение сальмонелл в кормах,
    продуктах питания и объектах внешней среды». Для прижизненной диагностики в
    лабораторию направляют фекалии, кровь, истечения из матки при абортах, для
    серологических исследований - сыворотку крови. Для посмертной диагностики
    направляют свежие трупы поросят или паренхиматозные органы: печень с желчным
    пузырем и лимфатическими узлами, мезентеральные лимфатические узла, трубчатую
    кость, в случае аборта - свежий плод. При этом желательно не брать материал во
    время применения антибактериальных препаратов, кровь нужно забирать в наиболее
    ранние сроки болезни, а кал из последней порции после дефекации. В лаборатории
    проводят бактериологическую диагностику: исследуют мазки-отпечатки, окрашенные
    по Грамму, проводят высевы из исследуемого материала на МПА, элективные
    питательные среды, такие как Эндо и др., а также на одну из сред обогащения
    (Кауфмана, Мюллера и др.). Выросшие колонии бактерий, подозреваемых в
    принадлежности к сальмонеллам исследуют в РА. Для подтверждения патогенности
    выделенного возбудителя ставят биопробу на белых мышах. Важным аспектом является
    серологическая диагностика, при этом диагностическим служит агглютинирующий титр
    антител 1:200.   
  differential_diagnosis: |
    При дифференциальной диагностике сальмонеллеза необходимо исключить чуму,
    дизентерию, колиинфекцию, диплококковую инфекцию и отравления. Чумой болеют
    свиньи всех возрастов. Температура тела выше и держится устойчиво. Характерен
    геморрагический диатез, геморрагическое воспаление лимфоузлов, кровоизлияния на
    надгортаннике. Часто встречаются инфаркты на селезенке. Дизентерией
    балантидиозной и другой этиологии болеют преимущественно поросята, начиная с
    отъемного периода и до 6-месячного возраста и, нередко, взрослые свиньи.
    Наиболее характерные изменения в толстом отделе кишечника и характеризуются
    катарально-геморрагическими воспалениями стенки кишечника. Нет изменений в
    селезенке, некрозов и гранулем в печени, не выделяют сальмонелл. Колинфекции
    протекают в виде колибактериоза и отечной болезни. При колибактериозе заболевают
    поросята в основном первых дней жизни и до месяца. Бактериологически выделяют
    энтеропатогенные штаммы кишечной палочки. Отечная болезнь - колиэнтеротоксемия -
    остро протекающая болезнь поросят, преимущественно отьемышей, сопровождающаяся
    поражением центральной нервной системы и появлением отеков в различных органах и
    тканях. Отмечена повышенная чувствительность к болезни поросят хорошей
    упитанности. При вскрытии трупов находят серозные отеки подкожной клетчатки
    различных органов, серозный и серозно-фибринозный выпот в брюшную и грудную
    полости, гастроэнтериты. Диплококковая инфекция (диплококкоз) протекает с
    явлениями сепсиса, воспалением суставов, катаральным и
    катарально-геморрагическим гастроэнтеритом. В мазках из органов павших поросят
    обнаруживают возбудителя болезни - диплококка. При кормовых отравлениях
    отсутствуют характерные для сальмонеллеза септические изменения и изменения в
    толстом отделе кишечника, нет температурной реакции.   
  prevention: |
    Профилактика сальмонеллезной инфекции должна основываться на использовании
    комплекса организационно-хозяйственных, противоэпизоотических и
    ветеринарно-санитарных мероприятий, которые необходимо разрабатывать с учетом
    сложившейся эпизоотической ситуации. При возникновении сальмонеллеза в
    хозяйстве, ферме уделяют большое внимание изоляции и лечению больных животных, а
    также проведению вынужденной дезинфекции. Профилактика болезни начинается с
    комплектования стада из благополучных по сальмонеллезу хозяйств. При
    комплектовании ферм, животных необходимо ввозить из благополучных хозяйств.
    Ввозимые животные подлежат содержанию в условиях карантина в течение 30 суток, в
    течение которого необходимо предусматривать контроль на инфекционные болезни, в
    том числе и на сальмонеллез. При комплектовании групп животных следует
    предусматривать заполнение каждого отдельного помещения одновозрастной партией.
    Разница в возрасте поросят при комплектовании групп ремонта и откорма не должна
    превышать 3–5 дней. Не допускается совместное содержание животных различных
    видов и направлений. Во всех случаях вынужденного убоя животных, мясо и органы
    необходимо подвергать исследованию на наличие сальмонеллезных бактерий.
    Оборудование и механизмы для приготовления и раздачи кормов следует регулярно
    очищать и систематически подвергать дезинфекции. После освобождения помещений и
    перед постановкой новой партии животных необходимо осуществлять профилактическую
    дезинфекцию. С целью предупреждения распространения и накопления патогенных
    бактерий рекомендуется не менее чем два раза в год (весна, осень) проводить
    профилактическую дезинфекцию. Определяющее значение для профилактики
    сальмонеллезной инфекции имеет контроль качества кормов, а также
    сбалансированность рациона. Корма животного происхождения необходимо приобретать
    из благополучной местности и подвергать микробиологическому исследованию. Корма
    растительного происхождения также исследуются на качество и подвергаются
    термической обработке. Обсемененные сальмонеллами корма необходимо обеззаразить
    или уничтожить. Для снижения контаминации внешней среды и заражения животных,
    навоз, подстилку необходимо регулярно убирать и подвергать обеззараживанию. Так
    как носителями и распространителями инфекции могут быть грызуны, то дератизация
    ферм является важнейшим звеном в профилактике сальмонеллеза.    
  treatment: |
    После выявления заболевания поросят делят на 2 группы. В первую входят больные
    животные (с острой, подострой, хронической формой паратиф), во вторую группу
    отправляют здоровых особей. Паратиф у поросят лечат с помощью антибиотиков.
    Положительные результаты наблюдаются при применении препаратов с ДВ
    «Левомицетина», «Тетрациклина», «Неомицина». Нередко ветеринары комбинируют
    противобактериальные средства с препаратами сульфаниламидного ряда. Переболевшие
    поросята больше никогда не подвергаются повторному заражению. Вакцинация
    позволяет снизить заболеваемость на 70–80%, при этом имеет среднюю сложность
    внедрения и среднюю стоимость. Биобезопасность обеспечивает снижение заноса
    инфекции на 80–90%, но требует высокой сложности внедрения и сопровождается
    высокой стоимостью. Контроль кормов предотвращает занос инфекции на 90%, его
    внедрение имеет среднюю сложность и связанную с этим среднюю стоимость.
    Улучшение условий содержания снижает риск заболевания на 60–70%, но требует
    высокой сложности внедрения и также отличается высокой стоимостью. Мониторинг
    позволяет выявлять заболевание на ранней стадии в 80% случаев, при этом имеет
    среднюю сложность внедрения и среднюю стоимость.
  vaccination_recommendations: |
    Важным моментом в борьбе с сальмонеллезом являются вакцинопрофилактика и
    иммунотерапия. В неблагополучных по сальмонеллезу хозяйствах специфическую
    профилактику следует начинать с иммунизации супоросных свиноматок с последующей
    вакцинацией поросят. В крупных свиноводческих комплексах, стационарно
    неблагополучных по сальмонеллезу, рекомендуется использовать вакцину из
    супрессорного ревертанта, которую вводят супоросным свиноматкам двукратно,
    подкожно, первый раз за 35-40 дней, второй - за 25-30 дней до опороса. Поросят,
    полученным от вакцинированных свиноматок, вакцинируют перорально в возрасте
    15-18 дней и повторно - в возрасте 20-30 дней. В лечебных целях нужно
    использовать гипериммунную сыворотку, которую вводят поросятам подкожно или
    внутримышечно.
  pathogenesis: |
