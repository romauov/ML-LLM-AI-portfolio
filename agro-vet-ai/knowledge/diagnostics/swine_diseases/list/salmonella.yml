  causes_and_risks: |
    Причины возникновения, риск заноса. 1) Инфекция Salmonella spp.: Бактерия
    передаётся через заражённые корма, воду, фекалии, оборудование или прямой
    контакт с инфицированными животными. 2) Антисанитарные условия: Грязные
    помещения, отсутствие дезинфекции и плохая вентиляция способствуют
    распространению. 3) Стресс: Отъём, транспортировка, перегруппировка снижают
    иммунитет, увеличивая восприимчивость. 4) Плохое качество кормов: Заражённые
    корма или вода являются основным источником инфекции. 5) Вторичные инфекции:
    Сальмонеллёз часто осложняет другие заболевания, такие как вирусный
    гастроэнтерит или цирковирус. Экономический эффект 1) Падёж части заболевшего
    молодняка. Заболеваемость и летальность поросят зависят от возраста, породы,
    сезона года, условий содержания и кормления, типа хозяйства и других причин. 2)
    Затраты на лечение. Часто лечение осложняется тем, что возбудители приобретают
    устойчивость к широко применяемым антимикробным препаратам.  3) Дополнительные
    расходы на откорм. переболевших животных, отстающих в росте и развитии. 4)
    Ветеринарно-санитарные мероприятия. по ликвидации и профилактике заболевания. В
    развитых экономически странах сальмонеллёз приносит ощутимые потери. Например, в
    США убытки такого рода оценивались в 2 млрд долларов, в Канаде — в 300 млн
    долларов.