Репродуктивно-респираторный синдром (РРСС):
  disease_name: РРСС
  etiology: |
    Возбудителем болезни является плеоморфный, РНК-содержащий вирус рода
    Arterivirus, семейства Arteriviridae, размером 45—65 нм. Он имеет наружную
    оболочку и чувствителен к липидным растворителям. Известны два генотипа вируса —
    американский и европейский. Штаммы вируса РРСС различаются по вирулентности,
    антигенной структуре и последовательности нуклеотидов и геномной РНК. Для
    изоляции вируса используют альвеолярные макрофаги свиней и культуру клеток
    МАРС—145. Вирус РРСС можно культивировать на культуре клеток трахеальных колец
    свиней, альвеолярных макрофагов поросят и перевиваемых клеточных линиях
    MARS-145, CL-2621, CRL-1117). Выделенные изоляты идентифицируют с помощью
    полимеразной цепной реакции (ПЦР) или других реакций. В культурах легочных
    макрофагов вирус РРСС вызывает ЦПИ в виде округления клеток с последующим
    пикнозом и отделением от монослоя в течение 2-4 суток. При +4' он снижает свою
    активность на 50% через 139 часов, при +37* — через 3 часа, а при +56* — через 6
    минут.
  epidemiology: |
    К возбудителю РРСС восприимчивы свиньи всех возрастов и пород. Источником
    возбудителя инфекции служат больные и переболевшие свиньи, выделяющие вирус с
    носовой слизью, фекалиями, мочой и спермой. Вирус РРСС длительно присутствует в
    организме свиней. Наиболее активно передача вируса происходит при прямом
    контакте восприимчивых и больных животных (с выделениями от больных свиней).
    Вирус может передаваться через сперму хряков-производителей при случке или при
    искусственном осеменении. Имеются сведения об аэрогенной передаче вируса на
    расстояние 3...20 км от источника заражения. Возможна вертикальная —
    трансплацентарная передача вируса. Факторами передачи возбудителя РРСС служат
    инфицированные корма, вода, воздух, навоз, транспорт, спецодежда, грызуны,
    обитающие на ферме, и другие объекты внешней среды. При определенных условиях
    мясо больных свиней может быть фактором передачи возбудителя инфекции. Чаще
    всего РРСС возникает после приобретения клинически здорового ремонтного
    поголовья свиней, у которых возможно вирусоносительство или бессимптомное
    течение болезни в скрытой форме. Обостряют РРСС и переводят латентную стадию
    болезни в острую различные стрессовые явления, связанные с изменениями в
    кормлении, уходе, транспортировке и перегруппировке, ветеринарными
    профилактическими манипуляциями. Обычно инфекция проявляется через 3...5 мес
    после завоза племенных свиней из неблагополучных хозяйств.
  pathogenesis: |
    Проникнув в организм через слизистые оболочки респираторного, пищеварительного
    или полового тракта, вирус размножается в макрофагах в области ворот инфекции. К
    7-му дню заражения разрушается до 40 % альвеолярных макрофагов. Размножение
    вируса в компонентах клеточной защиты (иммуносупрессия) временно снижает местную
    резистентность, тем самым создавая условия для инфицирования животных другими
    возбудителями через респираторный тракт. Большое значение в патогенезе имеет
    виремия, которая длится от 4 до 8 нед, при этом отмечаются повреждение
    эндотелиальных клеток кровеносных сосудов и развитие васкулитов, что служит
    причиной отеков тканей. Кроме того, возбудитель РРСС во внутренних органах
    размножается в ретикулоцитах, а также циркулирующих моноцитах. Плацента, как и
    альвеолярные макрофаги, представляет собой орган-мишень для вируса РРСС. В
    местах соединения с маткой она отслаивается из-за некротического распада клеток,
    в результате чего инфицированные макрофаги мигрируют через плаценту и
    размножаются в тканях плода. При респираторном синдроме вирус сначала
    развивается в альвеолярных макрофагах, разрушает часть из них, нарушает иммунную
    систему легких и тем самым открывает ворота для секундарной микрофлоры. В
    результате инфекции подавляется активность ресничек мерцательного эпителия
    дыхательных путей, что способствует развитию и накоплению в них возбудителей,
    обладающих тропизмом к эпителию респираторного тракта.
  clinical_findings: |
    Инкубационный период у животных различного возраста варьируется от 4 до 35 дней.
    Различают три фазы острой инфекции: начальную фазу, фазу максимального развития
    клинических признаков и финальную. Встречаются клинически выраженная и скрытая
    (при персистенции возбудителя в легочных макрофагах) формы болезни. Первые
    признаки заражения в благополучном ранее хозяйстве могут проявляться симптомами
    поражения только органов дыхания или репродуктивных органов. Респираторный
    синдром в первую очередь наблюдается у свиноматок, хряков или свиней на откорме.
    Затем заболевают свиньи всех возрастов. При остром течении регистрируют
    угнетение, отказ от корма, кратковременное повышение температуры тела до 40,5-
    41 °С или редко ее понижение. У 1- 5 % свиней наблюдается скоротечный цианоз
    ушей, пятачка, хвоста, кожи молочных желез, вульвы, который продолжается от
    нескольких часов до нескольких дней. Этот необычный признак позволил назвать
    болезнь «синий аборт», или «синее ухо». Поражение репродуктивной системы
    проявляется главным образом поздними абортами (после 90 дней супоросности),
    преждевременными родами (на 2- 4 дня) у 5- 30 % свиней, иногда задержкой
    опороса, высоким уровнем повторных осеменений (20- 40 %) и гибелью поросят в
    течение первых 2- 7 дней после рождения (5- 10 %). Наряду с живыми
    новорожденными, обычно погибающими в течение первой недели, рождаются мертвые,
    мумифицированные плоды, нежизнеспособные и уродливые поросята (от 6 до 13,2 %),
    у которых отмечают недоразвитие нижней челюсти (боксерская челюсть) или ее
    искривление, куполообразность головы, аномалии развития скелета, патологию глаз.
    Иногда у поросят отсутствует или слабо развит сосательный рефлекс, наблюдается
    тремор мышц. Поросята, родившиеся от больных свиноматок, страдают
    конъюнктивитами, диареей, отеками, воспалением век, крипторхизмом. Время родов у
    свиноматок удлиняется на 2- 4сут, снижается интенсивность потуг и схваток. На 1-
    3 дня задерживается выход части плодов, возрастает пик задержки плаценты с
    последующим развитием синдрома метрит-мастит-агалактия. После абортов
    увеличивается длительность сервис-периода. У переболевших свиноматок может
    отмечаться продолжительное снижение на 10- 15 % числа поросят в помете. У хряков
    болезнь проявляется угнетением, импотенцией и ухудшением качества спермы, иногда
    — атрофией тестикулов. Респираторный синдром характеризуется учащением дыхания и
    кашлем. У взрослых животных он быстро проходит. У поросят различного возраста
    признаки поражения органов дыхания продолжают прогрессировать, что связано с
    секундарной инфекцией. У откормочных поросят наиболее частыми клиническими
    признаками инфекции служат одышка смешанного типа, учащенное и затрудненное
    дыхание, кашель, рвота, кожные геморрагии. При аускультации выявляют жесткое
    везикулярное дыхание, иногда пузырчатые хрипы в области бронхов и верхушечных
    долей легких. Периодами по 5- 7 дней наблюдается ремитирующая лихорадка. Около
    60 % сосунов и отъемышей страдают нарушением центральной нервной системы,
    сопровождающимся временным парезом и параличом конечностей, шаткостью походки и
    чрезмерной возбудимостью. После острой, клинической фазы (4- 5 мес) наступает
    хроническая фаза, которая длится 7- 12 мес и характеризуется отставанием поросят
    в росте и повышенной смертностью из-за респираторных и других болезней.
    Респираторный синдром наиболее типичен для молодняка. Примерно у 30 % животных
    наблюдают поражения глаз со следующей динамикой: катаральный конъюнктивит —
    гнойный конъюнктивит — кератит — панофтальмит — вытекание глазного яблока и
    слепота. В латентную фазу инфекции у переболевших свиноматок рождаются здоровые
    поросята, у которых в отъемный период исчезает колостральный иммунитет. Поэтому
    они заражаются РРСС, болеют, могут быть вирусоносителями и вирусовыделителями.
    После отъема среди таких поросят наблюдается отход более 50 %. Тяжесть болезни
    зависит от условий содержания и кормления животных, наличия стресс-факторов, а
    также секундарных инфекций.
  postmortem_findings: |
    На вскрытии абортированных или погибших новорожденных поросят обнаруживают
    уродства, отечность и кровоизлияния в кожу ушей, спины, брюшной стенки и
    подкожную клетчатку, перикардит, гидроторакс и асцит, ателектаз, гиперемию и
    кровоизлияния в легких, дегенеративные процессы с кровоизлияниями в сердце и
    печени, негнойные энцефалиты. В перитрахеальной и паховой областях студневидные
    отеки. Глаза у таких поросят могут быть голубого или красного цвета.
    Интерстициальная пневмония — типичный признак РРСС, обусловленный вторичной
    микрофлорой. У свиноматок характерных патологоанатомических изменений, кроме
    поражения матки в период абортов, а при хроническом течении — абсцессов в
    молочной железе, не обнаруживают.
  diagnosis: |
    Эффективная диагностика РРСС включает вакцинацию (эффективность 50-80%,
    однородность с полевым вирусом), соблюдение правил технологии производства
    свиней на РРСС позитивной ферме, мультисайт или моноблок путь комплектации фермы
    ремонтом. Цель проведения мониторинга РРСС: 1 шаг - оценка текущей
    эпизоотической ситуации с постановкой диагноза РРСС; 2 шаг - присвоение
    площадкам РРСС позитивным площадкам текущего РРСС статуса (РРСС позитивный
    активная вспышка, РРСС позитивный не стабильный, РРСС позитивный условно
    стабильный, РРСС позитивный стабильный). Мониторинг РРСС Biochek позволяет
    сделать оценку текущей ситуации по РРСС и спрогнозировать дальнейшее развитие
    РРСС на ферме. 1 шаг мониторинга РРСС: Цель - Определяем уровень РРСС
    стабильности репродуктора. ИФА протокол отбора по 10 проб сыворотки крови от
    маточного поголовья через 1,5-2 месяца после вакцинации: Ремонт перед вводом в
    основное стадо, Ремонт 80 дней супоросности, Свиноматки 1-2 цикл, Свиноматки 3-4
    цикл. ПЦР протокол отбора: Кастрационный экссудат от поросят в 3 дня жизни – 1
    пуллированная проба с 10 станков ежемесячно; В среднем один пулл слюны от 20
    голов рем свинок ежемесячно. Ключевой фактор в дифференциации поствакцинального
    иммунитета от постинфекционного или бустерного! В случае постоянных ковровых
    ревакцинаций при отсутствии контакта с полевым вирусом напряженность вакцинного
    иммунитета существенно снижается с допустимым появлением серо негативных
    животных уже через 1.5-2 месяца после ковра. 2 шаг мониторинга РРСС: Цель –
    определяем уровень РРСС стабильности на поголовье поросят (опорос, доращивание,
    откорм). Протокол отбора ПЦР сыворотка крови: Поросята 14-21 день 3 пула ПЦР
    ежемесячно или ежеквартально; Поросята 30 дней, 40 дней, 50 дней по 3 пула ПЦР
    ежемесячно или ежеквартально. Протокол отбора ИФА по 10 проб сыворотки крови
    каждый возраст: поросята 20, 45, 70, 100, 130, 170 дней жизни – раз в квартал.
  differential_diagnosis: |
    Аборты, мертворожденность отмечаются при микотоксикозах, ящуре, везикулярной
    болезни свиней, везикулярной экзантеме свиней, классической чуме свиней, болезни
    Ауески, энцефаломиокардите, парво-, энтеро-, парамиксо-, реовирусных инфекциях,
    лептоспирозе, хламидиозе, листериозе и сальмонеллезе. Необходимо
    дифференцировать респираторную форму РРСС от гриппа, пастереллеза и других
    болезней с респираторным синдромом.
  prevention: |
    Биологическая безопасность и гигиена: строгий контроль доступа к свиноферме,
    ограничение контакта с посторонними свиньями, обеспечение чистоты и дезинфекции
    помещений, использование специальной одежды и обуви для персонала, а также
    установка систем контроля и предотвращения инфекций. Вакцинация: существуют
    различные вакцины для предотвращения или снижения тяжести инфекции PRRSV.
    Контроль и мониторинг заболевания: регулярный мониторинг заболевания, включая
    проведение лабораторных тестов для выявления наличия вируса или антител к нему,
    а также следящие программы для отслеживания распространения и динамики
    заболевания. Санитарно-ветеринарные меры и карантин: тщательный мониторинг и
    тестирование новых свиней перед их введением в стадо, обеспечение изоляции и
    контролируемого взаимодействия новых животных с существующей популяцией свиней.
    Обучение и обмен информацией: обучение свиноводов и персонала свинофермам о
    симптомах, профилактике и контроле РРСС, регулярный обмен информацией и опытом
    между свиноводами, ветеринарами и научными исследователями.
  treatment: |
    Эффективного противовирусного препарата нет. Основной акцент делается на
    предупреждение осложнений от вторичных инфекций. Рекомендуется применение
    антибиотиков длительного действия, таких как окситетрациклины или амоксициллин,
    введение витаминов и минеральных добавок.
  vaccination_recommendations: |
    3 основных условия для эффективной вакцинации поросят против РРСС: 1. Проведение
    сегментирования – при однородности более 90% эффективность работы MLV вакцин
    будет достаточно высокой. 2. Вакцинируемые поросята MLV вакцинами РРСС в момент
    вакцинации не должны быть носителями полевого вируса РРСС. 3. После вакцинации
    MLV вакцинами РРСС поросята должны контактировать с полевым вирусом РРСС не
    ранее чем через 21 день после вакцинации.
  causes_and_risks: |
    Основные пути распространения: Выделения (вирус содержится в носовых секретах,
    моче, фекалиях и слюне); Аэрозольный путь (передача возможна на расстоянии до
    трёх километров); Искусственное оплодотворение (использование спермы в течение
    первых четырёх недель после вспышки увеличивает риск распространения вируса);
    Переносчики (взрослые животные быстрее разносят вирус (около двух недель), тогда
    как молодняк — дольше (1–2 месяца)); Загрязнённая одежда и оборудование
    (механическое распространение через одежду и инструменты); Холодная погода
    (перемещение свиней в прохладных условиях ускоряет распространение инфекции);
    Птицы-переносчики (дикие утки и некоторые виды птиц потенциально переносят
    вирус). Экономический эффект: Зафиксированы случаи снижения показателей
    воспроизводства вплоть до увеличения частоты повторного осеменения и бесплодия.
    Уровень продуктивности снижается постепенно в течение года после первичной
    вспышки: сокращение количества родов на 10–15%; рост процента нежизнеспособных
    поросят; уменьшение размеров помёта; учащение ранних опоросов и абортов.
    Последствия сохраняются ещё полгода после исчезновения острых проявлений
    болезни.
