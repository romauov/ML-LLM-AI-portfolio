Actinobacillus pleuropneumoniae: # Актинобациллезная плевропневмония свиней (АПП)
  disease_name: |
    Актинобациллезная плевропневмония свиней (АПП)
  etiology: |
    Впервые о болезни сообщили в 1957 году, в 1963 г. X. Оландер описал в хозяйствах
    Калифорнии септически протекающую болезнь свиней и из пораженных легких выделил
    гемоглобинофильный микроорганизм, названный им Haemophilus parahaemolyticus. В
    дальнейшем аналогичная болезнь с преимущественным поражением легких и плевры
    была зарегистрирована в свиноводческих хозяйствах Дании, Швеции, Канады и других
    стран. В нашей стране болезнь впервые установлена и изучена в свиноводческих
    комплексах в 1979 г. Термин «гемофилезная плевропневмония» применялся ранее и в
    настоящее время устарел, поскольку возбудитель в 1983 году был перемещен из рода
    Haemophilus в род Actinobacillus. Характеризуется развитием пневмонии и плеврита
    преимущественно в каудо-дорсальных областях легких. Термин «гемофилезная
    плевропневмония» применялся ранее и в настоящее время устарел, поскольку
    возбудитель в 1983 году был перемещен из рода Haemophilus в род Actinobacillus.
  epidemiology: |
    Actinobacillus pleuropneumoniae (ранее Haemophilus pleuropneumoniae, H.
    parahaemolyticus) – грамотрицательная капсулообразующая плеоморфная палочка. На
    сегодняшний день известно 2 биовара (подтип 1 и 2) A. pleuropneumoniae, которые
    включают 15 серотипов микроорганизма. Все эти серотипы подразделяются на:
    высоко-, средне- и низковирулентные. Данная таблица описывает характеристики *A.
    pleuropneumoniae* в зависимости от их вирулентности. A. pleuropneumoniae
    классифицируется по степени вирулентности: высокая, средняя и низкая. При
    высокой вирулентности наблюдаются высокая смертность и обширные поражения
    легких. К этому типу относятся серотипы 1, 5(a,b), 9, 11, 10, 14, продуцирующие
    токсины APX I + APX II. Средняя вирулентность характеризуется низкой смертностью
    и сильными поражениями легких. Сюда входят серотипы 2, 4, 6, 7, 8, 12, 15 (13),
    которые вырабатывают токсины APX II + APX III. Наконец, при низкой вирулентности
    смертность не указана, а поражения имеют низкое эпидемиологическое значение. В
    основном это серотип 3, продуцирующий токсин APX III. Серологическая
    специфичность данного микроорганизма и разделение на серотипы обусловлены
    различиями в строении капсульных полисахаридов и клеточных липополисахаридов
    (англ. lipopolysaccharides (LPS)). В связи с тем, что некоторые серотипы имеют
    похожую структуру длинноцепочечных OLPS, наблюдаются перекрестные реакции и
    трудности серологической дифференциации между некоторыми из серотипов (например,
    серотипы: 1-9-11, 3-6-8, 4-7).Важнейшими факторами патогенности Actinobacillus
    pleuropneumoniae являются токсины. Наиболее изученными считаются токсины Apx I,
    Apx II, Apx III. Что касается токсина Apx IV, то он экспрессируется в процессе
    инфицирования животных.
  clinical_findings: |
    При сверхостром течении у животных резко повышалась температура тела до 42° С.
    Поросята были сильно угнетены, дыхание частое и затрудненное, наблюдалась рвота;
    кожа ушей, пятачка и живота имела сине-красное окрашивание. В агональной стадии
    отмечали истечение из носовых отверстий пенистой кровянистой жидкости. Смерть
    наступала в течение 8-24 часов после появления первых клинических признаков
    болезни. При острой форме болезни у свиней наблюдали повышение температуры тела
    до 41° С, одышку, приступы изнурительного кашля, пенистые истечения из носа.
    Животные погибали с симптомами асфиксии в течение 2-5 суток. При переходе
    заболевания в хроническую форму у некоторых животных отмечали появление
    отечности тканей вокруг суставов, преимущественно дистальных отделов
    конечностей. Хроническое течение актинобациллезной плевропневмонии проявлялось в
    виде кратковременного (3-5 дней) повышения температуры тела, кашля, учащенного
    дыхания брюшного типа, бледности кожных покровов, отставания в росте и развитии.
  postmortem_findings: |
    Сверхострое течение. При вскрытии трупов наблюдали геморрагическое воспаление
    легких с выраженным отеком интерстициальной соединительной ткани. Указанный
    признак находил свое отражение в описании другими исследователями
    патологоанатомических изменений, вызванных A. pleuropneumoniae. Пораженные
    участки легких были плотной консистенции, вишнево-красного цвета, выступали над
    поверхностью окружающей нормальной ткани, при надавливании с поверхности разреза
    стекала кровянистая жидкость. У павших животных фиксировали скопление жидкости
    темно-красного цвета в грудной полости в объеме до 200 мл, которая, по
    литературным данным, может иметь в своем составе фибрин. У поросят, зараженных
    интратрахеально и интраназально, были выявлены фибринозный плеврит и перикардит,
    а также серозно-геморрагическое воспаление бронхиальных и средостенных
    лимфатических узлов. Было отмечено незначительное увеличение селезенки. Острое
    течение. На вскрытии трупов наблюдали лобарное, чаще одностороннее
    геморрагическое воспаление легких с выраженным отеком интерстициальной
    соединительной ткани. Пораженные участки легких были плотные, вишнево-красного
    цвета, выступали над поверхностью окружающей нормальной ткани, при надавливании
    с поверхности разреза стекала кровянистая жидкость. Отмечали признаки
    фибринозного плеврита и перикардита, а также серозно-геморрагического воспаления
    лимфатических узлов. При хроническом течении болезни патологоанатомические
    изменения проявлялись наличием инкапсулированных очагов некроза в легких,
    несколько выступающих над неповрежденными областями, фибринозным плевритом и
    перикардитом, спайками между легочной и костальной плеврой, а также скоплением в
    грудной полости небольшого количества мутноватой жидкости с примесью крови.
    Полученные данные согласуются с материалами исследований других авторов.
  diagnosis: |
    Диагноз ставится комплексно, на основании совокупности эпизоотологических и
    патологоанатомических данных, клинических признаков, а также результатов
    лабораторных исследований (серологических, бактериологических или
    молекулярнобиологических). В зависимости от используемого метода, производится
    отбор различных биологических образцов (сыворотка крови, кусочки пораженной
    легочной ткани, бронхиальные и средостенные лимфатические узлы). Отбор образцов
    для лабораторных исследований, его доставка и интерпретация результатов являются
    важнейшими мероприятиями, ошибки, при проведении которых, приводят к искажению и
    получению недостоверных сведений о ситуации в хозяйстве! Для серологической
    диагностики данной инфекции широко используется выявление специфических антител
    против капсульных и клеточных антигенов. Однако надо отметить, что защита
    животных от Actinobacillus pleuropneumoniae обеспечивается не только
    гуморальной, но и клеточной составляющей иммунной системы. Поэтому использование
    серологической диагностики для подтверждения иммунного статуса вакцинированного
    стада должно применяться с определенной осторожностью. И хотя разнородность
    титров специфических антител у животных одинакового возраста может косвенно
    указывать на неоднородность иммунитета, важнейшими показателями эффективности
    профилактики были и остаются: 1) заболеваемость/клиническое состояние животных;
    2) сохранность по технологической группе; 3) отсутствие характерных для АПП
    патологических изменений в легких вакцинированных животных (плевритов в
    дорсо-каудальных долях), выявляемых при постубойном обследовании животных
    (расчет индекса АПП). ИФА на обнаружение антител к токсину ApxIV - несмотря на
    то что патологических изменений токсин ApxIV не вызывает, он активно
    используется в диагностике болезни. Токсин Apx IV обнаруживается только у
    инфицированных особей. Организм животного вырабатывает специфические антитела
    против этого токсина. Выявление (в сыворотках крови животных) специфических
    антител против токсина Apx IV позволяет утверждать, что обследованные животные в
    прошлом контактировали с микроорганизмом Actinobacillus pleuropneumoniae в
    интервале от трех-четырех недель до трех-четырех месяцев. Как правило, токсин
    Apx IV сопровождает все три токсина (Apx I, Apx II, Apx III). 1) Комбинация ПЦР
    и ИФА при мониторинге ЦВС-2 это эффективный мониторинг по быстрой диагностики и
    контролю субклиники ЦВС-2 на вакцинированном поголовье поросят; 2)	Конечная цель
    при диагностики ЦВС-2 является коррекция схемы вакцинации и технологии для
    устранения проблем с субклиническим течением ЦВС-2; 3)	Возможная вакцинация
    свиноматок и обязательная ревакцинация рем свинок для защиты маточного стада от
    репродуктивного проявления ЦВИС; 4)	Корректировка вакцинации поросят.
  differential_diagnosis: |
    При дифференциальной диагностике следует исключить гемофилезный полисерозит и
    пастереллез может быть проведена в условиях свиновод исключить респираторную
    форму РРСС, классическую чуму, микоплазмоз, пастереллез, сальмонеллез, болезнь
    Ауески, актинобациллярную плевропневмонию, т.е. все заболевания, приводящие к
    истощению поросят.
  prevention: |
    Самым эффективным методом профилактики является иммунизация инактивированными
    бактерин-токсоидными вакцинами, содержащими в своем составе как бактерины так и
    анатоксины, такими как «Полиплевросин АРХ ИМ», содержащей в своем составе:
    1)	Actinobacillus pleuropneumoniae (Актинобациллёзная плевропневмония) серотип
    2, 9 , токсоид APX I, II, III по 1.5 мкг каждого анатоксина в 1 мл;
    2)	Pasteurella multocida серотип А, D; 3)	Bordetella bronchiseptica; 4) В
    качестве адъюванта Montanide ISA 25 VG.
  treatment: |
    Лечение производится антибактериальными препаратами на основе: фениколов –
    флорфеникол; макролидов – китасамицин, тилмикозин; фторхинолонов –
    марбофлоксацин; азалидов - азитромицин.
  vaccination_recommendations: |
    **1. Вакцинация поросят** Иммунизация поросят проводится двукратно, начиная с
    **42-дневного возраста**, с ревакцинацией через 2-3 недели. Оптимальный срок
    введения вакцины определяется в соответствии с инструкцией производителя и
    эпизоотической ситуацией в хозяйстве.
    **2. Вакцинация свиноматок и ремонтных свинок** Для профилактики АПП у
    свиноматок и ремонтного молодняка применяют **индивидуальную** вакцинацию: 1) Не
    вакцинированных ремонтных свинок и свиноматок вакцинируют двукратно: вакцинация
    70-77 день супоросности, ревакцинация 91-98 день супоросности; 2)
    Вакцинированных ремонтных свинок и свиноматок вакцинируют однократно: 91-98 день
    супоросности в каждом цикле. Оптимальный срок введения вакцины определяется в
    соответствии с инструкцией производителя и эпизоотической ситуацией в хозяйстве.
  pathogenesis: |
    В патогенезе актинобациллезной плевропневмонии, по мнению многих авторов,
    большую роль играют компоненты микробных клеток Actinobacillus Авторы сообщают о
    трех компонентах: 1) полисахаридах капсулы, 2) липополисахаридах, 3) токсинах.
    Полисахариды капсулы Actinobacillus pleuropneumoniae защищают микробную клетку
    от фагоцитоза и от действия антител, что поддерживает вирулентность.
    Липополисахариды - структурные компоненты наружной оболочки бактерии. Они
    позволяют Actinobacillus pleuropneumoniae «прилипать» к клеткам эпителия
    дыхательных путей, что является важным фактором вирулентности.Токсины
    Actinobacillus pleuropneumoniae (их 4 вида) АРХ I, АРХ II, АРХ III, АРХ IV
    вызывают изменения в тканях: токсины АРХ I и АРХ II обладают гемолитическим и
    цитотоксическим свойствами, АРХ III оказывает цитотоксическое, а АРХ IV -
    гемолитическое действие. Установлено, что при попадании в органы дыхания
    возбудитель подавляет гуморальные и клеточные компоненты иммунитета, так как
    обладает цитотоксическим действием на лейкоциты периферической крови, а
    вырабатываемый им фермент протеиназа разрушает иммуноглобулины класса А.
    Колонизация возбудителя на слизистых оболочках верхних дыхательных путей
    рассматривается как первичный этап в развитии инфекции. Определенная роль в этом
    процессе отводится адгезии (прилипанию). Дальнейшее развитие инфекционного
    процесса определяется иммунологическим статусом животных, влиянием факторов
    специфического и неспецифического порядка. Попадая в легкие, возбудитель
    интенсивно размножается и начинает выделять экзотоксины. Установлено, что
    культуры Actinobacillus pleuropneumoniae синтезируют гемолизин и цитотоксин, и
    культуральная жидкость, содержащая их, обладает токсичностью для нейтрофилов и
    макрофагов. Оба этих токсина термолабильны, чувствительны к трипсину,
    холестерину, кислороду и рассматриваются как ведущие факторы вирулентности. При
    воздействии макрофагов происходит разрушение бактериальной клетки, в результате
    чего высвобождается большое количество эндотоксинов. Сочетанное действие
    экзотоксинов и эндотоксинов, а также протеолитических ферментов погибших
    микробных клеток возбудителя обусловливает поражение легочной паренхимы,
    развитие фибринозно-некротизирующей пневмонии, серозно-фибринозного воспаления
    легочной и реберной плевры, а также наружного листка сердечной сорочки.
    Развивается геморрагическое воспаление легких, которое быстро распространяется
    на всю долю с захватом и других легочных долей. Больные животные погибают от
    эндотоксического шока и кислородной недостаточности в течение 1-2 суток.
  causes_and_risks: |
    *Актинобациллезная плевропневмония свиней (АПП)* является одной из наиболее
    распространенных и экономически значимых болезней в свиноводстве. Заболевание
    обладает высокой контагиозностью и устойчивостью во внешней среде, что
    способствует его глобальному распространению. Основные пути передачи включают
    прямой контакт между животными, аэрогенный механизм, а также вертикальную
    передачу от инфицированных свиноматок потомству. Кроме того, может переноситься
    с инфицированными кормами, водой, оборудованием, транспортными средствами и
    обслуживающим персоналом. Риск заноса АПП в благополучные хозяйства особенно
    высок при ввозе невакцинированного поголовья, несоблюдении карантинных
    мероприятий и недостаточной биобезопасности. В условиях интенсивного
    свиноводства циркуляция АПП часто осложняется микст-инфекциями (например
    стрептококкоз, РРСС, парвовирус, микоплазмоз, гемофилёз), что усугубляет
    клиническое течение болезни и увеличивает экономический ущерб. Для минимизации
    рисков необходимо строгое соблюдение противоэпизоотических мер, включая
    регулярную диагностику, вакцинопрофилактику и контроль перемещения животных.
    Анализ данных показал, что экономические потери, связанные с заболеванием АПП,
    могут достигать 2500 руб/1м2 производственных площадей. 