Мико:
  disease_name: |
    Микоплазменная пневмония свиней
  etiology: |
    Различные виды микоплазм относятся к классу Mollicutes и характеризуются
    отсутствием клеточной стенки. Микоплазмы – это самые маленькие и простейшие
    самовоспроизводящиеся организмы. Их жизнедеятельность всецело зависит от хозяина
    и его питательных веществ. В 2018 году было предложено изменить название с
    M.hyopneumoniae на Mesomycoplasma hyopneumoniae. M.hyopneumoniae вызывает
    хроническую, а при неблагоприятных условиях и острую инфекцию дыхательных путей.
    Различия в патогенности объясняются наличием видоспецифичных генов, участвующих
    в метаболических путях, таких как мио-инозитольный путь у M.hyopneumoniae. В
    пределах вида M.hyopneumoniae существует множество различных штаммов.
  epidemiology: |
    Mycoplasma hyopneumoniae вызывает микоплазменную пневмонию у свиней, иногда
    называемую энзоотической пневмонией. Это специфичный для хозяина плеоморфный
    организм, не имеющий клеточной стенки, требовательный к условиям и меньший по
    размеру, чем большинство бактерий. Он быстро инактивируется в окружающей среде и
    под действием дезинфицирующих средств, но может дольше сохраняться в холодную
    погоду. Микоплазменная пневмония часто осложняется другими микоплазмами,
    бактериями и вирусами. У 30–80 % забитых свиней обнаруживаются поражения,
    связанные с M hyopneumoniae инфекцией. Свиньи восприимчивы к инфекции в любом
    возрасте, но заражаются в первые несколько недель жизни от матери или других
    молодых свиней. Передача инфекции поросятам-сосунам может происходить от
    свиноматок любого возраста, но чаще всего от свинок. Заболевание может наиболее
    ярко проявляться на этапе откорма в возрасте ~18–20 недель. Частота поражения
    лёгких наиболее высока у свиней в возрасте 3–5 месяцев. Иммунитет
    вырабатывается медленно. Бактерия может сохраняться в дыхательных путях
    инфицированных животных до 7 месяцев.
  pathogenesis: |
    M.hyopneumoniae попадает в организм свиньи при вдохе. Для вызова инфекции
    необходимо преодолеть барьеры в дыхательных путях. M.hyopneumoniae содержит по
    меньшей мере 35 белков, обеспечивающих адгезию к респираторному эпителию,
    включая адгезины Р97 и Р102, которые связываются с ресничками и компонентами
    внеклеточного матрикса. После адгезии начинается разрушение ткани.
    M.hyopneumoniae производит перекись водорода и метаболиты с использованием
    глицерина, которые могут быть цитотоксичными. M.hyopneumoniae способна поглощать
    мио-инозитол, катаболизировать его и применять в качестве основного источника
    энергии, что играет важную роль в патогенности. Липид-ассоциированные мембранные
    белки (LAMPs) взаимодействуют с клетками хозяина через toll-подобные рецепторы
    (TLR), индуцируя выработку оксида азота, активных форм кислорода и активируя
    каспазу 3, что приводит к апоптозу альвеолярных макрофагов. M.hyopneumoniae
    может быть обнаружена внутриклеточно в свободном виде или в эндоцитарных
    везикулах.
  clinical_findings: |
    Микоплазмоз свиней проявляется в двух формах: острой и хронической. Острая форма
    сопровождается выраженными симптомами, тогда как хроническая форма менее
    заметна. Основные симптомы: сухой, периодический кашель, усиливающийся утром,
    при кормлении или движении; учащенное дыхание (70–80 движений в минуту),
    переходящее в одышку; слизистые выделения из носа, чихание. Общее состояние:
    повышение температуры до 40,5°C, апатия, снижение аппетита, слабость.
    Репродуктивные проблемы: у свиноматок — аборты, рождение слабых или
    нежизнеспособных поросят. Осложнения: пневмония, воспаление суставов (колени,
    запястья), конъюнктивит, кератит. Острая форма: выраженные респираторные
    симптомы, высокая температура, цианоз слизистых. Вторичные инфекции, такие как
    Pasteurella multocida, увеличивают летальность до 15%. Хроническая форма: легкий
    кашель, незначительное снижение продуктивности, скрытое носительство. Симптомы
    варьируются в зависимости от возраста свиней, условий содержания и наличия
    других инфекций. У поросят 0–3 месяцев заболевание протекает тяжелее.'
  postmortem_findings: |
    Уплотнение легочной ткани, очаги пневмонии, слизистые пробки в бронхах,
    кровоизлияния, увеличение бронхиальных лимфоузлов.
  diagnosis:  |
    Диагностика микоплазмоза свиней требует комплексного подхода, включая
    клинический осмотр, лабораторные анализы и оценку условий содержания.
    Лабораторные методы: Иммуноферментный анализ (ИФА) для определения антител к
    Mycoplasma hyopneumoniae в сыворотке крови. ПЦР для выявления ДНК бактерии в
    образцах легочной ткани, бронхиальных лимфоузлов или крови. Оценка легких на
    бойне – оценка эффективности вакцинации. Протокол отбора сыворотки крови для
    ИФА: поросят на откорме 160-180 день жизни (20 проб), поросята на откорме 130
    дней жизни (20 проб), поступающий ремонт (15 проб), свиноматки 1-6 цикл (40
    проб). Протокол отбора проб для ПЦР: сомнительные по ИФА рем свинки или хряки
    (БАЖ 1 проба 1 голова, прижизненно или слюна 1 проба 1 голова); клинические
    больные поросята (отбор кусочков легких, 1 голова- 1 проба посмертно); откорм
    перед убоем или ремонт перед введением в основное стадо (отбор слюны 1 проба 1
    станок, не более 15-20 голов). Комплексная ИФА, ПЦР диагностика Биочек позволяет
    с высокой точностью оценить Mhyo статус поголовья или выделить возбудитель и
    быстро поставить диагноз. ПЦР Биочек также позволяет проводить диагностику MHR
    микоплазму хиоринис и MHS микоплазму хиосиновия. Комбинация ИФА и ПЦР
    диагностики Mhyo у откормочного поголовья перед убоем является эффективным
    инструментом определения эффективности вакцинации, а также важно проводить
    исследование легких на бойне.
  differential_diagnosis: |
    Исключение пастереллеза, стрептококкоза, ПРРС, цирковируса. Проверка на
    туберкулез или микотоксикозы, вызывающие схожие симптомы.
  prevention: |
    Основой профилактики микоплазмоза является выполнение санитарно-гигиенических
    правил, соблюдение карантинных мер при завозе новых животных в хозяйство и
    вакцинация. Вакцинация ‒ важный компонент программы по искоренению микоплазмоза
    на свиноводческих предприятиях. Профилактическое введение антибиотиков поросятам
    с 6 недель. Мониторинг и контроль: ежеквартальный отбор проб крови и тканей для
    ИФА и ПЦР; осмотр стада на кашель, одышку и снижение продуктивности; анализ
    прироста массы и репродуктивных показателей.
  treatment: |
    Лечение микоплазмоза осложнено отсутствием клеточной стенки у Mycoplasma
    hyopneumoniae, что делает бактерию устойчивой к пенициллинам и цефалоспоринам.
    Современные антибиотики эффективны против микоплазм и вторичных инфекций. Хорошо
    зарекомендовали себя препараты, в составе которых имеются флорфеникол,
    тилмикозин фосфат, доксициклина гиклат, тулатромицин, тилмикозин, левофлоксацин.
  vaccination_recommendations: |
    При заражении или вакцинации против M.hyopneumoniae специфические антитела
    вырабатываются не у всех животных. При повторном заражении или вакцинации титр
    антител IgG становится выше, но снижается со временем. Антитела IgM
    обнаруживаются через девять дней после вакцинации, но их концентрация быстро
    снижается. Антитела IgA присутствуют в более низких концентрациях. Антитела
    сохраняются у животных в течение одного-трех месяцев после вакцинации.
    Микоплазмы могут уклоняться от гуморального ответа хозяина, изменяя свои
    поверхностные белки. Вакцинация племенных свиноматок в конце супоросности
    приводит к увеличению специфических антител и Т-клеток в сыворотке крови и
    молозиве, которые передаются поросенку после рождения. Поросята от
    вакцинированных свиноматок имеют более высокие концентрации специфичных к
    M.hyopneumoniae антител при отъеме и даже через две недели после отъема.
    Вакцинация поросят против M.hyopneumoniae в основном проводится в период подсоса
    или незадолго до отъема. Она уменьшает тяжесть поражения легких и стоимость
    лечения, но не предотвращает передачу патогена другим животным. Вакцинация
    поросят с 6 недель снижает заболеваемость на 60–80%.
  causes_and_risks: |
    Фактором заноса инфекции является покупка племенных свиней; рекомендуется
    карантин не менее шести недель. Отсутствие вакцинации против M.hyopneumoniae
    приобретенных или выращенных в хозяйстве племенных свиней является фактором
    риска для передачи, распространения и длительной циркуляции инфекции. Смешивание
    свиноматок в репродукторном отделении может быть фактором рециркуляции патогена;
    рекомендуется содержать их изолированно. Присутствие диких кабанов по соседству
    с домашними свиньями может быть фактором риска заноса M.hyopneumoniae в
    хозяйства с низким уровнем биобезопасности при выгульном содержании. Условия
    содержания животных (параметры микроклимата, плотность посадки) также
    способствуют развитию инфекции, например, низкая температура воздуха.
    Экономические последствия: снижение продуктивности (задержка роста на 10–20%),
    высокая смертность (до 15% при остром течении), репродуктивные потери (аборты и
    слабые поросята снижают приплод на 10–20%), экономические потери (затраты на
    лечение и снижение продуктивности увеличивают расходы на 8–12%). Эффективный
    контроль микоплазмоза позволяет снизить заболеваемость на 60–80% и смертность на
    10–15%, увеличить прирост массы на 10–15% и рентабельность на 8–12%, улучшить
    репродуктивные показатели и здоровье стада. Фермы с биобезопасностью,
    вакцинацией и мониторингом сокращают потери на 70–90% и повышают продуктивность
    на 10–15%.
