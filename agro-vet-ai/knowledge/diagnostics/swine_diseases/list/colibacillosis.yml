Colibacillosis: # Колибактериоз
  disease_name: |
    Колибактериоз, Colibacillosis (Colibacillosis) – международное название
  etiology: |
    Колибактериоз (Colibacteriosis, колиинфекция, эшерихиоз)—острая бактериальная
    болезнь, проявляющаяся у новорожденных животных профузным поносом, признаками
    тяжелой ин-токсикации и обезвоживанием организма, а у поросят отъемного возраста
    — в форме колиэнтеротоксемии (отечной болезни). Заразный характер так
    называемого белого поноса новорожденных установил Обих (1865). Енсен (1891—1893)
    доказал роль кишечной палочки в возникновении этой болезни у телят. Возбудителя
    колибактериоза впервые выделил и под названием В. coli communis описал Эшерих
    (1886), в честь которого микробы были названы Escherichia coli. Кауфман (1947)
    разработал их серологическую классификацию. В СССР колибактериоз изучали С. Н.
    Вышелесский, Р. А. Цион, А. Г. Малявин, Я. Е. Коляков, М. А. Сидоров, О. А.
    Полякова и др. Н. А. Михин (1930) изготовил специфическую сыворотку, А. М.
    Ахмедов (1958), Я. Е. Коляков, Л. С. Каврук, С. С. Гительсон выяснили значение
    отдельных серологических типов эшерихий в патологии молодняка. И. В. Квеситадзе,
    К. Н. Шерстобаев предложили бактериофаг для профилактики и лечения болезни, М.
    А. Сидоров и Т. К. Курашвили — протективиый антиген (колипротектан ВИЭВ) для
    пероральной иммунизации новорожденных телят.
  epidemiology: |
    Возбудитель — патогенные разновидности (серологические типы) Escherichia coll.
    Колиэитеротоксемию (отечную болезнь) поросят вызывают эшерихии, продуцирующие
    гемотоксин (гемолизин). Е. coil — довольно толстая, короткая (0,2—0,7х2—4 мкм)
    грамотрицательная палочка, иногда окрашивающаяся биполярно, спор и капсул не
    образует. Имеются подвижные и неподвижные варианты, причем этот признак,
    связанный с наличием или отсутствием жгутиков, варьирует в зависимости от среды
    обитания микроба. В процессе роста и размножения эшерихий продуцируют
    термолабильный и термостабильный экзотоксины, термостабильный эндотоксин,
    нейротоксин, фибринолизин, гемолизин, а также антибиотикоподобные вещества
    (колицины) белковой природы, которые являются ведущими патогенетическими
    факторами. Многие штаммы имеют на поверхности белковые ворсинки (пили); с их
    помощью бактерии прикрепляются к слизистой оболочке кишечника, где и проявляют
    свое патогенное действие. Эшерихии имеют сложную антигенную структуру. У них
    обнаружен соматический О- поверхностный К- и жгутиковый Н-антигены. По
    соматическому антигену эшерихии разделены на 160 серологических групп, у которых
    обнаружено более 100 поверхностных и более 50 жгутиковых антигенов. К-антигены
    подразделяют по своим свойствам на L, В, А и адгезивный (пили) антигены (К88,
    К99, 987Р, F-41). Эпизоотические вспышки колибактериоза вызывают штаммы
    определенных. 0-серогрупп, многие из которых содержат адгезивные К-антигены.
    Такие штаммы; называют энтеропатогенными. Среди животных одного неблагополучного
    хозяйства, или фермы могут одновременно циркулировать несколько серологических
    групп возбудителя с разным набором К- и Н-антигенов. Колиэнтеротоксемию (отечную
    болезнь) поросят послеотъемного возраста вызывают отдельные 0-серогруппы
    эшерихий, обладающие гемолитическими свойствами (0139, 0140, 0141 и Др.).
    Чувствительность эшерихий к антибиотикам сильно варьирует. Абсолютное
    большинство штаммов проявляют резистентность к пенициллину, левомицетину,
    тетрациклину, мономицину и др. Эта резистентность может быть хромосомной, как
    результат мутации в структурных генах, и внехромосомной, обусловленной
    плазмидами резистентности (R-плазмидами). Резистентность к антибиотикам, а также
    антигенные свойства могут передаваться с плазмидами при конъюгации от одних
    бактерий к другим. Устойчивость—в фекалиях и слизи эшерихий сохраняются до 30
    дней, в почве и воде—до нескольких месяцев. Нагревание до 74— 76 С убивает их за
    30 с. Губительно действуют на эшерихий растворы хлорной извести, хлорамина,
    едкого натра, формальдегида, фенола, ксилонафта и других дез. средств в обычных
    концентрациях.
  clinical_findings: |
    Колибактериоз протекает сверхостро, остро и подостро, что зависит от свойств и
    дозы возбудителя, а также от срока, количества и качества полученного
    новорожденным мате-ринского молозива. От этих причин зависит и продолжительность
    инкубационного периода, который у одних животных может длиться несколько часов,
    а у других — до 2—3 сут. Сверхострое течение чаще встречается у молодняка
    1—3-суточного возраста, и болезнь проявляется в септической форме. У больных
    животных отмечают общую слабость, отсутствие аппетита, повышение температуры
    тела на 1—2 °С, учащенное, тяжелое со стонами дыхание; пульс слабый, учащенный.
    У некоторых животных появляются кровоизлияния на слизистых оболочках глаз,
    роговой и носовой полости, слизистые истечения из ноздрей и пенистое — изо рта,
    а также клинические судороги и иногда — понос. Животные погибают в коматозном
    состоянии за 1—2 дня. Острое течение проявляется в энтеритной и септической
    формах, чаще у молодняка в первые 3—5 дней жизни. У заболевших наблюдают
    вялость, болезненность брюшной стенки, профузный понос—фекалии жидкие с
    пузырьками газа, желтоватого или серо-белого цвета со сгустками непереваренного
    молозива и иногда крови. Вследствие обезвоживания организма и токсикоза кожа у
    больных становится сухой, глазные яблоки западают, наблюдаются судороги и
    парезы. У отдельных животных в начале болезни повы-шается температура тела на
    0,5—1 °С. а в дальнейшем становится ниже нормы. Болезнь длится 3—4 дня, и
    большинство животных погибает.  У части выздоровевших возможен рецидив болезни
    на 8-10-е сутки подострое течение чаще проявляется в энтеритной форме и
    характеризуется поносом, умеренным обезвоживанием организма. Температура тела,
    как правило, в норме, лишь у отдельны» животных возможно незначительное
    повышение температуры в начале болезни, У поросят раннего постнатального периода
    (до 6—7 дней) колибактериоз может проявляться в септической и энтеритной формах
    со сверхострым, острым и подострым течением, а у поросят за несколько дней до
    отъема и после отъема от свиноматок — в энтеритной и в форме колиэнтеротоксемии
    (отечной болезни). При колиэнтеротоксемии, вызываемой гемолитическими вариантами
    эшерихий, инкубационный период длится 6—10 ч. Заболевают в основном хорошо
    развитые, упитанные поросята, жадно поедавшие корма. У них отмечаются
    покраснение и отек век, конъюнктивы, серозные истечения из глаз, шаткая походка,
    отказ от корма и воды. Затем появляются признаки поражения центральной нервной
    системы, что внешне проявляется возбудимостью, бесцельными движениями по кругу,
    подпрыгиванием и подергиванием головы. У некоторых поросят наблюдаются
    искривление шеи с поворотом головы и асимметричное отвисание ушей. При
    дотрагивании больные поросята пытаются убежать скачками, падают, совершают
    плавательные движения и хрипло визжат. После приступа судорог поросята
    успокаиваются и пытаются поедать корм, а многие погибают при судорогах. В
    дальнейшем поросята угнетены, у них повышается температура тела до 40,5—41° С,
    появляются отеки подкожной клетчатки в области лба и затылка, живота, синюшность
    кожи пятачка, ушей, конечностей и живота. На этих участках кожи появляется сыпь.
    Стадия депрессии продолжается 4—5 ч, и затем поросята погибают или медленно
    выздоравливают. Большинство больных колиэнтеротоксемией поросят погибают в
    течение 3—6 ч с момента заболевания, реже смерть наступает через 5—7 сут. В
    неблагополучном хозяйстве гибель поросят oт коли-энтеротоксемии может достигать
    10—18% к восприимчивому поголовью. Из заболевших погибает 70—97% поросят.
  postmortem_findings: |
    При колиэнтеротоксемии поросят отмечают синюшность кожного покрова, отек век,
    конъюнктивы, подслизистой части кардиальной зоны желудка, подкожной клетчатки в
    области затылка, верхней трети шеи, иногда в подчелюстном пространстве, у
    основания ушных раковин, вокруг трахеи и реже — в области живота, пахов и
    конечностей. Скелетные мышцы бледные, дряблые. Слизистые оболочки гортани,
    трахеи и бронхов инфильтрированы серозной жидкостью, с очагами гиперемии. В
    грудной и брюшной полости скапливается до 1 л серозно-фибринозного экссудата,
    серозные оболочки инфильтрированы, легкий отечны. Брыжейка пропитана
    серозно-фибринозным студневидным экссудатом. Лимфатические узлы, особенно
    мезентериальные, увеличены, отечны, темно-красного цвета, на разрезе виден
    мозаичный рисунок (мраморность). В мазках-отпечатках из этих лимфо - узлов
    обнаруживают большое количество эозинофилов. Желудок переполнен сухим кормом,
    стенка желудка студенистая, инфильтрирована, утолщена (особенно в кардинальной
    части). Слизистая оболочка желудка красного цвета, легко отслаивается; при
    снятии кормовых масс. Тонкий кишечник содержит незначительное количество корма,
    слизистая оболочка гиперемирована, покрыта слизью. Слизистая оболочка толстого
    кишечника часто докрыта отрубевидным налетом, под которым обнаруживают
    кровоизлияния. Печень кровенаполнена, дряблая, неравномерно окрашена; селезенки
    без видимых изменений. Сосуды головного мозга инъецированы кровью, оболочки
    отечны с точечными кровоизлияниями.   
  diagnosis: |
    Диагноз ставят на основании анализа эпизоотологических, клинических и
    патологоанатомических данных и результатов бактериологического исследования
    патологического материала. Для исследования в лабораторию направляют свежие
    трупы. Если нет возможности доставить труп целиком, посылают головной мозг,
    трубчатую кость, селезенку, почку, часть печени с желчным пузырем, брыжеечные
    лимфатические узлы и отрезок перевязанного с двух концов пораженного тонкого
    кишечника. Бактериологический диагноз на колиэнтеротоксемию (отечную болезнь)
    считают установленным при выделении из стенки желудка или из двенадцатиперстной
    кишки бета-гемолитических эшерихий, патогенных для белых мышей или отнесенных в
    реакции агглютинации к энтеропатогенным для поросят серогруппам.   
  differential_diagnosis: |
    Исключают диарею незаразного происхождения, сальмонеллез, пастереллез,
    стрептококкоз, рота- и коронавирусную инфекцию путем проведения
    бактериологического, вирусологического исследований и тщательного анализа
    эпизоотологического анализа. Колиэнтеротоксемию поросят дифференцируют от
    отравления поваренной солью, от чумы, роки, болезни Ауески и листериоза путем
    соответствующих лабораторных исследований.
  prevention: |
    Важнейшею роль в профилактике колибактериоза играет вакцинация. При вспышке
    заболевания первостепенно необходимо наладить санитарную обстановку в
    свинарниках, чтобы исключить возможность перемещения инфекции внутри хозяйства.
    Для наиболее благоприятного исхода заболевания, либо его предотвращения,
    профилактическая стратегия основана на комплексном подходе, который воздействует
    на: 1) источник развития инфекции – больной молодняк и супоросные свиноматки
    непосредственно перед родами; 2) пути передачи инфекции – помещения для
    животных, инвентарь, наличие грызунов; 3) восприимчивые особи – новорожденные
    поросята и поросята после отъема.   
  treatment: |
    Поскольку заболевание сложное и быстро распространяется, лечебные мероприятия
    начинают как можно раньше. Схему применения препаратов и их дозировку назначает
    ветеринарный врач, исходя из состояния каждой отдельной особи, веса и возраста
    животного. Лечение эшерихиоза симптоматическое и основано на: 1) восстановлении
    водно-солевого баланса – раствор 0,9% натрия хлорида, раствор Рингера; 2)
    нормализации работы ЖКТ – применение пробиотиков, так же обволакивающие
    препараты для снятия воспаления со слизистой оболочки; 3) стабилизации работы
    сердца и исключении кислородного голодания; 4) устранении токсикации –
    адсорбенты; 5) Повышении иммунитета – заключается в применении специфических
    антител против возбудителя колибактериоза (поливалентная сыворотка в лечебной
    дозировке 15-20 мл для пятидневных поросят, сыворотка из крови животных,
    подлежащих забою, и сыворотка от привитых против эшерихиоза свиноматок). Так же
    естественную резистентность поднимает повышенное количество витамина С, которое
    поросята получают из пищи; 6) восстановлении аппетита; 7) подавлении инфекции –
    исключительно препаратами, к которым у бактерий имеется чувствительность.
    Больных поросят необходимо держать во время лечения отдельно от здорового
    поголовья. Важным фактором при лечении кишечных патологий является голодная
    диета, длящаяся до 12 часов. Назначается она с первого дня заболевания. Молозиво
    заменяется на теплый раствор натрия хлорида (такая мера снизит степень
    обезвоживания). Далее можно добавлять в раствор до 50% суточной нормы молозива.
    Выпаивают поросят каждые 6 часов. В этот временной промежуток поросятам
    организуют моцион, усиливают питательность корма минералами и витаминами. В пищу
    предпочтительно давать кисломолочные продукты и сочные корма. В таблице 1
    представлены результаты устойчивости Escherichia coli к антимикробным препаратам
    от разных видов животных. Устойчивость Escherichia coli к антимикробным
    препаратам в % от общего количества исследованных штаммов Доля штаммов,
    устойчивых к антибактериальным препаратам, варьировалась в зависимости от группы
    препаратов и вида животных. Среди цефалоспоринов III поколения цефоперазон
    показал устойчивость 0% у овец и баранов, 58,4% у крупного рогатого скота (КРС)
    и 98,1% у свиней, тогда как устойчивость к цефтриаксону составила 0% у овец и
    свиней и 59,3% у КРС. Цефепим, представляющий цефалоспорины IV поколения, не
    выявил устойчивых штаммов у овец и баранов, но показал 54,5% устойчивости у КРС
    и 52,3% у свиней. В группе пенициллинов амоксициллин продемонстрировал 25%
    устойчивости у овец и баранов, 95,3% у КРС и 84,3% у свиней. Бензилпенициллин
    оказался менее эффективным: устойчивость составила 91,2% у овец и баранов, 96,5%
    у КРС и 95,7% у свиней. Среди тетрациклинов устойчивость к тетрациклину
    составила 89,7% у овец и баранов, 100% у КРС и 99,1% у свиней, а к доксициклину
    — 88,2%, 92,8% и 96,3% соответственно. Аминогликозиды также показали высокую
    долю устойчивых штаммов: к канамицину — 94,5% у овец и баранов, 93,7% у КРС и
    99,4% у свиней; к стрептомицину — 96,7%, 96,3% и 94,2% соответственно; к
    гентамицину — 75,4% у овец и баранов, но существенно ниже у КРС и свиней — 20,7%
    и 20,8%. Макролиды, такие как эритромицин, показали устойчивость 99,7% у овец и
    баранов, 91,7% у КРС и 95,7% у свиней, а рокситромицин — 100%, 87,5% и 89,5%
    соответственно. Среди сульфаниламидов ванкомицин оказался неэффективным в 100%
    случаев у овец и баранов, и в 87,2% и 88,7% случаев у КРС и свиней. Рифампицин
    показал устойчивость на уровне 96,4%, 85,7% и 86,4% соответственно. Во
    фторхинолоновой группе норфлоксацин оказался устойчивым у 75,3% штаммов у овец и
    баранов, у 20,7% у КРС и не показал устойчивости у свиней, тогда как
    энрофлоксацин продемонстрировал аналогичную устойчивость у овец и баранов —
    74,9%, у КРС — 100%, и отсутствие устойчивости у свиней. Из этого следует, что
    большинство штаммов Escherichia coli оказались устойчивы к воздействию
    антибактериальных препаратов. В результатах исследования учитывались только те
    культуры, которые дали максимальную задержку роста (диаметр задержки роста от 25
    мм и больше). Такую задержку роста дали цефалоспорины III и IV поколения:
    цефоперазон, цефепим (овцы, бараны) и цефтриаксон (овцы, бараны и свиньи). Также
    задержку роста колоний дали фторхинолоны: норфлоксацин, энрофлоксацин (свиньи).
    Остальные антибактериальные препараты оказались недостаточно эффективными к
    воздействию Escherichia coli.
  vaccination_recommendations: |
    Молодняк, переболевший колибактериозом, приобретает невосприимчивость к
    последующему заражению. В связях тем, что заболевают новорожденные в первые дни
    жизни, искусственно иммунизировать их вакцинами бесполезно. Поэтому для
    предупреждения колибактериоза вакцинируют супоросных животных, в организме
    которых вырабатываются специфические антитела против эшерихий, эти антитела
    концентрируются в молочной железе и с молозивом поступают в организм
    новорожденных, обеспечивая их защиту от действия патогенных эшерихий (молозивный
    или колостральный иммунитет). Для этого супоросным свиноматкам вводят
    поливалентную вакцину. Последовательность: 1) вводят свиноматке двукратно за 4-6
    недель до опороса с 2-х недельным интервалом между вакцинами; 2) активный
    иммунитет у сосущих поросят вырабатывается в недельном возрасте.
  pathogenesis: |
    Сразу после рождения в желудочно-кишечный тракт животных попадает значительное
    количество различных микроорганизмов. В зависимости от количества павших
    эшерихий и их свойств, а также от времени получения новорожденными молозива
    матери процесс заселения (колонизации) и размножения их в организме может
    развиваться по-разному. Если в желудочно-кишечный тракт попали патогенные
    эшерихии, не обладающие адгезивными антигенами, но имеющие капсульные антигены,
    то они проникают через стенки кишечника в лимфатическую систему, а затем в
    кровь. 
  causes_and_risks: |
    У новорожденных» которые не получили вовремя молозиво матери и вследствие
    этого не имеющие гамма-глобулинов, эшерихии начинают размножаться в крови.
    Размножившиеся в крови и органах микробы частично разрушаются фагоцитами, и
    высвободившийся эндотоксин вызывает изменения в сосудах, что приводит к сосудистому
    коллапсу и шоку. Развивается септическая форма колибактериоза, заканчивающаяся
    в большинстве случаев смертью.
    Эту форму колибактериоза вызывают эшерихии серогрупп 078:К80, 09:КЗО, 09:К101,
    08:К25 и др. Септическая форма колибактериоза со смертельным исходом чаще
    наблюдается у телят с уровнем гамма-глобулинов в крови до 10% от общего
    количества глобулинов (норма 20% и более). При внедрении в организм
    новорожденных энтеропатогенных вариантов эшерихий, обладающих подвижностью и не
    имеющих адгезивных антигенов, происходит их проникновение в слизистую оболочку
    тонких кишок, где они размножаются, выделяя экзотоксины и эндотоксины. Токсины
    адсорбируются на ворсинках эпителиальных клеток тонких кишок, стимулируют
    аденилатциклазу, что приводит к увеличению концентрации циклического
    эденозин-монофосфата. Этот медиатор вызывает гиперсекрецию электролитов и
    диффузию воды в просвет кишечника; кишечник переполняется жидкостью, усиливается
    перистальтика и возникает диарея. Из организма выделяются вода и электролиты,
    что сопровождается ацидозом и нередко — дегидрационным шоком. Через поврежденную
    стенку кишечника эшерихии могут проникать в кровь, вызывая септицемию. При
    колиэнтеротоксемии (отечной болезни) поросят попавшие от свиноматок
    гемолитические разновидности эшерихии начинают размножаться на слизистой
    оболочке желудки. Этому способствует Переполнение желудка кормом, что приводит к
    атонии мышц, выделению пищеварительных ферментов. В дальнейшем гемолитические
    эшерихии проникают в кишечник, где, так же как и в желудки, выделяют гемотоксин
    и другие токсины, вызывая геморрагическое воспаление стенки с
    серозно-фибринозными отеками, причем отеки распространяются и на серозные
    оболочки. Гемотоксин я другие токсины эшерихии, всасываясь в кровь, вызывают
    нервные явления, отеки кожи век, подкожной клетчатки в области головы и живота.
    В патогенезе колибактериоза большое значение имеют вирулентность и токсигенность
    серотипов эшерихий, а также уровень иммунореактивности животных. У
    иммунодефицитных животных патологические процессы развиваются очень быстро и
    болезнь заканчивается смертью.