Porcine proliferative enteropathy: # Илеит
  disease_name: |
    Илеит (пролиферативная энтеропатия свиней), Porcine proliferative enteropathy
    (PPE) – международное название, Enteropathia proliferativa suum - латинский
    вариант
  etiology: |
    Пролиферативная энтеропатия свиней - это кишечное заболевание, прежде всего
    поражающее молодых растущих особей, связанное с воспалением нижнего отдела
    тонкого кишечника, то есть подвздошной кишки, это заболевание еще называют
    илеитом.  Пролиферация может распространяться дальше вниз к слепой кишке и
    проксимальному отделу толстой кишки. Заболевание вызывается бактерией Lawsonia
    intracellularis, живущей внутри клетки, названной в честь Гордона Лоусона,
    шотландского исследователя, который обнаружил и впервые культивировал этот
    штамм. В Великобритании 95% свиноферм показывают положительную серологию, то
    есть свиньи подвержены данной инфекции в той или иной стадии.
  epidemiology: |
    Пролиферативная энтеропатия свиней распространена по всему миру и встречается у
    поросят-отъемышей, содержащихся при всех типах систем содержания. Источник
    инфекции не установлен, хотя в некоторых стадах она может быть эндемической.
    Фекалии инфицированных свиней могут быть источником новых инфекций у
    восприимчивых животных, а контакт от свиньи к свинье является важным путем
    передачи инфекции. Инкубационный период пролиферативной энтеропатии составляет
    2-3 недели, микроорганизм может сохранять жизнеспособность в фекалиях свиней в
    течение 2 недель при температуре 5-15°С. Вспышки были связаны с различными
    факторами стресса, включая смешивание свиней в племенные группы или
    транспортировку на новые места.   
  clinical_findings: |
    Клинические признаки илеита зависят от природы изменений, затрагивающих тонкий
    кишечник. Следует отметить, что во многих случаях болезнь протекает в мягкой
    форме без проявления каких-либо признаков. При кишечной аденопатии свинья
    выглядит здоровой, ест хорошо, но страдает хронической диареей и постепенно
    теряет кондицию. Инкубационный период заболевания длится около 3-6 недель, и
    заболеть могут свиньи любого возраста от 3-4 месячных до взрослых. Некротический
    энтерит — более поздняя форма кишечной аденопатии свиней. Толстая слизистая
    оболочка разрывается и отмирает, при этом утолщается мышечная оболочка в районе
    подвздошной кишки. Быстрый разрыв слизистой вызывает обильное кровотечение
    подвздошной кишки, что вызывает прогрессирующую геморрагическую энтеропатию.
    Вторичная инфекция, как правило, обостряет заболевание. Больные свиньи выглядят
    бледными, анемичными, у них наблюдаются рвота и почернения фекалий. После 4-6
    недель больные свиньи могут окончательно поправиться, а некоторые погибают на
    стадии прогрессирующей геморрагической энтеропатии. За 1-2 часа до смерти эти
    свиньи выглядят бледными, с пониженной температурой. Погибнуть могут свиньи в
    любом возрасте: от 6 до 10 месяцев. При первом заражении до 12% стада заболевают
    и около 6% — погибают. Болезнь встречается в четырёх формах: 1) кишечная
    аденопатия, связанная со слабым размножением клеток оболочки кишечника; 2)
    некротический энтерит — клетки оболочки кишечника размножаются, но быстро
    погибают и отмирают, образуя утолщения в тонком кишечнике; 3) воспаление
    конечной части тонкого кишечника; 4) пролиферативная геморрагическая энтеропатия
    — это обильное кровотечение в тонком кишечнике.
  postmortem_findings: |
    При вскрытии павшей свиньи можно видеть, что край подвздошной кишки утолщен,
    бледен, а его внутренняя оболочка покрыта складками, не поддающимися
    растягиванию. Толстая кишка также повреждена. Ткани внутренней оболочки
    зараженного кишечника, как правило, омертвевшие или полностью изъедены.   
  diagnosis: |
    Lawsonia intracellularis практически не вырастает в обыкновенных питательных
    средах. В связи с этим фактом проведение бактериологических исследований
    малоинформативно. Для того чтобы выявить болезнь, используют иные методики
    диагностики, позволяющие максимально быстро и точно установить диагноз и
    дифференцировать илеит от похожих заболеваний. Существуют следующие способы
    лабораторной диагностики илеита: гистологические, серологические (ИФА) тесты и
    полимеразная цепная реакция (ПЦР). Иммуноферментный анализ (ИФА) позволяет
    количественно оценить титр антител в сыворотке и плазме крови. Однако
    недостатком этого способа является необходимость большого числа образцов
    патологического материала (не менее 50) от животных различных возрастных групп.
    Следует отметить, что при этом методе точная постановка диагноза возможна не
    ранее чем через три недели с момента инфицирования. Полимеразная цепная реакция
    инструмент для прямого выявления наличия возбудителя. Для этого способа
    диагностики важна чистота отбираемого для исследований материала во избежание
    ложно положительных или ложно отрицательных результатов. Гистологические
    исследования необязательный, но полезный тест, благодаря которому можно
    определить степень поражения ворсинок. Это помогает установить диагноз и
    дифференцировать заболевания, вызванные Lawsonia intracellularis от заболеваний,
    вызванных иными патогенными бактериями, такими как Brachyspira или Clostridium. 
  differential_diagnosis: |
    При вскрытии очаги пролиферативной энтеропатии необходимо дифференцировать от
    поражений, вызванных цирковирусной инфекцией свиней 2-го типа, синдромом
    геморрагического кишечника, сальмонеллезом, дизентерией свиней и трихоцефалезом.
  prevention: |
    Илеит является самолимитированной инфекцией, где медленное развитие иммунитета
    приводит к ликвидации инфекции, снижению воспалительного процесса и процесса
    пролиферации, а в конечном итоге к устранению заболевания. Медикаментозное
    лечение при своевременном применении ускоряет этот процесс, уменьшает
    повреждение клеток и воспалительные процессы, при этом сохраняя иммунную реакцию
    организма, возвращая животных к нормальному росту и хорошему показателю
    конверсии корма намного быстрее. Тем не менее, раннее лечение может замедлить
    или остановить развитие иммунитета, поэтому, как только препараты отменяют,
    организм становится открытым для заражения и болезни. Достижение оптимального
    баланса является сложным процессом и зависит от ранее применяемых лекарств,
    степени контаминации помещений, куда переместили животных (отсутствие очистки
    между партиями) и контакта с экскрементами. Твердые плохо вычищенные полы, как
    правило, увеличивают темп заражения по сравнению с решетчатым полом. Эта
    неопределенность иногда приводит к длительному применению лекарств или
    повторному курсу, особенно на стадии финишера используют препараты с нулевым
    периодом вывода, например, тилозин.  
  treatment: |
    Список антибиотиков для лечения и контроля илеитов утвержден в ЕС (Таблица 1),
    сюда включены макролиды, тилозин и тилвалозин, которые утверждены для применения
    через корма и воду для лечения илеитов, а также плевромутилин, тиамулин и
    валнемулин (только через корма). Линкозамид, линкомицин, аминоциклитол и
    спектиномицин также одобрены для применения через воду и корма. Тетрациклины,
    хлортетрациклин и окситетрациклин, также применяются, но не указаны в качестве
    обязательных, вероятно, из-за поколения препаратов. Тилозин и тиамулин
    применяются также в виде инъекций для лечения больных животных, но конкретные
    указания отсутствуют. Назначение лекарственных средств для лечения илеитов в
    Великобритании включает применение различных препаратов. Тиамулин используется
    для лечения при темпе введения 150 мкг/кг через корм в дозировке 7,5 мг/кг на
    протяжении 10–15 дней, а также при темпе 60 мкг/кг через воду с дозой 8–10 мг/кг
    на 3–5 дней. Вальнемулин применяется для лечения с темпом введения 75 мкг/кг
    через корм, дозировкой 3–4 мг/кг и продолжительностью до 14 дней. Тилозин
    назначается как для лечения, так и для контроля, при темпе 100 мкг/кг через
    корм, дозе 3–6 мг/кг и продолжительности 21 день, а также для профилактики и
    контроля при введении через воду с темпом 50–100 мкг/кг, дозировкой 5–10 мг/кг и
    продолжительностью от 3 до 10 дней. Тилвалазин применяется для лечения при темпе
    85 мкг/кг через корм с дозой 4,25 мг/кг на 10 дней, а также для лечения и
    профилактики при введении через воду с темпом 50 мкг/кг и дозой 5 мг/кг на
    протяжении 5 дней. Комбинация линкомицина и спектомицина используется для
    лечения при темпе 63 мкг/кг через воду, дозировке 10 мг/кг и продолжительности 7
    дней, а также для лечения и контроля при темпе 88 мкг/кг через корм, дозе 4,4
    мг/кг и продолжительности до 21 дня. Культивировать организмы очень трудно и
    этот процесс требует использования подходящей линии для культивирования клеток,
    таких как IEC-18 из энтероцитов крыс или совсем недавней находки - клеток McCoy,
    вероятно, аналогичной той, что обнаружена в подвздошной кишке и проксимальном
    отделе толстой кишки. В мире существует лишь относительно небольшое число
    изолятов, культивированных и выращенных для измерения их максимальной
    ингибирующей концентрации (МИК) в  отношении ряда антибиотиков. Оценочный
    показатель минимальной ингибирующей концентрации (МИК) для ряда
    антибактериальных препаратов, выраженный как МИК₅₀, МИК₉₀ и диапазон МИК по
    результатам 20 измерений (2 испытания по 10 изолятов: одно в США, одно в ЕС),
    составил для тиамулина: МИК₅₀ — 0,125 мкг/мл, МИК₉₀ — 0,125 мкг/мл, диапазон —
    0,125–0,5 мкг/мл; для вальнемулина: МИК₅₀ — 0,125 мкг/мл, МИК₉₀ — 0,125 мкг/мл,
    диапазон — 0,125 мкг/мл; для тилозина: МИК₅₀ — 2,0 мкг/мл, МИК₉₀ — 8,0 мкг/мл,
    диапазон — 0,25–32 мкг/мл; для линкомицина: МИК₅₀ — 64 мкг/мл, МИК₉₀ — более 128
    мкг/мл, диапазон — 8,0–более 128 мкг/мл; для хлортетрациклина: МИК₅₀ — 8,0
    мкг/мл, МИК₉₀ — 64 мкг/мл, диапазон — 0,125–64 мкг/мл. Тиамулин, плевромутилин и
    валнемулин показали очень высокий уровень внутриклеточной активности против
    L.intracellularis, при МИК 90 в дозировке 0.125 мкг/мл. Только один изолят в
    группе тиамулина показал повышенную МИК на втором этапе, при дозировке 0,5
    мкг/мл. Другие антибиотики, например, тилозин особенно активен, но здесь был
    один изолят с высокой МИК, а, например, линкомицин продемонстрировал очень
    высокую активность при МИК 50 в дозировке 64 мкг/мл и МИК 90 при дозировке > 128
    мкг/мл, которые, со всей вероятностью можно считать устойчивыми. Тетрациклин
    также продемонстрировал снижение восприимчивости при МИК 90, дозированный в 64
    мкг/мл. Что касается альтернативных методов помощи в борьбе с илеитом, то сейчас
    активно набирает обороты использование кормовых добавок с фитобиотиками, в
    частности с тимолом и карвакролом (из эфирных масел корицы, орегано и тимьяна),
    которые также обладают антибактериальными свойствами к L.intracellularis. Стоит
    отметить, что экстракты фитобиотиков разрушают мембраны бактериальной клетки,
    что также повышает эффективность работы антибактериальных препаратов. Экстракты
    эфирных масел регулируют оксидативный стресс, положительно влияют на морфологию
    и микрофлору кишечника, а впоследствии – на иммунную систему. За комплексным
    лечением стоит большое будущее, особенно учитывая острые вопросы возрастающей
    антибиотикорезистентности.
  vaccination_recommendations: |
    Для профилактики широко используется вакцина «Энтеризол Илеитис». Эта живая
    вакцина предназначена для формирования иммунитета продолжительностью не менее 17
    недель и может применяться с трехнедельного возраста. Вакцинация осуществляется
    путем ввода вакцины в систему водопоения, индивидуального выпаивания животным с
    питьевой водой или жидким кормом. Формирование активного вакцинного иммунного
    ответа происходит через три недели после однократного применения вакцины. Очень
    важно отметить тот факт, что за три дня до и после вакцинации нельзя
    использовать антимикробные препараты, а это крайне негативно сказывается либо на
    сохранности поголовья, либо на формировании вакцинного иммунитета. К недостаткам
    вакцины следует отнести ее высокую стоимость и низкую доступность на рынке.
    Помимо этого, процедура подготовки вакцины к применению весьма трудоемка. При
    вакцинации с питьевой водой дополнительным неудобством является необходимость
    стабилизации используемой воды путем добавления сухого обезжиренного молока или
    тиосульфата натрия.
  pathogenesis: |
    Обычно заболевание проявляется в виде одной из трех клинических форм: острой ПЭ,
    хронической ПЭ либо инфекция может оставаться субклинической. В наиболее
    молниеносных (и менее частых) – острая форма ПЭ. L.intracellularis может быть
    связана с внезапной смертью свиней старше четырех месяцев в результате тяжелого
    острого кровотечения в кишечный тракт, известного как пролиферативная
    геморрагическая энтеропатия, или острая ПЭ. В этих случаях у свиней может
    произойти обескровливание до развития диареи. И единственным клиническим
    признаком может быть бледность. Однако в более затяжных случаях наблюдается
    мелена, или гематохезия. Смертность при острой ПЭ составляет 12–50% и более
    характерна для ремонтных племенных животных. Хроническая форма ПЭ вызывает
    негеморрагическую диарею (фекалии серо-зеленого цвета от полутвердых до жидких),
    потерю веса или снижение темпов прибавки веса у молодых свиней, но клинические
    признаки часто слабо выражены и диарея может отсутствовать. Заболевшие свиньи
    имеют возраст 6–16 недель и нередко находятся в состоянии от субъоптимального до
    плохого с поведением от нормального до угнетенного. Хотя этот подтип широко
    известен как хроническая ПЭ, его также называют аденоматозом кишечника свиней,
    пролиферативным илеитом или просто илеитом.  Хроническая ПЭ, как правило, не
    летальна, и выздоровление в течение нескольких недель является нормой. Уровень
    смертности составляет примерно 2%, и падеж обычно является результатом вторичных
    инфекций. Однако выделение с калом L.intracellularis увеличивает вероятность
    передачи вируса от свиньи к свинье, отрицательно влияя на заболеваемость,
    конверсию корма, стоимость лечения и время убоя. Субклиническая инфекция
    характеризуется снижением темпов роста и увеличением конверсии корма при
    отсутствии других клинических признаков. Хотя субклинически инфицированные
    свиньи обычно не страдают диареей, они, как правило, имеют гистологические
    поражения, выделяют бактерию и могут оставаться источником инфекции для других
    свиней. Исследования, объясняющие дихотомические результаты L.intracellularis
    (субклиническая инфекция по сравнению с явными клиническими признаками, включая
    острую или хроническую ПЭ), на сегодняшний день отсутствуют. 
  causes_and_risks: |
    Илеит (пролиферативная энтеропатия) свиней возникает из-за инфекции,
    передающейся от животного к животному. Пути передачи Инфекция передаётся
    фекально-оральным путём. Например : Сосущие поросята заражаются от контакта с
    фекалиями свиноматки; После отъёма заболевание может передаваться поросятам от
    более взрослых, уже инфицированных свиней; Бактерия сохраняется в фекальных
    массах от больной свиньи или переболевшей несколько недель. Факторы риска
    Некоторые факторы, которые способствуют распространению илеита: 1) Нарушение
    условий содержания. Сквозняки, холодные полы, сырость, резкие перепады
    температур приводят к стрессу и снижению иммунитета; 2) Стресс-факторы. Ранний
    отъём от свиноматки, переуплотнение поросят в свинарнике, транспортировка на
    другие фермы, вакцинация; 3) Резкая смена состава корма. Экономические потери на
    свинокомплексах при наличии и отсутствии илеита Экономические потери на
    свинокомплексах при наличии и отсутствии илеита выражаются в следующем. Убойный
    вес свиней без илеита составляет 93,8 кг, тогда как при наличии илеита он
    снижается до 91,6 кг, что означает уменьшение на 2,2 кг. Базовая цена за 1 кг
    убойного веса остается неизменной — 1,41 евро. Однако фактическая выручка за 1
    кг убойного веса уменьшается с 1,39 до 1,36 евро, то есть на 0,03 евро.
    Соответственно, выручка за одну свинью снижается с 130,38 евро до 124,58 евро,
    что составляет убыток в 5,80 евро. Общая выручка также падает с 51 110 евро до
    47 340 евро, теряя 3770 евро. Затраты на кормление в условиях илеита возрастают
    с 17 030 евро до 17 510 евро, увеличиваясь на 480 евро. Расходы на ветеринарное
    обслуживание также возрастают — с 600 до 1500 евро, что означает дополнительные
    затраты в размере 900 евро. Вклад в покрытие постыздержек снижается с 8250 евро
    до 3100 евро, то есть на 5150 евро. Разница на одного поросенка при наличии
    илеита составляет 12,88 евро.