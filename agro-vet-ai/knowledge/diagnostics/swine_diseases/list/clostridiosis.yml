Clostridiosis: # Клостридиоз
  disease_name: |
    Клостридиоз, Clostridiosis (Clostridial infection) – международное название,
    Clostridiosis suis – латинское (ветеринарная номенклатура).
  etiology: |
    Клостридии входят в состав нормальной микрофлоры ЖКТ и представлены множеством
    типов от А до Е. Среди всех клостридий, наиболее опасным видом являются
    clostridium perfringens. Эти бактерии широко распространены в окружающей среде:
    в воздухе, почве, на растениях. Проблемы начинаются при снижении иммунитета,
    нарушениях в кормлении и содержании животных. Заражение происходит через пищу и
    воду или через раны, порезы и воспаления на коже и слизистых. Наибольшей
    опасности подвергаются молодые животные, у которых еще не полностью
    сформировался желудочно-кишечный тракт и кишечная микрофлора. Сlostridium
    perfringens питается крахмалом и сахарами, поэтому, когда в рационе идет избыток
    углеводов это провоцирует развитие заболевания. Заболевание проявляется, когда в
    крови резко повышается уровень токсинов, выделяемых клостридиями. Особенно
    опасен альфа – токсин. Клостридиоз вызывается различными видами бактерий
    Clostridium, такими как: C. Perfringens, C. Difficile, C. Novyi, C. Chauvoei, C.
    Septicum. Эти бактерии способны образовывать споры, что делает их устойчивыми к
    неблагоприятным внешним условиям и дезинфицирующим веществам. Споры могут
    сохраняться в окружающей среде длительное время, что способствует
    распространению инфекции.  
  epidemiology: |
    Клостридиоз – это инфекционное заболевание, вызываемое микроорганизмами
    бактериальной природы/ Cl. Perfringens – бактерия, возбудитель заболевания.
    Первостепенное значение в развитии энтеротоксемии у свиней имеет клостридия типа
    С, остальные типы (А, В, D) приводят к заболеванию в исключительных случаях.
    Клостридия – бактерия крупного размера, растущая только в безвоздушном
    пространстве (анаеробном), при неблагоприятных условиях образует споры,
    устойчивые к воздействию различных факторов среды. Клостридии являются частыми
    обитателями организма животного, или человека, в небольших количествах, но при
    этом они не вызывают никаких заболеваний. Споры возбудителя могут длительное
    время сохраняться в почве и подстиле, клостридии хорошо устойчивы к факторам
    окружающей среды. Кипячение убивает споровые формы в течение 15-20 минут, хорошо
    переносят действие дезинфектантов.   
  clinical_findings: |
    Инкубационный период у заболевания небольшой, возможно появление начальных
    клинических проявлений как впервые часы после рождения, так и через несколько
    суток, заболевание может протекать в молниеносной, острой, подострой и
    хронической формах: 1) молниеносная форма заболевания – это форма, при которой
    клиническая картина, как правило, полностью отсутствует, новорожденный поросенок
    погибает практически сразу, диагноз устанавливается посмертно; 2) острая форма
    заболевания – характеризуется возникновением диареи, часто без каких-либо
    предвестников. Испражнения у животных имеют зловонный запах, очень быстро
    становятся жидкими, темно-коричневого или красновато-коричневого цвета, пенятся.
    Через 5-10 часов животное становится вялым, угнетенным, отказывается от еды и
    воды. Спустя несколько дней, отмечается сильная интоксикация у животного,
    повышается температура тела до 41-42оС, но далее она может снижаться. Большой
    процент больных животных гибнет спустя несколько дней; 3) подострое течение
    заболевания – характеризуется более медленным развитием клиники. На производстве
    такая форма заболевания возникает спустя месяц от начала вспышки клостридиоза.
    Клинически проявляется угнетением, апатией, сниженным аппетитом. Через 6-10
    часов возникает пенистый, зловонный понос. Температура может повышаться или
    оставаться в пределах нормальных значений. Животное гибнет к концу второй недели
    заболевания или же выздоравливает; 4) хроническое течение – редкий вариант
    развития клиники, единственное проявление – пенистая, зловонная диарея, которую
    трудно отличить от других видов диарей.
  postmortem_findings: |
    1) визуально туши умерших свиней вздуты, за счет внутреннего газообразования,
    подвержены быстрому разложению; 2) визуальные изменения в желудочно-кишечном
    тракте: гастрит с кровоизлияниями в слизистую желудка, все отделы кишечника в
    различной степени воспалены, слизистая с кровоизлияниями, в просвете кишечника
    много кровянистого выпота, кишечник раздут газами; 3) некоторые отделы кишечника
    изъязвлены, стенка с некрозами; 4) печень увеличена, отмечается застой крови,
    некроз долек.   
  diagnosis: |
    1) Методы выделения бактерии: использование различных питательных сред,
    анаэробная культивация для определения наличия и количества бактерий Clostridium
    spp. в образцах; 2) Идентификация бактерии: использование морфологических,
    биохимических и молекулярных методов для определения вида и штамма Clostridium
    spp; 3)  Иммуносерологические тесты: применение иммуноферментных анализов
    (ELISA) и иммуноагглютинационных тестов для обнаружения антител против токсинов
    бактерий Clostridium spp. в сыворотке свиней; 4)  Молекулярные методы:
    полимеразная цепная реакция (ПЦР) для специфического обнаружения и
    генотипирования бактерий Clostridium spp; 5) Лабораторная диагностика является
    важным инструментом для подтверждения наличия клостридиоза свиней и определения
    конкретного возбудителя. Она позволяет точно диагностировать заболевание и
    принять соответствующие меры по контролю и лечению инфекции. Комбинирование
    различных методов диагностики повышает эффективность обнаружения и идентификации
    бактерий Clostridium spp., что способствует более точной диагностике.   
  differential_diagnosis: |
    При дифференциальной диагностике следует исключить колибактериоз, сальмонеллез
    дизентерию, энтероколиты вирусной природы и отравления кормами.
  prevention: |
    1. Вакцинация: Существуют различные типы вакцин, которые обеспечивают защиту от
    инфекций, вызванных Clostridium. Вакцинация может проводиться как профилактика,
    так и в случае вспышки заболевания. 2. Санитария: Соблюдение высоких стандартов
    гигиены в свинарниках, чистота кормов и оборудования, а также контроль доступа к
    потенциально инфицированным объектам. 3. Биологическая безопасность: Меры
    предосторожности, такие как карантин новых животных, ограниченный доступ
    персонала и использование защитных средств, помогут предотвратить
    распространение инфекции. Соблюдение временных разрывов между постановками
    свиноматок позволяет проводить качественную дезинфекцию, уменьшающую
    контаминацию станков и оборудования. 4. Кормовые пробиотики. Такие препараты
    представляют собой своеобразную смесь спор из двух видов бактерий, которые
    выступают в качестве антагонистов по отношению к клостридиям, сальмонелле,
    кампилобактерам и колиформным бактериям. 5. Обработка корма и воды. Следует
    помнить, что наиболее комфортная для токсинообразования у C. perfringens
    щелочная среда (рН более 7 ед.). Ввод органических кислот в комбикорма и воду
    позволяет бороться с возбудителем путем создания некомфортных условий
    существования. Диагностика клостридиоза играет важную роль для применения
    эффективных инструментов его лечения, но важно помнить, что одно лишь
    использование пробиотиков или антибиотиков может не дать желаемого результата.
    Для комплексной и максимально эффективной борьбы с заболеванием необходимо
    проводить целый ряд мероприятий. Помимо медицинской составляющей, очень важную
    роль играет вопрос дезинфекции помещения. Существует целый ряд различных
    дезинфектантов, способных в той или иной степени решить эту важную задачу, но
    существует одна серьёзная проблема — клостридии отличаются крайне высокой
    резистентностью, поэтому далеко не все из них дают желаемый результат. Среди
    наиболее распространённых категорий средств для дезинфекции необходимо выделить:
    1) Надкислоты. Отличаются высокой активностью, но при этом химически неустойчивы
    и даже взрывоопасны; 2) Четвертичные амины. Эффективность их воздействия на
    клостридии практически равна нулю; 3) Альдегиды. Отличаются слабой активностью,
    поэтому их применение редко оправдывает ожидания; 4) Галогеновые дезинфектанты.
    Препараты с содержанием йода, хлора или брома, которые отличаются высокой
    активностью и безопасностью применения.
  treatment: |
    1. Антибиотикотерапия: применение антибиотиков для контроля роста и размножения
    бактерий Clostridium spp. Препараты, такие как пенициллины, цефалоспорины,
    линкозамиды и тетрациклины, могут быть использованы в зависимости от
    чувствительности возбудителя. 2.  Противотоксические средства: применение
    противотоксических препаратов для нейтрализации токсинов, вырабатываемых
    бактериями Clostridium spp. Это может включать применение антитоксинов или
    препаратов, способных связываться и инактивировать токсины. 3. Поддерживающая
    терапия: обеспечение поддерживающей терапии, включая восполнение потерянных
    жидкостей и электролитов, поддержание питания и обеспечение комфорта свиней.
  vaccination_recommendations: |
    Схема вакцинации свиноматок: 1 вакцинация: 65-72 сутки супоросности;
    ревакцинация: 86-93 сутки супоросности. Схема вакцинации ремонтного молодняка: 1
    вакцинация: 100-120 суток возраста; ревакцинация: 6-7 недель до осеменения;
    ревакцинация: не позднее 3-4 недель до осеменения.
  pathogenesis: |
    1) Характеристика бактерий: Бактерии рода Clostridium широко распространены в
    природе. Они обладают способностью к образованию спор, что обеспечивает их
    выживаемость в экстремальных условиях, таких как высокая температура и
    отсутствие кислорода. 2) Продукция токсинов: Различные токсины, вырабатываемые
    бактериями Clostridium, играют важную роль в патогенезе клостридиоза. Эти
    токсины могут вызывать разрушение тканей, нарушать работу внутренних органов и
    приводить к серьезным последствиям для здоровья свиней. 3) Распространение
    инфекции: Инфекция проникает в организм через желудочно-кишечный тракт, после
    чего распространяется по организму, вызывая некроз тканей и интоксикацию. Это
    приводит к тяжелым клиническим проявлениям и высокой смертности среди животных.
    4) Иммунитет: Иммунная система свиней реагирует на инфекцию, однако токсины,
    выделяемые бактериями, могут подавлять защитные функции организма, что
    затрудняет борьбу с заболеванием. 
  causes_and_risks: |
    Проблема клостридиозных диарей характерна преимущественно для поросят раннего
    (до 7 д.ж.) неонатального периода. Вероятным источником инфекции являются
    свиноматки, которые выделяют C. perfringens (разных токсинотипов) в огромном
    количестве. Инфицирование поросят происходит непосредственно в момент опороса
    или сразу после него. Антитела против α(альфа)-токсина часто обнаруживаются у
    свиней группы откорма и основного стада (РС и СМ), поскольку C. perfringens
    широко распространена в природе. Более того, микроорганизм C. perfringens
    является частью нормальной микрофлоры и лишь некоторые токсинотипы способны
    продуцировать токсины в уровнях, вызывающих клинические проявления болезни.
    Звенья экономических потерь: 1) снижение продуктивности производства (уменьшение
    прироста массы животных, плодовитости свиней); 2) растраты на привлечение
    ветеринаров, покупку лекарств; 3) траты на профилактику заболеваний.