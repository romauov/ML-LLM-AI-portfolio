Infectio circoviralis suum: # Цирковирусная инфекция свиней
  disease_name: |
    Цирковирусная инфекция свиней
  etiology: |
    В середине 1990-х годов в Северной Америке была выявлена системная болезнь,
    вызываемая цирковирусом свиней типа 2 (PCV-2). Изначально она называлась синдром
    послеотъемного мультисистемного истощения PWS (Post-weaning syndrome).
    Впоследствии выяснилось, что это заболевание широко распространено по всему
    миру. Цирковирус свиней второго типа был описан в 1998 году как патоген, который
    регулярно присутствовал в тканях легких, кишечника, почек лимфатических органов,
    у больных животных с синдромом послеотъёмного мультисистемного истощения. Этот
    симптомокомплекс у свиней эпизодически наблюдали в Канаде в начале и середине
    1990-х годов. Выявленный PCV-2 отличался от уже известного цирковируса свиней
    PCV, своей патогенностью, а уже имеющийся PCV (впоследствии названный PCV
    первого типа (PCV-1)) был патогенен лишь для культуры клеток PK-15. С помощью
    метода ПЦР впервые вирус был выявлен в 1962 году. А с 1985 года у больных свиней
    наблюдались клинические признаки болезни. Кроме того, филогенетические и
    ко-филогенетические исследования позволяют предположить, что PCV-2 циркулирует
    среди свиней уже более ста лет.
  epidemiology: |
    Вирус принадлежит к семейству Circoviridae, роду Circovirus. Вирус имеет
    кольцевую, ковалентно замкнутую одноцепочечную ДНК длиной 1767–1768 нуклеотидов.
    Анализ последовательностей различных штаммов PCV-2 по всему миру демонстрирует
    их близкое филогенетическое родство с идентичностью нуклеотидных
    последовательностей более 93%. Последовательности с пороговым значением
    нуклеотидного разнообразия в 3,5% были разделены на две основные группы,
    обозначенные как генотипы PCV-2a и PCV-2b. Кроме того, был описан третий генотип
    PCV-2c из Дании 1980-х годов. Четвёртый генотип, первоначально считавшийся
    ограниченным Китаем, но в настоящее время выявляемый по всему миру, получил
    название PCV-2d. Предварительные данные позволили предположить существование
    пятого генотипа. Однако самые последние данные указывают на существование
    четырёх различных генотипов. Во всех случаях наиболее распространённым генотипом
    среди свиней во всём мире является PCV-2b, за ним значительно отстаёт PCV-2а.
  clinical_findings: |
    Потенциальную опасность для свиноводства в целом, представляет синдром
    мультисистемного истощения, поскольку оказывает своё патологическое действие на
    технологическую группу доращивания. Данный синдром характеризуется истощением и
    респираторным дистресс-синдромом. Однако проявление клинических признаков может
    варьироваться в зависимости от фермы в результате действия сопутствующих
    патогенов или заболеваний. Важно отметить, что PWS регистрируется при
    инфицировании поросят патогенами в ассоциации с цирковирусом свиней 2-го типа,
    однако течение патологического состояния и его клинические признаки отличаются
    от клинических признаков цирковирусной болезни взрослого поголовья. Помимо PWS,
    PCV-2 связывают с другими синдромами, которые объединяют в группу цирковирусных
    болезней свиней (PCVD). Основные клинические, патологические и диагностические
    характеристики PCVD представлены далее.  **Основные клинические, патологические
    и диагностические характеристики цирковирусной болезни свиней.** **Основные
    клинические, патологические и диагностические характеристики цирковирусной
    болезни свиней.** **Название (сокращение) PCVD:** Субклиническая инфекция
    (PCV-2-SI). **Основные клинические признаки:** Снижение среднесуточного привеса
    без каких-либо явных клинических признаков. **Отдельные диагностические
    критерии:** 1) Отсутствие клинических признаков; 2) Отсутствие или минимальные
    гистопатологические повреждения в тканях (в основном лимфоидной) Низкий титр
    PCV-2 в лимфоидных тканях, что может быть определено в реакции ПЦР; 3) Отдельные
    диагностические критерии. **Название (сокращение) PCVD:** Системное заболевание
    (PCV-2-SD). **Основные клинические признаки:** Истощение, снижение веса,
    повышенная заболеваемость и плохие производственные показатели. **Отдельные
    диагностические критерии:** 1) Снижение веса и бледность кожи; 2) Снижение
    количества лимфоцитов средней или умеренной степени с гранулематозным
    воспалением лимфоидных тканей; 3) Среднее или высокое количество PCV-2 в
    поврежденных тканях. **Название (сокращение) PCVD:** Заболевание легких
    (PCV-2-LD). **Основные клинические признаки:** Респираторный дистресс, дисапноэ.
    **Отдельные диагностические критерии:** 1) Респираторные клинические признаки;
    2) Лимфогистиоцитарная или гранулематозная интерстициальная бронхопневмония или
    пролиферативная некротизирующая пневмония при отсутствии повреждений лимфоидной
    ткани, как в случае с PCV-2-SD; 3) Средний или высокий титр PCV-2 в легких.
    **Название (сокращение) PCVD:** Патология кишечника (PCV-2-ED). **Основные
    клинические признаки:** Диарея. **Отдельные диагностические критерии:** 1)
    Диарея; 2) Гранулематозный энтерит и снижение количества лимфоцитов с
    гранулематозным воспалением пейеровых бляшек; 3) Средний или высокий титр PCV-2
    в толще слизистой оболочки кишечника (Пейеровых бляшках). **Название
    (сокращение) PCVD:** Патология репродуктивной системы (PCV-2-RD). **Основные
    клинические признаки:** Аборты или мумификация плода. Регулярное возвращение в
    эструс. **Отдельные диагностические критерии:** 1) Репродуктивная
    недостаточность на поздних сроках супоросности; 2) Фиброзный или некротизирующий
    миокардит плода; 3) Средний или высокий титр PCV-2 в тканях сердца; 4)
    Регулярное возвращение в эструс; 5) Сероконверсия PCV-2 после возвращения в
    эструс и положительный результат ПЦР. **Название (сокращение) PCVD:** Синдром
    дерматита и нефропатии свиней (PONS). **Основные клинические признаки:** Темные
    красные папулы и пятна на коже, в основном на тазовых конечностях и в области
    промежности. **Отдельные диагностические критерии:** 1) Геморрагические и
    некротизирующие повреждения кожи и (или) отечность и бледный цвет почек с
    кровоизлияниями в кортикальном слое;  2) Системный некротизирующий васкулит, а
    также некротизирующий и фибринозный гломерулонефрит.
  postmortem_findings: |
    Трупы истощены, анемичны, желтоватого или грязно-серого окрашивания, на коже
    могут быть сыпь и струпья. Сыпь образуется вследствие воспаления стенок
    кровеносных сосудов, что ведет к дермальному некротическому васкулиту. При
    детальном и внимательном рассмотрении отдельных пятен видна точка некроза в
    центре них. При вскрытии отмечается поражение лимфоидной ткани: впервые при
    возникновении в хозяйстве. В дальнейшем, по мере развития эпизоотического и
    инфекционного процесса приобретают мраморное окрашивание. Особенно характерно
    увеличение паховых лимфатических узлов. В некоторых случаях они имеют вид
    гематомы. Легкие в начальной стадии болезни отечны затем появляются участки с
    более плотной консистенцией, с очагами воспаления, далее характер которого
    определяет секундарная микрофлора. Изменения селезенки очень различные.
    Селезенка обычно увеличена, в отдельных случаях значительно,  имеет вид
    "септической " селезенки, нередко отечна и воспалена, даже могут быть краевые
    очаги некроза как при классической чуме свиней,  или в виде мельчайших участков
    в виде отдельных сосочков.  Почки могут быть увеличены, с кровоизлияниями и даже
    с геморрагическими инфарктами. Подобные изменения больше характерны для
    классической чумы свиней и даже для африканской чумы, что крайне важно помнить
    при осуществлении дифференциальной диагностики.
  diagnosis: |
    Диагноз ставят на основании эпизоотологических данных, клинической картины
    болезни, патоморфологического метода. При совокупности этих методов и при
    снижении экономических показателей можем говорить о наличии цирковирусной
    инфекции.    По Европейским критериям наличие поросят с дермо-некротическим
    васкулитом и увеличением лимфатических узлов у павших поросят достаточно чтобы
    говорить о присутствии болезни и обосновании иммунизации, даже без увеличения
    технологического падежа. Выделение цирковируса 2-го типа без клиники и
    патанатомии не является диагностическим показателем. Подтверждается диагноз
    путем постановки количественногоПЦР с выделением цирковируса 2-го типа из
    измененных органов или тканей.  **Основная цель мониторинга ЦВИС:** 1)
    Обнаружение на вакцинированном поголовье поросят и свиноматок клинических и в
    большей степени субклинических форм ЦВИС которые при клиническом обследовании
    поголовья трудно диагностируются; 2) Важно во время обнаружить развитие
    субклинической формы ЦВИС PCVAD-SI до  обнаружения признаков PCVAD-SI, особенно
    в крупных холдингах; 3) По этому помимо затрат на саму вакцинацию против ЦВИС,
    для борьбы с последствиями PCVAD-SI значительно увеличиваются затраты на
    симптоматическую терапию/ **Протокол мониторинга ЦВИС от BioChek, Серология:**
    1) Серология, метод возрастного среза. Суть метода - одномоментный отбор
    сывороток крови от разновозрастных поросят, рем свинок и оной группы свиноматок
    1 цикла. При одно моментом отборе проб мы получаем информацию о серологическом
    статусе и уровне поствакцинального иммунитет всей исследуемой популяции свиней;
    2) ИФА на антитела к PCV2 системы BioChek основан на цельном антигене вируса,
    поэтому выявляются все антитела против различных эпитопов, что подтверждается
    очень сильной корреляцией с титрами IPMA R:0,88) которые являются золотым
    стандартом для тестирования PCV2 антител. Выявление всех антител против всех
    эпитопов делает ИФА также пригодным для выявления активных антител/инфекций и
    пассивных/материнских антител (MDA). Поскольку уровни антител коррелируют с
    защитными нейтрализующими антителами, определение MDA имеет важное значение, так
    как на вакцинацию поросят PCV2 и ее эффект может влиять уровень MDA. Все типы
    вакцин (цельный вирус, вакцины химерных конструкций, субъединицы) обнаруживаются
    благодаря антигену цельного вируса. Знание нормальной реакции на конкретную
    вакцинацию важно для правильной интерпретации результатов теста, поскольку
    реакция на вакцину может варьироваться из-за различного состава вакцин и запуска
    защитного иммунного ответа. **Протокол отбора сывороток крови для серологии ЦВИС
    от :** 1) **Поросята 3 недели жизни 10 проб,** цель отбора - определение уровня
    колострального иммунитет в день вакцинации поросят против Цирко; 2) **Поросята 8
    недель жизни 10 проб,** цель отбора – определение качества поствакцинального
    иммунитета, а так же наличие постинфекционного иммунитета; 3) **Поросята 13
    недель жизни 10 проб,** цель отбора определение качества и длительности
    поствакцинального иммунитета, а так же наличие постинфекционного иммунитета; 4)
    **Поросята 17 недель жизни 10 проб,** цель отбора определение качества и
    длительности поствакцинального иммунитета, а так же наличие постинфекционного
    иммунитета; 5) **Поросята 23 недели жизни 10 проб,** цель отбора определение
    качества и длительности поствакцинального иммунитета, а так же наличие
    постинфекционного иммунитета; 6) **Рем свинка 29 недель жизни 10 проб,** оценка
    качества вакцинации рем свинки, а так же поиск постинфекционного иммунитета; 7)
    **Свиноматки 1 цикл – 10 проб,** оценка качества вакцинации свиноматок, а так же
    поиск постинфекционного иммунитета. Протокол отбора сывороток крови для
    количественного ПЦР ЦВИС от: 1) **Мертвороды – 10 сборных проб миокардов,** 10
    проб 1 комната опороса; 2) **Поросята опорос 14-20 дней жизни** – 14 проб
    сыворотки крови (7 образцов для ПЦР); 3) **Поросята доращивания и откорма**
    мониторятся ПЦР после проведения серологии  и интерпретации полученных
    результатов; 4) Рем свинка 28-29 недель 14 проб сыворотки крови 7 образцов для
    ПЦР; 5) **Важно:** мертвороды, поросята на опросе и рем свинки мониторятся
    ежемесячно. **Интерпретация кПЦР на ДНК PCV2 от BioChek (нагрузка: копий/мл).**
    Вирусная нагрузка - Не обнаруживается, если Сыворотка - Отрицательно, Ткани -
    Отрицательно, Квалификация - Не обнаруживается. Вирусная нагрузка - Минимальная,
    если Сыворотка < 5 log10, Квалификация - Без клинического значения. Вирусная
    нагрузка - Низкая, если Сыворотка 5 log10, Ткани 5-6 log10, Квалификация -
    возможен PCVAD-SI. Вирусная нагрузка - Умеренная если Сыворотка 6 log10, Ткани 7
    log10, Квалификация - PCVAD-SI. Вирусная нагрузка - Высокая, если Сыворотка 7
    log10, Ткани > 7 log10, Квалификация - PCVAD-SD. Выводы по диагностики ЦВС-2
    **BioChek:** 1) Комбинация ПЦР и ИФА при мониторинге ЦВС-2 это эффективный
    мониторинг по быстрой диагностики и контролю субклиники ЦВС-2 на вакцинированном
    поголовье поросят; 2) Конечная цель при диагностики ЦВС-2 является коррекция
    схемы вакцинации и технологии для устранения проблем с субклиническим течением
    ЦВС-2; 3) Возможная вакцинация свиноматок и обязательная ревакцинация рем свинок
    для защиты маточного стада от репродуктивного проявления ЦВИС; 4) Корректировка
    вакцинации поросят.
  differential_diagnosis: |
    При дифференциальной диагностике следует исключить респираторную форму РРСС,
    классическую чуму, микоплазмоз, пастереллез, сальмонеллез, болезнь Ауески,
    актинобациллярную плевропневмонию, т.е. все заболевания, приводящие к истощению
    поросят.
  prevention: |
    Самым эффективным методом профилактики является вакцинация. Первоначально для
    создания вакцины против цирковируса свиней второго типа были использованы
    инактивированные вакцины. Они показали эффективность, которая выражалась в
    снижении вирусной нагрузки в сыворотке крови и тканях, а также в уменьшении
    патологии в лимфоидных тканях у свиноматок и у поросят после отъёма. Однако
    эффективность оказалась недостаточной. После этого был разработан прототип
    субъединичной вакцины. В результате исследований выяснилось, что основным
    иммуногеном является белок Cap, кодируемый ORF 2. Этот белок обеспечивает защиту
    от последующего заражения PCV-2. Белок Rep, кодируемый ORF 1, оказался слабо
    иммуногенным. Впоследствии был создан ряд экспериментальных субъединичных
    вакцин, которые были протестированы на экспериментальных моделях свиней и/или
    мышей. Эти прототипы обычно вызывали значительные защитные иммунные реакции,
    стимулируя специфический гуморальный иммунный ответ и пролиферативный ответ
    лимфоцитов на PCV-2. В одном из исследований, также рассматривалась
    эффективность действия вакцины на основе ДНК вируса. Результаты показали, что
    прототип ДНК вакцины не смог снизить репликацию PCV-2 у вакцинированных свиней
    по сравнению с контрольной группой. Параллельно с созданием ДНК-вакцин велись
    исследования по разработке химерных вакцинных конструкций. В ходе этих работ был
    создан инфекционный клон ДНК, содержащий ген капсидного белка ORF2 PCV2a,
    встроенный в геном непатогенного PCV-1. Полученный химерный вирус PCV-1-2a при
    введении свиньям индуцировал выраженный гуморальный иммунный ответ против
    капсидного антигена PCV-2. Важно отметить, что данный химерный штамм
    демонстрировал значительно сниженную вирулентность по сравнению с диким типом
    PCV-2. Экспериментальные данные показали, что реплицированный вирус PCV-1-2a,
    сохраняя аттенуированные свойства, обеспечивал эффективную защиту от инфекции.
    Эти результаты подтвердили перспективность использования химерного штамма
    PCV-1-2a в качестве основы для безопасной и иммуногенной вакцины против PCV-2.
    Первой коммерческой вакциной стала инактивированная вакцина против цирковируса
    свиней второго типа, содержащая масляный адъювант. Вакцина предназначена для
    использования у свиноматок и молодых свинок. Впервые вакцину начали применять в
    Европе по временной лицензии в 2004 году во Франции и Германии, а к 2006–2007
    годам она уже была доступна в большинстве европейских стран и Канаде. К 2010
    году этот биологический препарат получил лицензию на использование у поросят.
    Начиная с 2006–2007 годов, на рынке появились новые коммерческие вакцины
    субъединичного и рекомбинантного типов, предназначенные для вакцинации товарного
    поголовья свиней с 2–4-недельного возраста. Эти препараты, разработанные на
    основе штаммов PCV-2a, используют идентичные технологические платформы в рамках
    продуктов одной фармацевтической компании, несмотря на различия в торговых
    названиях в разных регионах. Например, компания Pfizer выпускала один и тот же
    биологический препарат под названием **Сувакцин** в России и **Fostera** в США,
    аналогично другим производителям, таким как **Merial (Circovac), Boehringer
    Ingelheim (Ingelvac CircoFLEX) и MSD (Porcilis PCV)**. Несмотря на разную
    маркировку, их состав и механизм действия остаются идентичными, обеспечивая
    одинаковый уровень защиты против цирковирусной инфекции свиней. Изыскания более
    эффективных средств иммунопрофилактики инфекции, вызванной цирковирусом второго
    типа у свиней, продолжаются и сегодня. Так появились на мировом рынке вакцины
    нового поколения, которые способны обеспечить максимальный по силе и
    продолжительности иммунный ответ. В качестве примера можно привести
    субъединичную вакцину, которая основана на использовании белка PCV-2 Cap (ORF
    2), являющегося ключевым компонентом для формирования иммунной защиты. Ряд
    полезных свойств такой вакцины обеспечены благодаря использованию современных
    адьювантных систем.
  treatment: |
    Лечение больных поросят малоэффективно и экономически не целесообразно.
  vaccination_recommendations: |
    **1. Вакцинация поросят** Иммунизация поросят проводится однократно, начиная с
    **14- или 21-дневного возраста**, в зависимости от применяемого препарата.
    Оптимальный срок введения вакцины определяется в соответствии с инструкцией
    производителя и эпизоотической ситуацией в хозяйстве.
    **2. Вакцинация свиноматок и ремонтных свинок** Для профилактики ЦВИС у
    свиноматок и ремонтного молодняка применяют **ковровую** или **индивидуальную**
    вакцинацию: 1) **Ковровый метод:** введение вакцины всему поголовью **дважды в
    год**; 2) **Индивидуальный метод:** иммунизация за **2–3 недели до осеменения**.
    **3. Корректировка схемы вакцинации** Оптимизация сроков и методов вакцинации
    осуществляется на основании результатов **серологического мониторинга**,
    позволяющего оценить напряженность поствакцинального иммунитета и динамику
    циркуляции вируса в стаде. Подробные критерии интерпретации данных
    серомониторинга изложены в соответствующих диагностических рекомендациях.
  pathogenesis: |
    Первые сообщения об изучении патогенеза были опубликованы Tischer et al. (1986).
    Исследователи заражали 9-месячные серонегативные поросята вирусом, очищенным из
    инфицированной культуры клеток РК-15, и получали вирус из носовых мазков на 3-6
    день после заражения и из фекалий 13-15 дня после инфицирования.
    Неинфицированные контактные поросята заразились и вирус был выделен также из
    носовых секретов и фекалий, что свидетельствует о латеральной передаче вируса.
    Антитела к цирковирусу появились через 1 неделю после заражения возросли к 5
    неделям, их титры колебались от 1:40 до 1:80. Allan et al. (1995) установили,
    что вирус реплицируется в тимусе, селезенке, брыжеечных, бронхиальных и
    заглоточных лимфоузлах, слизистой носа, легком, тонком кишечнике. Pensaert et
    al. (2001) при внутриутробном экспериментальном заражении плодов вирусом PCV-2
    на 21 день после инокуляции обнаружили самый высокий титр вируса в сердце
    (5log10/2), легких, селезенке, печени, лимфоидной ткани. Вирус не обнаружен в
    головном мозгу, сыворотке или других жидкостях тела. Усиление размножения PCV-2
    в организме поросят наблюдается после стимуляции иммунной системы с помощью
    адъюванта Фрейнда, гемоцианина из моллюска "блюдечко", вакцинами или
    инфицированием другими вирусами (ПВС, РРСС). Активация иммунной системы
    сопровождается усиленным размножением макрофагов/моноцитов, которые являются
    клетками-мишенями цирковируса. Интенсивная репликация PCV-2 приводит к развитию
    иммунодефицитного состояния организма поросят. У животных создаются условия для
    активизации условно-патогенных микроорганизмов, что приводит к возникновению
    вторичных инфекций.
  causes_and_risks: |
    Цирковирусная инфекция свиней (ЦВИС), вызываемая Porcine circovirus type 2
    (PCV-2), является одной из наиболее распространенных и экономически значимых
    болезней в свиноводстве. Вирус обладает высокой контагиозностью и устойчивостью
    во внешней среде, что способствует его глобальному распространению. Основные
    пути передачи включают прямой контакт между животными, аэрогенный механизм, а
    также вертикальную передачу от инфицированных свиноматок потомству. Кроме того,
    вирус может переноситься с инфицированными кормами, водой, оборудованием,
    транспортными средствами и обслуживающим персоналом. Риск заноса ЦВИС в
    благополучные хозяйства особенно высок при ввозе невакцинированного поголовья,
    несоблюдении карантинных мероприятий и недостаточной биозащиты. В условиях
    интенсивного свиноводства циркуляция PCV-2 часто осложняется микст-инфекциями
    (например, с репродуктивно-респираторным синдромом свиней – РРСС, парвовирусом,
    микоплазмозом), что усугубляет клиническое течение болезни и увеличивает
    экономический ущерб. Для минимизации рисков необходимо строгое соблюдение
    противоэпизоотических мер, включая регулярную диагностику, вакцинопрофилактику и
    контроль перемещения животных. Анализ данных показал, что экономические потери,
    связанные с заболеванием PCV-2-SD, могут быть весьма значительными. Согласно
    ранним отчётам, потери в Европе составляли около 900 миллионов евро в год
    (данные за 2004 год). Однако более точные расчёты, проведённые в Великобритании,
    показали, что, если учитывать смертность на протяжении всего периода эпидемии
    PCV-2-SD у поросят-отъёмышей и откормочных свиней, экономические потери могут
    достигать 5,76 миллиарда евро для 27 стран ЕС.
