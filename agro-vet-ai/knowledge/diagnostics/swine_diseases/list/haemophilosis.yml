Haemophilosis: # Гемофильоз (Болезнь Глессера)
  disease_name: |
    "Гемофилез", "гемофилез (Болезнь Глессера)", "Haemophilosis suis", "Glässer’s
    disease"
  etiology: |
    Возбудителями гемофилезного полисерозита и плевропневмонии свиней являются
    мелкие полиморфные грамотрицательные неподвижные капсулообразующие бактерии. На
    обычном питательном агаре они не растут, но наблюдается хороший рост их на
    кровяном агаре при наличии специфического ростового фактора: X - фактор (гемин)
    получают из крови, V - фактор (никотинамидадениндинуклеотид) можно получить из
    дрожжевого экстракта или продуктов метаболизма отдельных видов микроорганизмов
    (штаммы кишечной палочки, не обладающие свойством гемолиза эритроцитов, белый
    стафилококк и др.). Микробы образуют капсулы и не образуют спор. Для животных
    патогенны только капсулообразующие бактерии. Микроорганизмы относительно
    устойчивы к воздействию прямых солнечных лучей и высыханию, хорошо сохраняются
    во внешней среде при низкой температуре. Кипячение убивает их за 1-2 мин.
    Дезинфицирующие вещества в рабочих концентрациях (формалин, свежегашеная и
    хлорная известь, гидроксид натрия и др.) инактивируют возбудителя в течение 1-3
    ч. Возбудители гемофилезов чувствительны к ряду антибиотиков, однако, в каждом
    конкретном случае необходимо определение чувствительности к ним. Различают 14
    серологических вариантов возбудителей гемофилезного полисерозита и 12 -
    гемофилезной плевропневмонии, что затрудняет изготовление специфических
    биологических препаратов для специфической профилактики указанных болезней.
  epidemiology: |
    Источником возбудителя болезней являются больные и переболевшие животные, а
    также и взрослые клинически здоровые свиньи - бактерионосители. У 50-70%
    свиноматок и хряков – производителей на слизистых оболочках носовой полости
    обнаруживают патогенные микробы гемофилезного полисерозита и плевропневмонии.
    Поросята заболевают обычно через 8-10 дней после отъема их от свиноматок, или
    при переводе их из одной группы в другую. Однако на многих комплексах нередки
    случаи регистрации гемофилезного полисерозита и плевропневмонии у поросят и до
    25-30-и дневного возраста. Такие поросята представляют особую опасность как
    источник возбудителя инфекции при переводе их на групповое содержание. Заражение
    клинически здоровых свиней возбудителями гемофилезов, чаще происходит аэрогенным
    и контактным путями, но не исключается и через корм, контаминированный
    возбудителем (алиментарный). На промышленных комплексах болезнь регистрируется в
    любое время года, но чаще в осенне-зимневесенний период. Гемофилезный
    полисерозит и плевропневмония свиней относятся к факторным болезням и часто
    регистрируются среди животных, подвергшихся воздействию неблагоприятных
    факторов. 
  clinical_findings: |
    Инкубационный период составляет от нескольких часов до суток. Заболевание
    протекает остро, подостро и хронически. При остром течении температура тела у
    животных повышается до 40,5-41,5°С. Они передвигаются осторожно, отказываются от
    корма, щетина на спине взъерошена, появляется болезненность брюшной стенки.
    Наблюдается кашель, чихание, нередко – рвота. Смерть наступает через 24-36 ч.
    после начала заболевания. При подостром и хроническом течении болезни больные
    поросята становятся малоподвижными, быстро худеют, иногда наблюдаются поражения
    суставов. У отдельных животных выражены эпилептоформные припадки, плавательные
    движения конечностями. У многих животных наблюдается отек век, конъюнктивит и
    ринит. Больные поросята худеют, шерстный покров становится тусклым,
    взъерошенным. Появляется резко выраженное желтушное окрашивание кожи и шерсти.
    Многие больные животные приобретают позу сидячей собаки, подгибая задние
    конечности под живот (характерная поза при гемофилезах).
  postmortem_findings: |
    При вскрытии трупов животных при остром течении гемофилезного полисерозита
    видимые слизистые оболочки бледные, с синюшным оттенком, гиперемия бронхов,
    серозно-фибринозное воспаление плевры, брюшины, перикарда и кровоизлияния на
    них. В плевральной и брюшной полости, в сердечной сумке находят значительное
    скопление жидкости соломенно-желтого цвета с обильными нитями фибрина. При
    подостром и хроническом течении болезни более выражены отложения фибрина на
    серозных оболочках и развитие слипчивого воспаления, сосуды тонкого кишечника
    инъецированы, в легких отмечают участки ателектаза и бронхопневмонии. Суставы
    конечностей увеличены в объеме, в их полости - серозно-фибринозный экссудат или
    повышенное количество синовиальной жидкости, периартикулярные ткани отечные.
    Подчелюстные, заглоточные, бронхиальные, средостенные, наружные и глубокие
    паховые, брыжеечные, прямой кишки лимфатические узлы увеличены в объеме, сочные
    на разрезе гиперемированы, а иногда и с кровоизлияниями. В печени отмечается
    застойная гиперемия и зернистая дистрофия. Почки резко гиперемированы, граница
    между корковым и мозговым слоем сглажена, в них отмечаются очаговые
    кровоизлияния. Пульпа селезенки набухшая, кровенаполнена, иногда с
    кровоизлияниями. У павших от плевропневмонии животных основные изменения
    отмечают в легких. Погибшие свиньи при сверхостром и остром течении имеют
    хорошую упитанность, выраженный цианоз кожи головы и нижней части туловища и
    конечностей, а также кровянистое пенистое истечение из носовых и ротовой
    полостей. В легких обнаруживают одно- или двустороннее геморрагическое
    воспаление. В трахее, бронхах и альвеолах обнаруживают кровянистую жидкость.
    Часто пульмональная плевра срастается с костальной (фибринозный плеврит).
    Бронхиальные и средостенные лимфатические узлы увеличены гиперемированы, с
    кровоизлияниями. При хроническом течении болезни в легких обнаруживают
    инкапсулированные очаги размером 1х2 – 3х4 см, содержащие желтоватую
    некротизированную ткань. В зоне очагов поражения имеет место фибринозный
    плеврит. Регионарные лимфатические узлы слегка увеличены. 
  diagnosis: |
    Диагноз ставят на основании эпизоотологических данных, клинических признаков и
    патологоанатомических изменений с учетом результатов бактериологического
    исследования. Для бактериологического исследования направляют экссудат из
    перитонеальной, плевральной и перикардиальной полостей с пленками фибрина. В
    лаборатории исследуют мазки из материала и делают посев на кровяной МПА для
    выделения чистой культуры с определением серологической принадлежности.
    Лабораторная диагностика основана на результатах бактериологического
    исследования. Бактериологическое исследование Стерильно отбирают
    серозно-фибринозный экссудат из перитонеальной, плевральной, перикардиальной
    полостей, пораженных суставов, при наличии симптомов поражения — ЦНС-фрагменты
    тканей головного мозга, при наличии пневмонии — кусочки легких на границе
    пораженной и здоровой ткани. Материал транспортируют в термосе со льдом.
    Микроскопическое исследование исходного материала Из материала готовят
    мазки-отпечатки, окрашивают по Граму и одним из методов для выявления капсул. В
    патологическом материале возбудитель располагается в виде одиночных мелких
    грамотрицательных палочковидных бактерий, иногда небольшими скоплениями,
    короткими цепочками, клетки имеют капсулу. Выделение и идентификация культуры
    возбудителя Культивирование. H.parasuis — факультативный аэроб, температурный
    оптимум 37-38°С, рН 7,2-7,4. На обычных средах возбудитель не растет, требует
    добавления в среду готового фактора роста — V-фактор
    (NAD-никотинамидаденин-динуклеотид или NAD-фосфат NADP). В качестве источника
    V-фактора используют дрожжевой экстракт, энзиматически чистой NAD (NADP), гретую
    кровь барана (лошади) или растущую культуру «бактерийкормилок», которая при этом
    выделяет в окружающую среду Vфактор, что обеспечивает возможность роста вокруг
    колоний «бактерий-кормилок» сателлитньгх мелких колоний H.parasuis. Стерильные
    дрожжевой экстракт и чистый NAD добавляют в МПА, МПБ, агар и бульон Хоттингера.
    Рост H.parasuis также зависит от наличия в среде сыворотки крови (барана,
    лошади, крупного рогатого скота), которую добавляют в питательную среду в
    количестве 8-10%. Для первичного выделения возбудителя лучше всего использовать
    кровяной агар (5- 10% дефибринированной крови барана, лошади, кролика) с
    «бактерией-кормилкой». При исследовании контаминированного материала применяют
    среды Controni. Кровяной агар слегка подсушивают. Исследуемый материал засевают
    шпателем (бактериологической петлей) по всей поверхности среды. Затем по
    диаметру чашки в виде двух прямых линий под углом 90° засевают
    бактериологической петлей культуру негемолитического штамма стафилококка или Е.
    coli («бактериякормилка»). На плотные и жидкие питательные среды, содержащие
    готовые ростовые факторы (NAD, дрожжевой экстракт, гретую кровь), материал
    засевают обычным способом. Посевы культивируют при 37- 38°С в течение 24 - 48
    часов в аэробных условиях. Характер роста Н. parasuis на питательных средах. На
    кровяном МПА возбудитель растет в виде мельчайших не гемолитических колоний на
    расстоянии не более 1,0-3 см от штриха «бактерии - кормилки» (зона диффузии
    V-фактора). Вблизи «кормилки» колонии возбудителя крупнее, по мере удаления —
    мельче, так как снижается концентрация ростового фактора. Такой рост H.parasuis
    на кровяном агаре называют «сателлитным». На прозрачном сывороточном МПА с
    «бактерией-кормилкой» колонии прозрачные, круглые, выпуклые, с ровными краями,
    слизистой консистенции, флуоресцирующие в косопроходящем пучке света. На агаре с
    гретой кровью («шоколадный агар») в первичных посети можно наблюдать колонии
    двух типов: крупные — диаметр 1,5-2,5 мм и мелкие 0,2-0,5 мм. Морфология колоний
    лучше различима на прозрачных питательных средах типа агара Левинталя,
    сывороточно-дрожжевого агара. Колонии на этих средах имеют правильную круглую
    форму. Они выпуклые, с гладкой поверхностью, ровными краями, слизистой
    консистенции, прозрачные, флуоресцирующие в косопроходящем свете. В процессе
    пассажирования возбудителя на питательных средах в результате диссоциации
    колонии могут терять свойство флуоресценции. В жидких питательных средах (бульон
    Левинталя, сывороточнодрожжевой бульон) Н. parasuis растет с легким равномерным
    помутнением среды, через 48-72 часа среда просветляется, на дне пробирки
    формируется слизистый осадок. Морфология клеток возбудителя в культуре. Из
    выросших культур готовят и микроскопируют мазки, окрашенные по Граму, нa капсулы
    — по Гинсу, препарат «раздавленная капля» для определения подвижности.
    Морфология клеток H.parasuis такая же, как и в патологическом материале, но
    часто обнаруживаются нитевидные формы. Клетки имеют капсулу, не образуют
    жгутики. Идентификация H.parasuis на уровне рода. С целью отнесения выделенной
    культуры к роду Haemophilus, в первую очередь определяют морфологические,
    тинкториальные, культуральные признаки и зависимость роста от NAD, а также
    подвижность, способность расти на средах с 0,5% NaCI, агаре Мак-Конки,
    образовывать каталазу, оксидазу, фосфатазу, ферментировать глюкозу, дульцит,
    гидролизовать твин-80. На практике идентификацию возбудителя, исходя из
    патологоанатомических данных, сразу ведут на видовом уровне, придавая
    первостепенное значение определению NAD-зависимости. Идентификация H.parasuis на
    видовом уровне. При видовой идентификации, исходя из происхождения исследуемого
    материала (свинья), Н. parasuis приходится дифференцировать от NAD-зависимых
    культур Actinobacillus pleuropneumoniae. Биопроба. Для определения патогенных
    свойств выделенной культуры используют внутрибрюшинный способ заражения морских
    свинок. Исследуемую культуру выращивают 24 часа на «шоколадном агаре», смывают
    стерильным физиологическим раствором, устанавливают концентрацию бактерий по
    оптическому стандарту мутности на уровне 20 ед. Взвесь в дозе 1 мл вводят трем
    морским свинкам внутрибрюшинно. Гибель в течение 5 суток хотя бы части животных,
    выявление у погибших морских свинок поражения серозных оболочек и выделение в
    результате бактериологического исследования исходной культуры позволяют
    рассматривать ее как вирулентную. Схема лабораторного исследования
    патологического материала для выделения и идентификации микроорганизмов. Процесс
    начинается с "Патологического материала", который включает "Кусочки пораженных
    легких, средостенные и бронхиальные лимфатические узлы". Этот материал затем
    подвергается двум основным этапам: 1)  Микроскопия: Проводится "окраска по Граму
    и по Гинею"; 2)  Посев на питательные среды: Используются различные среды, такие
    как "На кровяной, шоколадный МПА и МПА с баккормилками, МПА, МПБ, среда Закса".
    После этих начальных этапов осуществляется "Выделение чистой культуры и ее
    идентификация". Этот этап включает в себя анализ по нескольким направлениям: 1)
    Морфологические признаки ("Гр-, коккобактерии с капсулой"); 2) Культуральные
    свойства; 3) Биохимические свойства; 4) Гемолитическая и уреазная активность. 
  differential_diagnosis: |
    Гемофилезный полисерозит дифференцируют от актинобациллезной плевропневмонии,
    пастереллеза, микоплазмоза, стрептококкоза, рожи и анаэробной энтеротоксемии.   
  prevention: |
    При гемофилезном полисерозите и плевропневмонии на свиноводческих комплексах
    применяемые вакцины зачастую не дают желаемого результата. Во-первых, при
    указанных болезнях среди свиней циркулирует довольно много серовариантов
    возбудителей (до 14), а в изготавливаемых вакцинах их всего лишь – один, два.
    Прежде чем закупать вакцину, необходимо заранее знать, какие сероварианты
    циркулируют среди свиней на конкретном комплексе и из них изготавливать
    биопрепараты (автовакцины). Во-вторых, из-за скудного роста возбудителей на
    жидких и плотных питательных средах довольно сложно обеспечить необходимую
    концентрацию антигена (до 4-5 млрд мк. кл./см3 ). В-третьих, у довольно большого
    количества животных имеет место низкий иммунный статус организма. На таком фоне
    даже качественные вакцины не будут вызывать образование напряженного иммунитета
    у животных. Одним методом специфической профилактики гемофилезного полисерозита
    и плевропневмонии свиней на промышленных комплексах- решить проблему высокого
    процента падежа, вынужденного убоя и непроизводительного выбытия животных
    невозможно.    
  treatment: |
    Для лечения поросят используют антибиотики и сульфаниламидные препараты,
    применение которых эффективно на ранних стадиях развития болезни. При появлении
    на свиноферме больных гемофилезом животных лечение начинают незамедлительно, при
    этом антибиотики вводят как больным, так и условно здоровым поросятам для
    предотвращения заболевания. Лечение животных с клиническими признаками, у
    которых началось фибринозное воспаление серозных оболочек и образование спаек,
    нарушающих работу внутренних органов, часто оказывается неэффективным.
    Нaemophilus parasuis обычно чувствителен к пенициллину, эритромицину,
    тетрациклину и левомицетину. Как и при актинобациллезной плевропневмонии
    целесообразно использовать средства с пролонгированным действием, введение
    которых позволяет поддерживать концентрацию ДВ в крови и легочной ткани животных
    от 7 до 40 дней.
  vaccination_recommendations: |
    При гемофилезном полисерозите и плевропневмонии на свиноводческих комплексах
    применяемые вакцины зачастую не дают желаемого результата. Во-первых, при
    указанных болезнях среди свиней циркулирует довольно много серовариантов
    возбудителей (до 14), а в изготавливаемых вакцинах их всего лишь – один, два.
    Прежде чем закупать вакцину, необходимо заранее знать, какие сероварианты
    циркулируют среди свиней на конкретном комплексе и из них изготавливать
    биопрепараты (автовакцины). Во-вторых, из-за скудного роста возбудителей на
    жидких и плотных питательных средах довольно сложно обеспечить необходимую
    концентрацию антигена (до 4-5 млрд мк. кл./см3 ). В-третьих, у довольно большого
    количества животных имеет место низкий иммунный статус организма. На таком фоне
    даже качественные вакцины не будут вызывать образование напряженного иммунитета
    у животных.
  pathogenesis: |
    При снижении резистентности возбудители гемофилезов через слизистую дыхательных
    путей проникают в кровь, разносятся по организму животного, задерживаясь на
    серозных оболочках плевры, перикарда, брюшины, легких, селезенке и печени, где
    размножаются и вызывают патологические изменения. У отдельных  животных
    микроорганизмы адсорбируются и размножаются в синовиальном слое капсулы суставов
    и синовии, нередко преодолевают гематоэнцефалический барьер и поражают головной
    мозг. Выделяемые токсины обусловливают развитие угнетения, дистрофические
    изменения в паренхиматозных органах и тканях. Возбудители гемофилезного
    полисерозита и плевропневмонии вызывают воспаление брюшины, перикарда, плевры,
    суставов, патологические процессы в легких, почках. 
  causes_and_risks: |
    Источник гемофилезного полисерозита свиней — больные или переболевшие поросята и
    свиноматки. Недуг возникает, когда ослабевает сопротивляемость организма. Это
    может происходить из-за раннего отъема поросят, их перегруппировки,
    транспортировки, переохлаждения или перегревания. В промышленных комплексах
    животные заболевают в основном на 15–20-й день после отъема. Заражение
    происходит аэрогенно. Расстройство протекает в течение года, но наиболее массово
    проявляется в холодные сезоны. Заболеваемость достигает 25 %, а смертность —
    10–15 % восприимчивого поголовья. Экономические потери при гемофилезах свиней
    складываются из большого процента заболеваемости, высокой летальности,
    вынужденного убоя заболевших особей и выбраковки. Переболевшие поросята хуже
    расту и развиваются, плохо откармливаются и почти всегда подлежат выбраковке.