Streptococcosis: # Стрептококкоз свиней
  disease_name: |
    Стрептококкоз свиней, Porcine streptococcosis - международное название,
    Streptococcosis suis – латинский вариант
  etiology: |
    Streptococcus suis – один из наиболее распространенных инфекционных агентов, в
    странах с высоко развитым свиноводством. Заболевание, вызваемое данным
    патогеном, характеризуется септицемией и внезапной смертью, острым менингитом,
    полисерозитом, пневмонией, полиартритом, серозно-гнойным дерматитом. Каждая из
    перечисленных форм инфекции может проявляться на разных этапах выращивания
    свиней. Расходы на препараты, повышение трудозатрат и снижение сохранности
    поголовья оказывают существенное влияние на экономику производства. S. suis –
    грамположительный, факультативно анаэробный, альфа-гемолитический кокк. В
    настоящее время подразделяется, по меньшей мере, на 37 различных серотипов по
    специфическим капсульным антигенам. У больных свиней выделяют в основном
    серотипы 1-9 S. suis, а наиболее распространенным является серотип 2. Первые
    данные по инфицированию S. suis были опубликованы Jansen and Van Dorssen в
    Нидерландах (1951) и Field et al. (1954) в Англии. С того момента, стрептококкоз
    получил всемирное распространение, а вопрос борьбы с ним сохраняет свою
    актуальность.
  epidemiology: |
    S suis присутствует во всех регионах мира, где разводят свиней. Серотипы 1–9
    (включая серотип 1/2, который имеет общие антигены с серотипами 1 и 2)
    составляют более 70% изолятов S suis, выделенных у больных свиней. Серотип 2,
    как правило, наиболее распространён в Европе и Азии; однако его значение ниже в
    Северной Америке, где он является вторым по распространённости серотипом после
    серотипа 1/2. Серотип 9 является наиболее часто выделяемым типом в некоторых
    европейских странах, таких как Испания, Германия и Нидерланды. S suis стал
    широко распространён в странах, где не разрешено профилактическое и
    метафилактическое применение противомикробных препаратов. Большинство клинически
    здоровых свиней являются носителями нескольких серотипов S suis, хотя некоторые
    из них колонизированы вирулентными штаммами. Поросята заражаются S suis из
    вагинальных выделений во время родов и кормления. Субклинические носители служат
    источником инфекции для своих сородичей после того, как их перемешивают в
    свинарнике, когда материнские антитела перестают действовать. Клинические
    признаки инфекции наблюдаются в основном у отъемышей (через 2–5 недель после
    отъёма), редко у сосущих и растущих свиней и почти никогда у взрослых животных.
    Передача инфекции между стадами происходит при перемещении и смешивании здоровых
    свиней-носителей. Попадание высоковирулентного штамма в неопытное стадо может
    привести к последующему заражению отнятых от свиноматок поросят. Однако в
    некоторых стадах, где животные являются носителями вирулентных штаммов, но не
    болеют, при наличии предрасполагающих факторов, таких как: 1) переполненность;
    2) плохая вентиляция; 3) чрезмерные колебания температуры; 4) смешивание свиней
    разного возраста с интервалом более 2 недель; 5) сопутствующие инфекции с
    другими патогенами. Вспышки заболеваний, вызванные S suis, часто сопровождаются
    соинфекцией репродуктивно-респираторным вирусом свиней и, реже, вирусом гриппа
    свиней. S suis также может передаваться через предметы обихода и мух, хотя
    вероятность этого невелика. Хотя S suis был выделен от различных видов
    млекопитающих и птиц, значение таких резервуаров неизвестно. Streptococcus suis
    серогруппы C вызывает пупочный сепсис и артриты у поросят-сосунов. Серогруппа D
    тип 2 проявляется менингитом у поросят-отъемышей, тогда как тип 1 этой же
    серогруппы вызывает менингит, плеврит и пневмонию у поросят-сосунов. Серогруппа
    E приводит к цервикальному лимфадениту у подсвинков в возрасте от 10 до 20
    недель. Также серогруппа D может вызывать септицемию.   
  clinical_findings: |
    При стрептококковой инфекции количество свиней-носителей достигает 100%, при
    этом случаи возникновения заболевания варьируются в зависимости от периода
    выращивания и, обычно, не превышают 5%. Различают три клинических формы: острая,
    подострая и хроническая. Острая форма протекает в виде септицемии и проявляется
    внезапной смертью животного. Подострая форма протекает, как правило, в виде
    менингита. Первые нервные симптомы включают нарушения координации, животные
    прижимают уши, зажмуривают глаза, принимают позу сидячей собаки. Симптомы быстро
    прогрессируют в неспособность стоять, опистотонус, атаксию и нистагм
    (непроизвольное, быстрое и повторяющееся движение глаз), смерть обычно наступает
    в течение 4-5 часов. Хроническая форма стрептококкоза характеризуется поражением
    легких, зараженные животные теряют среднесуточный привес, обнаруживаются
    различные степени диспноэ, цианоз, полиартрит, хромота и истощение.
  postmortem_findings: |
    Нередко, заболевание заканчивается гибелью животного. Специфические макро- и
    микроскопические изменения характерные для S. suis регистрируются в легких,
    головном мозге, сердце и суставах. В зависимости от локализации очага и остроты
    течения воспалительного процесса, заболевание при вскрытии проявляется
    менингеальной или суставной формой и в виде фибринозного полисерозита.
    Септицемия. При данной форме отмечается иктеричность покровов, геморрагический
    диатез, инфаркты (в селезенке, печени, почках, реже – в других органах). Для
    септицемии характерно явление септической селезенки (геморрагический спленит).
    Орган резко увеличен в объеме, капсула напряжена, иногда отмечаются его разрывы
    с внутренним кровотечением, под капсулой отмечаются участки кровоизлияний. На
    разрезе паренхима выступает за края капсулы, имеет более темный, насыщенный
    цвет, иногда размягчена. Лимфоузлы увеличены в объеме, капсула напряжена, на
    разрезе имеют пестрый мраморный рисунок. Пиемия. Характеризуется образованием
    множественных абсцессов в различных органах и тканях, обусловленных
    метастазированием из кровотока S. suis. Абсцессы локализуются, как правило, в
    области ворот инфекции. Данная форма часто встречается на производстве, как
    последствия каннибализма. Менингит. При патологоанатомическом вскрытии
    регистрируется отек легких, вызванный остановкой дыхания при параличе
    дыхательного центра. При вскрытии черепной коробки наблюдается воспаление
    мозгового вещества и яркая гиперемия сосудов головного мозга. Это вызвано
    дистрофическими процессами в эндотелии капилляров и деструктивными процессами в
    нервных клетках. Воспалительный процесс начинается в оболочках мозга и переходит
    на вещество. Центральная нервная система при этом отвечает артериальной
    гиперемией с периваскулярной инфильтрацией, ограниченной мезенхимой вокруг
    сосудов или распространенной и на окружающую паренхиму (менингеальный экссудат).
    Полисерозит. Проявляется фибринозным воспалением всех серозных оболочек разной
    степени тяжести. В грудной и брюшной полостях, и сердечной сумке  обнаруживается
    фибринозный экссудат. Для подострого и хронического течения стрептококкоза,
    характерно отложения фибрина на сердце («волосатое» сердце), плевре и органах
    брюшной полости. Петли кишечника склеены между собой тяжами фибрина, сердечная
    сумка срастается с сердцем и, не редко, с грудиной. У павших поросят
    обнаруживают признаки катаральной или гнойно-очаговой пневмонии и поражения
    суставов.  
  diagnosis: |
    Предварительный диагноз обычно основывается на клинических признаках и
    макропоражениях. Выделение и серотипирование инфекционного агента в лабораторных
    условиях подтверждают диагноз. Для постановки диагноза стрептококкоз необходимо
    учитывать эпизоотологические данные, клинические признаки, патологоанатомические
    изменения, а окончательный диагноз устанавливается лабораторными методами.
    Выделяют возбудителя из воспаленных органов при помощи бактериологического
    посева на специальных питательных средах с соблюдением условий культивирования
    или при помощи молекулярногенетических методов исследования. В диагностическом
    комплексе важным, а во многих случаях и решающим звеном является
    патологоанатомическое исследование. Оно позволяет выявить специфические для
    некоторых болезней патологоанатомические изменения, получить объективные данные
    для дифференциации и нередко поставить окончательный диагноз и при необходимости
    – целенаправленно отобрать материал для дополнительных лабораторных
    исследований. При вскрытии суммируются клинико-эпизоотологические данные, далее
    они сопоставляются с результатами вскрытия, а позднее при необходимости
    подтверждаются дополнительными лабораторными исследованиями. Лабораторные
    исследования при септической форме стрептококковой инфекции являются необходимым
    уточняющим методом диагностики и дифференциации, так как при этой форме
    отсутствуют типичные клинические и патологоанатомические признаки, а полиартрит,
    пневмонии наблюдаются при многих других заболеваниях со схожими признаками.
    Лабораторная диагностика стрептококкоза может включать в себя: микроскопию
    мазков-отпечатков из патматериала - при данном исследовании обнаруживают
    стрептококки, располагающиеся попарно или в виде коротких цепочек; выделение
    культуры на питательных средах с последующей идентификацией с применением
    стрептококковых групповых диагностических сывороток в серологической реакции
    (РП, латекс – агглютинации, 39 коагглютинации); определение патогенности на
    белых мышах; гистологическое исследование, ПЦР-исследование. В настоящее время
    ПЦР является наиболее распространенным методом диагностики и идентификации S.
    suis. К преимуществам ПЦР относятся высокая чувствительность и специфичность
    метода наряду с быстротой и простотой выполнения. При отборе материала на
    бактериологическое и ПЦР-исследование следует руководствоваться информацией о
    том, в каких органах и тканях наиболее часто выделяют возбудителя. У больных
    свиней наиболее часто отмечают выделение стрептококков по нисходящей в ткани
    головного мозга и цереброспинальной жидкости, синовиальной жидкости из
    воспаленных суставов, сердце, лимфатических узлах и легких. В лабораторию для
    бактериологического или ПЦР-исследования направляют пробы от двух-трех больных
    животных, не подвергавшихся лечению. Патологическим материалом, пригодным для
    проведения лабораторных исследований, служит шприцевой пунктат жидкости из
    воспаленного сустава; шприцевой пунктат спинномозговой жидкости, отобранный в
    асептических условиях в месте сочленения атланта с затылочной костью черепа;
    мазок из-под мозговых оболочек на транспортной среде; воспаленные лимфоузлы;
    кровь из сердца; печень и селезенка. Выбор отбираемых органов будет зависеть от
    результатов вскрытия и анамнестических данных. Отбора образцов легких, по
    возможности, рекомендуют избегать, так как обнаружить там стрептококков можно и
    у здоровых свиней, а, следовательно, нет гарантий, что они являются причиной
    заболевания. Для прижизненной диагностики используют содержимое воспаленных
    суставов. Учитывая низкую устойчивость возбудителя, материал должен быть
    доставлен не позднее 6 часов после гибели или убоя животного при условии
    транспортировки его при температуре 4-6°С. При более высокой температуре 40 срок
    доставки материала не должен превышать 2-3 часа. Все стрептококки -
    грамположительные, круглые до оваловидных (ланцетовидных) форм кокки размером до
    2 мкм, расположенные парами или цепочками разной длины. Стрептококки не образуют
    спор, неподвижны, каталазоотрицательные, большинство видов не имеют капсул.
    Более крупные цепочки выделяют в мазках из гноя и с жидких питательных сред.
    Стрептококки - аэробы и факультативные анаэробы, оптимальная температура роста
    37-38°С. На плотных питательных средах образуют мелкие, круглые, прозрачные или
    мутные, сероватого цвета колонии S-формы. Они хорошо растут на питательных
    средах, содержащих сыворотку крови или кровь лошади, барана, кролика и других
    животных. Одно из важнейших свойств стрептококков, определяющих их патогенность,
    - отношение к кровяному агару: одни из них вызывают полный гемолиз эритроцитов
    (бета-стрептококки), образуя вокруг колоний зоны просветления; другие
    (альфа-стрептококки) вызывают очень слабый гемолиз и образуют на агаре колонии
    зеленого цвета; третьи (гамма-стрептококки) не вызывают гемолиза эритроцитов. В
    бактериологической лаборатории диагноз на стрептококковую инфекцию считают
    установленным, исходя из следующих показателей: выделение из патматериала
    культуры стрептококков, патогенных для белых мышей; гибель лабораторных животных
    и выделение от них культуры со свойствами, характерными для стрептококков, если
    даже в посевах из материала не была выделена культура. В качестве
    дополнительного прижизненного теста для больных животных выступает
    иммуноферментный анализ, который позволяет установить уровень антител к
    Streptococcus suis. Этим методом можно пользоваться и в ретроспективной
    диагностике — путем отбора парных проб сывороток от 41 контрольной группы
    животных. По нарастанию уровня антител можно судить о стадии стрептококковой
    инфекции. Также методом ИФА можно пользоваться для установления и контроля
    уровня, стабильности и продолжительности иммунного ответа (антител IgG против
    Streptococcus suis). Помимо вышесказанного, также используется такой метод, как
    иммуногистохимия. Метод предназначен для дополнительного подтверждения
    возбудителя инфекционного процесса, особенно в материалах, полученных во время
    вскрытия. Наличие цветной реакции указывает на присутствие в тканях компонентов
    инфекционного Иммуногистохимия в России не получила широкого распространения,
    так как она требует больших финансовых и временных затрат. В то время как за
    рубежом данный метод активно используется. Метод позволяет напрямую соотнести
    обнаружение возбудителя с патоморфологическими изменениями, а также исследовать
    ретроспективно образцы тканей, залитые в парафиновые блоки. Данный метод нельзя
    считать рутинным в диагностике стрептококкоза, но он может быть полезен в
    научных исследованиях.   
  differential_diagnosis: |
    При дифференциальной диагностике прежде всего необходимо исключить: болезнь
    Ауески; гемофилезный полисерозит; отечную болезнь; пастереллез.    
  prevention: |
    На промышленных свинокомплексах встречается применение как коммерческих, так и
    аутогенных вакцин, но по причине огромного разнообразия серовариантов результаты
    противоречивые. Полностью исключить наличие S. suis невозможно, поэтому
    необходимо проводить ветеринарно-санитарные мероприятия направленные на
    ликвидацию источника возбудителя болезни и факторов его передачи. Используемые в
    практике дезинфектанты и моющие средства способны обезвреживать S. suis, но
    только с выдержкой концентрации и экспозиции рекомендуемой производителем.
    Только комплексный подход, включающий в себя контроль предрасполагающих
    факторов, в совокупности с рациональной антибиотикотерапией – единственно верный
    путь к достижению высоких производственных показателей в условиях промышленного
    свиноводства.  
  treatment: |
    Профилактика заболевания основана на контроле предрасполагающих факторов,
    антибиотикотерапии и ликвидации возбудителя в окружающей среде.
    Антибиотикотерапия при любом бактериальном заболевании должна быть рациональна и
    основываться на антибиотикограмме. При выборе препарата по-прежнему актуальны
    положения выдвинутые Александром Флемингом: 1) антибиотик назначается в
    соответствии с чувствительностью к нему возбудителя заболевания; 2) антибиотик
    назначается в такой разовой и суточной дозе, и вводиться таким путем, чтобы
    обеспечить лечебную концентрацию в очаге воспаления; 3) антибиотик назначается в
    такой дозе и вводиться таким путем, чтобы исключить или максимально ограничить
    его повреждающее действие. Результаты анализа показали наличие микроорганизмов:
    Streptococcus группы B в количестве 5 × 10⁴ КОЕ/мл и Lactobacillus spp. в
    количестве 1 × 10⁵ КОЕ/мл. При определении чувствительности Streptococcus группы
    B к антибиотикам были получены следующие данные: ампициллин (10 мкг) — зона 28
    мм, чувствительный (S); ванкомицин (30 мкг) — зона 20 мм, чувствительный (S);
    клиндамицин (2 мкг) — зона 27 мм, чувствительный (S); левофлоксацин (5 мкг) —
    зона 28 мм, чувствительный (S); доксициклин (30 мкг) — зона 24 мм,
    чувствительный (S); ко-тримоксазол (1,25 мкг + 23,75 мкг) — зона 26 мм,
    чувствительный (S); эритромицин (15 мкг) — зона 29 мм, чувствительный (S);
    цефотаксим (30 мкг) — зона 23 мм, устойчивый (R); рифампицин (5 мкг) — зона 18
    мм, умеренно-устойчивый (I); линезолид (30 мкг) — зона 20 мм, устойчивый (R);
    моксифлоксацин (5 мкг) — зона 26 мм, чувствительный (S); оксациллин (1 мкг) —
    зона 25 мм, чувствительный (S). Заключение: из исследуемого материала выделен
    бета-гемолитический стрептококк группы B, количество лактобацилл соответствует
    норме. Условные обозначения: R — устойчивый, S — чувствительный, I —
    умеренно-устойчивый. Схема применения антибактериальных препаратов для контроля
    стрептококкоза должна быть системной и охватывать все половозрастные группы, в
    т.ч. включать в себя санацию маточного поголовья с целью снижения общего
    бактериального фона. Для этих целей часто используются амоксициллинсодержащие
    препараты, например Амоксипрем®. Лечение послеродовых патологий (синдром ММА) –
    одно из важнейших звеньев в цепи мероприятий по контролю стрептококкоза в стаде.
    На этом этапе рационально используется парентеральное введение антибактериальных
    препаратов и противовоспалительных средств, таких как Шотапен и Флексопрофен®.
    При проведении хирургических манипуляций в первые дни жизни (кастрация,
    купирование хвостов, стачивание клыков) происходит инфицирование поросят через
    раневые «ворота». В данном случае обоснован выбор инъекций пролонгированных
    препаратов на основе азитромицина (Зитрекс®) или β-лактамов (Шотапен, Соламокс®
    суспензия для  инъекций). Также, при планировании профилактической схемы важно
    учесть все стресс периоды: адаптация животных после отъема или перевода на
    участок откорма, смена кормов. Так, инъекция Зитрекса® в момент или после отъема
    позволит обеспечить надежную защиту поголовья в течение всей адаптации на
    участке доращивания – до 10 суток. При достижении 40-45 дня жизни обосновано
    применяются амоксициллинсодержащие препараты с водой (Соламокс®), с дальнейшей
    ротацией на доксициклинсодержащие - Соладокси®.
  vaccination_recommendations: |
    На промышленных свинокомплексах встречается применение как коммерческих, так и
    аутогенных вакцин, но по причине огромного разнообразия серовариантов результаты
    противоречивые. Полностью исключить наличие S. suis невозможно, поэтому
    необходимо проводить ветеринарно-санитарные мероприятия направленные на
    ликвидацию источника возбудителя болезни и факторов его передачи. Используемые в
    практике дезинфектанты и моющие средства способны обезвреживать S. suis, но
    только с выдержкой концентрации и экспозиции рекомендуемой производителем.
  pathogenesis: |
    Streptococcus suis проникает в лимфатическую систему и кровоток, где снижает
    активность фагоцитов и вызывает сепсис. Токсины, выделяемые бактериями,
    повреждают сосудистый эндотелий, что приводит к кровотечениям на слизистых и
    серозных оболочках. Белково-жировые изменения в миокарде, печени и почках под
    воздействием токсинов могут привести к гибели животного. 
  causes_and_risks: |
    Источником стрептококков обычно являются клинически здоровые носители этих
    микроорганизмов. Введение в восприимчивое к заражению стадо распространителей
    патогенных штаммов S.suis вызывает резкое проявление стрептококкоза прежде всего
    в группах отсаженных поросят и подсвинков. Заражение новорожденных может
    произойти уже в первые дни и даже часы их жизни. Это происходит аэрогенным
    путем, а также и в результате питья поросятами инфицированного молозива или
    молока. Заражение может иметь место и в родо-половых путях во время родов; как
    упоминалось, S.suis бытует часто и родо-половых путях. Воротами проникновения
    стрептококков в организм из зараженной среды является пораженный эпителий
    слизистой оболочки полости губы новорожденных, как следствие неправильного
    срезания клыков, в результате чего появляется местное повреждение и некроз
    проти-воположной десны. Несмотря на то, что большинство отсаженных поросят
    инфицированы S.suis, только некоторые из них заражены штаммами, способными
    вызвать болезнь. В организме стрептококки живут до 5 дней. Важную роль в
    патогенезе играет моноциты. Выполняют они только роль «переносчика» штаммов
    S.suis из миндалин в мозг, суставов и сывороточных оболочек организма, но
    являются также формой инкубатора, в котором микроорганизмы эти могут
    размножаться. Эти клетки могут переносить болезнетворные штаммы, зато они не
    способны «перемещать невирулентные штаммы. Большинство научных работ, касающихся
    патогенеза стрептококкоза, относятся к стрептококковому воспалению оболочек
    мозга. Гораздо хуже изучен патогенез очень важной актуальной проблемы, которой
    является воспаление легких, связанное с инфицированием подсвинков или
    откормочников S.suis тип 2. Доказано, что на свинофермах, инфицированных вирусом
    PRRS и S.suis число случаев, стрептококкового воспаления оболочек мозга намного
    больше, нежели в хозяйствах, инфицированных исключительно S.suis. Независимо от
    клинической формы стрептококкоза, первичным местом существования стрептококков
    являются миндалины. Отсюда микроорганизмы попадают в периферийные лимфатические
    узлы, в которых могут быть задержаны, что блокирует развитие болезни, или в
    случае снижения их сопротивляемости попадают в кровь, вызывая сепсис. С кровью
    могут попасть в оболочки мозга, суставов, легких, сердца и иные органы.
    Клинические проявления стрептококкоза зависят от места, куда проникли
    стрептококки, а также степени повреждения инфицированных органов. Ущерб
    складывается из нескольких факторов: Гибель молодняка и вынужденный убой
    животных. В некоторых хозяйствах стрептококкоз — основная причина падежа
    поросят; 2) Недополучение привесов. Больные свиньи либо быстро гибнут, либо
    сильно отстают в наборе массы тела; 3) Затраты на диагностические и лечебные
    мероприятия.  По данным исследований, в хозяйствах Ленинградской области в 2018
    году стрептококкоз стал причиной падежа 15,4% поросят в группе доращивания и
    37,4% поросят в группе откорма. Экономические потери в эти периоды оказались
    наиболее значимыми, так как на долю групп доращивания и откорма приходится около
    половины затрат производства в большинстве свиноводческих хозяйств.