Pseudorabies: # Вирус болезни Ауэски (ВБА) или Morbus Aujeszky
  disease_name: |
    Вирус болезни Ауэски (ВБА)
  etiology: |
    Впервые о болезни Ауески как о самостоятельной нозологической единице сообщил в
    Венгрии Аладар Ауески (1902). Открытие Ауески было подтверждено другими
    венгерскими учёными — Ф. Гутирой и Й. Мареком, которые описали болезнь у собак и
    кошек. В 1938 году на Международном ветеринарном конгрессе было принято решение
    назвать болезнь в честь её первооткрывателя. В России впервые болезнь была
    описана у крупного рогатого скота (1909—1911), а затем у овец (1915). В
    настоящее время болезнь Ауески встречается во всех частях света.
  epidemiology: |
    Болезнь Ауески — заболевание домашних и диких животных, вызываемое вирусами Suid
    herpesvirus-1 **(SuHV-1)** подсемейства Alphaherpesvirinae семейства
    Herpesviridae. Геном представляет собой духцепочечную ДНК размером 180-190нм.
    Возбудитель – ДНК-содержащий вирус Suid herpesvirus-1 **(SuHV-1)** подсемейства
    Alphaherpesvirinae семейства Herpesviridae. Геном представляет собой
    духцепочечную ДНК размером 180-190нм. Вирус культивируют в первичных и
    перевиваемых клеточных культурах различного происхождения с образованием
    характерного ЦПД. Репликационный цикл короткий – 24 ч. Прослеживается связь
    между ЦПД, морфологией бляшек и вирулентностью штамма. Возбудитель обладает
    широким спектром патогенности для всех сельскохозяйственных и диких животных,
    пушных зверей и грызунов. К экспериментальному заражению особенно чувствительны
    кролики, и их широко используют для диагностики болезни (биопроба). Вирус
    индуцирует у больных животных и реконвалесцентов образование
    вируснейтрализующих, комплементсвязывающих и преципитирующих антител. В
    антигенном отношении он однороден, имеет только один иммунологический тип
    вируса. Существует лишь антигенное родство с вирусом простого герпеса. В природе
    циркулируют штаммы с различной вирулентностью.
  clinical_findings: |
    Инкубационный период в большинстве случаев длится 1 – 8 дней, как исключение – 3
    нед. Его продолжительность зависит от естественной устойчивости, вида и возраста
    животного, места проникновения и вирулентности вируса. Клинические признаки у
    свиней прежде всего определяются возрастом животного. У взрослых свиней болезнь,
    как правило, протекает доброкачественно, проявляясь в течение 1 – 3 дней не
    значительной лихорадкой, угнетением, потерей аппетита, иногда рвотой. Большая
    часть животных может переболеть в скрытой форме. В некоторых случаях взрослые
    свиньи болеют тяжело. Кроме описанных признаков, появляются истечения из носа,
    кашель, шаткая походка, движение по кругу, тяжелое дыхание, выделение слюны,
    параличи конечности, глотки и гортани; животные погибают в коматозном состоянии.
    Среди откармливаемых подсвинков нередко наблюдают признаки катаральной и
    крупозной пневмонии, если присоединяется секундарная инфекция вируса гриппа,
    сальмонелл, пастерелл и других микроорганизмом. У свиноматок нарушается
    лактация, появляются массовые аборты, мертворождения и мумификация плодов.
    Наиболее злокачественно болезнь протекает у поросят-сосунов и отъемышей. Течение
    болезни острое. 10 Различают септическую, эпилептическчю, оглумоподобную и
    смешанную форму болезни. У новорожденных поросят до 10- дневного возраста
    заболевание чаще всего проявляется признаками менингоэнцефалита. Больные
    поросята не могут перемещаться, сосать, издавать звуки; появляются судороги,
    слюнотечение и спазм глотки. Животное погибает через 4 – 12 ч, а иногда через
    сутки. Смерть может наступить внезапно во время клинических судорог. У поросят в
    возрасте от 10 дней до 4 мес более часто отмечается смешанная форма болезни с
    признаками менингоэнцефалита и септицемии. Вначале у заболевших животных
    повышается температура тела до 41 0С и выше, появляются угнетение, слабость,
    сонливость, рвота и жажда. Затем развиваются клинические признаки поражения ЦНС
    с преобладанием либо признаков возбуждения (эпилептическая форма), либо
    торможения (оглумоподобная форма). При эпилептической форме поросята в состоянии
    возбуждения неудержимо стремятся вперед, совершают манежные и другие движения. У
    больных животных появляются судороги шейных и жевательных мышц, скрежет зубами,
    прогибание позвоночника. Эпилептические припадки по мере развития болезни
    происходят все чаще и доводят животное до полного изнеможения. Первичная
    репродукция в носоглотке и гортани приводит к развитию ларингофарингита,
    проявляющегося истечениями из носа, ненормальным визгом или полной афонией.
    Нередко развиваются полная слепота и прогрессирующий паралич мышц тела,
    Оглумоподобная форма проявляется угнетением, длительным неестественным стоянием
    животного на месте с опущенной головой или оно упирается пятачком в стену, пол.
    Конечности у больных чаще подтянуты под живот, походка шаткая; иногда наступает
    искривление положения головы и изменение положения ушных раковин. Возможно
    поражение конечностей, животные лежат в неестественных позах. Независимо от
    характера менингоэнцефалита наблюдают сердцебиение, брюшной тип дыхания, а в
    конечной стадии болезни – признаки отека и воспаления легких. Продолжительность
    болезни – от нескольких часов до 2 – 3 дней. У отдель- 11 ных поросят-сосунов и
    отьемышей иногда болезнь может проявиться лишь сильно выраженной гипертермией,
    анорексией, рвотой, кровавым поносом и быстрой гибелью животною (кишечная
    форма). Как и у взрослых свиней, у поросят нередко встречается легочная форма,
    протекающая без поражения ЦНС. Быстро развивающиеся признаки септицемии,
    воспаления верхних дыхательных путей, отека и воспаления легких заканчиваются
    через 1 – 2 дня гибелью животном. Иногда у поросят развивается стертая форма
    болезни, характеризующаяся общей слабостью, сонливостью, анорексией, кашлем и
    более продолжительным течением – до 7 дней. Заболеваемость поросят мотет
    достигать 70 – 100%, летальность у 2-недельних поросят – 80 – 100%, у более
    старших животных – 40 – 80%. В отличие от других видов животных у свиней всех
    возрастов зуд не возникает. У животных всех остальных видов вследствие сильно
    выраженного нейротропизма вируса основным клиническим признаком является
    поражение ЦНС, проявляющееся сильными возбуждением, судорогами, параличами.
  postmortem_findings: |
    У свиней, как правило, находят крупозно-дифтеретический и язвенно-некротический
    тонзиллит, а также отек легких. Нередко встречают очаги катаральной
    бронхопневмонии, в области глотки и гортани-язвенно-некротические процессы. В
    различных паренхиматозных органах и лимфатической ткани, включая миндалины,
    обнаруживают единичные или множественные сероватожелтые милиарные очаги некроза.
    У свиней отсутствуют расчесы. У абортированных плодов и поросят
    до2-недельноговозраста находим серозно-катаральный коньюктивит, отек век,
    гиперемию слизистой оболочки носовой полости, катаральный ларингофарингит, у
    отдельных поросят некротизирующий тонзилит, точечные кровоизлияния в слизистой
    оболочке верхних дыхательных путей, под плеврой, эпикардом, в селезенке,
    корковом слое почек, катаральный гастроэнтерит. В печени, почках и селезенке
    иногда отмечаем застойные явления и зернистую дистрофию. Сердце растянуто,
    миокард дряблый, серовато-красного цвета. Легкие отечны, в состояние застойной
    гиперемии, изредка находим катаральную бронхопневмонию. У поросят павших в более
    старшем возрасте (до отъема) патологоанатомические изменения такие же, как и у
    новорожденных, только у них отсутствуют милиардные некрозы в слизистой оболочке
    и паренхиматозных органах. У подсвинков и взрослых свиней на фоне
    общесептических явлений ярко выражены крупозно-дифтиритические и
    язвенно-некротические поражения слизистой оболочки глотки с миндалинами,
    гортани, трахеи. Легкие отечны. В желудочно-кишечном тракте-острый катаральный
    гастроэнтерит, реже геморрагический или фибринозный энтерит.
  diagnosis: |
    1) **Микроскопия.** Миндалины являются органом выбора. Можно брать мазки
    головного мозга и мазки из глотки. Для новорожденных поросят это — тест выбора,
    но для свиней на откорме он не настольно показателен, как выделение вируса; 2)
    **Серодиагностика.** Серология — тест выбора при диагностике острой вирусной
    инфекции болезни Ауески, поскольку должно пройти время, в течение которого
    формируются гуморальные антитела; 3) **Реакция нейтрализации сывороточного
    вируса** — стандартный и надежный, но достаточно продолжительный по времени тест
    (48 часов). Его применяют для титрования вирусных антител в сыворотке крови; 4)
    **Иммуноферментный анализ (ИФА, ELISA).** Важнейшим технологическим прорывом в
    программах контроля и ликвидации болезни Ауески стала разработка маркированных
    вакцин против заболевания и сопутствующего им дифференциального ИФА.
    Чувствительность иммуноферментного анализа (ИФА) обычно выше, чем у реакции
    нейтрализации вируса, если процесс нейтрализации занимает 1 час и без
    комплемента. Некоторые слабоположительные сыворотки легче обнаружить в реакции
    нейтрализации вируса с использованием 24-х часового периода нейтрализации, тогда
    как другие легче обнаружить посредством ИФА. В имеющихся в продаже ИФА-наборах
    для определения уровней антител используются непрямой или конкурентный методы.
    Они отличаются по способу подготовки антигена, конъюгата или субстрата, периоду
    инкубации и интерпретации результатов. Общим преимуществом их использования
    является возможность быстро обработать большое количество образцов. Процесс
    можно также автоматизировать и производить анализ результатов с помощью
    компьютера. С помощью некоторых из таких наборов при использовании
    «соответствующей» вакцины можно дифференцировать вакцинированных и естественно
    инфицированных животных. Альтернативно, возможно утверждение некоммерческих
    протоколов ИФА, при условии, что в отношении них установлено, что они
    обнаруживают международную стандартную эталонную сыворотку МЭБ, в виде
    положительного результата при разведении в ½ (минимальная чувствительность для
    целей международной торговли). Рекомендуется использовать набор или внутренний
    тест, т.е. разработанный на месте, валидация которого по отношению к данному
    стандарту была произведена независимой лабораторией с использованием внешних
    тестов контроля качества; 5) **Полимеразная цепная реакция (ПЦР)** Для
    идентификации геномов SHV-1 в секретах или образцах органов можно использовать
    полимеразную цепную реакцию (ПЦР). Многие отдельные лаборатории разработали
    эффективные протоколы, но международно-признанного стандартизированного подхода
    еще не существует. В основе ПЦР лежит избирательная амплификация специфической
    части генома с использованием двух праймеров, расположенных на каждом конце
    избранной последовательности. На первом этапе выделение полной ДНК можно
    произвести с помощью стандартных процедур (например, расщепление с помощью
    протеиназы К, экстрагирование с помощью фенол-хлороформа) или с помощью
    коммерческих наборов для экстрагирования ДНК. Используя циклы денатурации ДНК
    для получения матриц в виде одноцепочечной ДНК, гибридизацию праймеров и синтез
    комплементарных последовательностей с применением термостабильной
    ДНК-полимеразы, целевую последовательность можно амплифицировать до 106 раз.
    Праймеры должны быть созданы таким образом, чтобы амплифицировать
    последовательность, которая является консервативной среди штаммов SHV-1,
    например, были использованы части gB- и gDгенов, которые кодируют главные
    гликопротеины. Разработана ПЦР в реальном времени, которая способна
    дифференцировать gE-делетированные вакцинные вирусы от вирусов дикого типа
    посредством специфического обнаружения gВ и gE генов. Однако gEспецифичная ПЦР в
    реальном времени имеет более низкую чувствительность, чем gBспецифичная ПЦР в
    реальном времени. Идентификацию амплифицированного продукта можно произвести по
    его молекулярному весу, который устанавливается при миграции в агарозном геле, с
    дальнейшим подтверждением, там, где возможно, посредством гибридизации с
    использованием саузерн-блоттинга с применением комплементарного зонда. В
    современных методах используется жидкостной гибридизация с меченными ферментом
    зондами, при которой после инкубации с соответствующим субстратом происходит
    цветная реакция. Более новые методы включают использование флуоресцентных
    зондов, связанных с действием экзонуклеазы и мониторинг в реальном времени за
    эволюцией продукта, что позволяет проводить одновременно амплификацию и
    подтверждение матричной ДНК, тем самым повышая скорость и специфичность анализов
    ПЦР. Во всех случаях главным преимуществом ПЦР по сравнению с традиционными
    методами выделения вируса является его быстрота: при использовании современного
    оборудования можно произвести весь процесс идентификации и подтверждения в
    течение одного дня. Однако, учитывая природу теста, следует соблюдать многие
    меры предосторожности, чтобы избежать контаминации образцов чужеродными ДНК из
    предыдущих тестов или вследствие общей контаминации окружающей среды в
    лаборатории. Это может ограничивать ценность теста для многих лабораторий, если
    не соблюдается осторожность в целях недопущения контаминации переносом ДНК.
    Использование внутреннего контроля необходимо для избежания ложноотрицательных
    результатов, посредством обеспечения надлежащей эффективности экстрагирования
    ДНК и подтверждения отсутствия ингибиторов ПЦР в каждой пробе. На практике, для
    выявления эндогенного или экзогенного гена можно применять различные системы
    (Hoffman et al.,2009).
  differential_diagnosis: |
    Дифференцируют от чумы, сальмонеллеза, колибактериоза (отечной болезни),
    листериоза, гриппа, тешеновской болезни, пастереллеза, отравления поваренной
    солью, авитаминозов, менингитов и энцефалитов различной природы.
  prevention: |
    Самым эффективным методом профилактики является вакцинация. Контроль болезни
    Ауески можно осуществлять посредством использования вакцин, содержащих либо
    модифицированные живые, либо инактивированные вирусные антигены. Кроме того, в
    последнее время к этим традиционным вакцинам добавились полученные из
    рекомбинантной ДНК ген-делетированные вакцины или естественно делетированные
    живые вакцины против SHV-1. Эти вакцины, иногда называемые маркерные вакцины,
    получены из вируса, у которого отсутствует специфический гликопротеин (чаще
    всего gE, хотя также описаны и вакцины с делетированным gG или gC1 ). Как
    минимум, одна имеющаяся в продаже вакцина, имеет двойные делеции. Преимущество
    данных маркерных ген-делетированных вакцин по сравнению с традиционными
    вакцинами из цельного вируса состоит в том, что они дают возможность
    дифференцировать неинфицированных вакцинированных животных и животных с полевой
    инфекцией. Это производится посредством тестирования на наличие антител,
    направленных против белка, кодируемого делетированным геном, который у
    неинфицированных вакцинированных маркерной вакциной свиней будет отсутствовать,
    и 1 Номенклатура для генов изменилась несколько лет назад, но в литературе все
    еще сохраняется прежнее обозначение. Прежняя и новая номенклатура такова: gII =
    gB; gIII = gC; gp50 = gD; gI = gE; gX = gG; gp63 = gl. 14 присутствовать у
    свиней, инфицированных в полевых условиях. Поэтому, в странах, где есть
    инфицированные свиньи и планируется искоренение болезни Ауески, предпочтительно
    использовать такие маркерные вакцины. Описаны стандарты, применяемые к
    производству живых и инактивированных противовирусных вакцин. Для маркерных
    вакцин тесты должны включать демонстрацию отсутствия у вакцинированных свиней
    серологической реакции на белок, кодируемый делетированным геном, и
    дополнительно выявляемую реакцию на тот же белок у вакцинированных свиней,
    инфицированных полевым вирусом. Другие вакцины являются инактивированными и
    представляют собой адъювантированную вирусную субъединицу очищенных и
    концентрированных иммуногенных гликопротеинов (за исключением gE), что позволяет
    провести дифференциацию между вакцинированными и инфицированными свиньями.
  treatment: |
    Лечение больных малоэффективно и экономически не целесообразно.
  vaccination_recommendations: |
    **1. Вакцинация поросят:** 1) в благополучных хозяйствах вакцинируют
    внутримышечно одной дозой в возрасте 12-13 недель; 2) угрожаемых и
    неблагополучных хозяйствах вакцинируют в возрасте 21 дня ннтраназально (по 1,0
    мл в каждую ноздрю), затем двукратно одной дозой внутримышечно в возрасте 10-11
    и 13-14 недель. Оптимальный срок введения вакцины определяется в соответствии с
    инструкцией производителя и эпизоотической ситуацией в хозяйстве.
    **2. Вакцинация свиноматок и ремонтных свинок.** Для профилактики ЦВИС у
    свиноматок и ремонтного молодняка применяют **ковровую** или **индивидуальную**
    вакцинацию: ** 1) Ковровый метод:** введение вакцины всему поголовью **1 раз в 4
    месяца**; ** 2) Индивидуальный метод:** Племенных неиммунных свиноматок и хряков
    прививают внутримышечно дважды с интервалом 3-4 недели, затем ревакцинируют
    каждые 4 месяца или супоросных свиноматок вакцинируют за 4 — 6 недель до опороса
    внутримышечно. Оптимальный срок введения вакцины определяется в соответствии с
    инструкцией производителя и эпизоотической ситуацией в хозяйстве.
    **3. Корректировка схемы вакцинации.** Оптимизация сроков и методов вакцинации
    осуществляется на основании результатов **серологического мониторинга**,
    позволяющего оценить напряженность поствакцинального иммунитета и динамику
    циркуляции вируса в стаде. Подробные критерии интерпретации данных
    серомониторинга изложены в соответствующих диагностических рекомендациях.
  pathogenesis: |
    Хотя вирус и обладает тропностью к нервной ткани, патогенез заболевания имеет
    свои особенности в зависимости от способа заражения, вида и возраста животного.
    При проникновении возбудителя через слизистую оболочку ротовой полости и верхних
    дыхательных путей у свиней в воротах инфекции (миндалины) происходит быстрая
    репродукция вируса, а у остальных видов животных – лишь незначительное
    увеличение его концентрации. После короткого периода он проникает в мозг прямым
    нейролимфогенным путем по обонятельному, тройничному и языкоглоточному нервам.
    Репродукция вируса вызывает острое воспаление мозга и его оболочек. В таких
    случаях у животных, особенно у плотоядных и нередко у молодняка свиней,
    развивается клиническая картина энцефалита. При проникновении через кожу вирус
    довольно быстро репродуцируется в месте внедрения и затем гематогенным и
    лимфоген- 9 ным путями распространяется по всему организму, но тяжелых поражений
    мозга при этом не наступает. Особо сильную пантропность вирус проявляет в
    организме свиней, в результате возбудитель накапливается во всех внутренних
    органах и вызывает наряду с нервными явлениями симптомы тяжелой септицемии.
    Последняя обусловливает лихорадку и геморрагический диатез – отеки и
    кровоизлияния в различных органах. В процессе болезни также нарушается
    минеральный белковый и углеводный обмены, изменяется содержание ацетилхолина и
    гистамина в ЦНС и коже, что вызывает зуд (гиперестезия). При вовлечении в
    патологический процесс дыхательной и пищеварительной систем могут развиваться
    признаки отека легких, пневмония и диарея. Вирус хорошо репродуцируется в
    плаценте, диаплацентарно проникает в плоды и вызывает их смерть и аборт.
  causes_and_risks: |
    Во внешней среде устойчивость вируса сравнительно высокая: при 15 С – 63 дня,
    при 4 С – до 140 дней, нагревание до 50 – 60 С обезвреживает его в течение 30 –
    45 мин, прямые солнечные лучи – за б ч, рассеянный солнечный свет – за 12 – 48
    ч, ультрафиолетовые лучи – за 1 мин. Холод консервирует вирус, при 1 – 4 С он
    активен от 130 дней до 4 лет. В 40 %-ном растворе глицерина и в
    глицерино-фосфатном буфере с нейтральным рН вирус сохраняется 2 – 3 года, а в
    насыщенном растворе поваренной соли – не менее 3 мес. В сене, зерновых кормах,
    навозе, воде и опилках вирус не погибает в осенне-зимний период 21 – 60 дней,
    весной – 35 дней и летом – до 20 дней. На поверхности почвы он инактивируется
    через 2 – 5 дней, в стогах сена – через 18 – 26 дней. В гниющих трупах сохраняет
    активность 10 – 28 дней, в высохших трупах грызунов – от 8 до 175 дней. При
    биотермическом обезвреживании навоза инактивируется через 8 – 15 дней. Горячий 3
    %-ный раствор гидроокиси натрия, 2 %-ный раствор формальдегида, 20 %-ная взвесь
    свежегашеной извести убивают вирус за 5 – 20 мин, растворы креолина и карболовой
    кислоты слабоэффективны. Основные пути передачи включают прямой контакт между
    животными, аэрогенный механизм, а также вертикальную передачу от инфицированных
    свиноматок потомству. Кроме того, вирус может переноситься с инфицированными
    кормами, водой, оборудованием, транспортными средствами и обслуживающим
    персоналом. Большое эпизоотологическое значение в распространении и сохранении
    возбудителя имеют крысы и мыши, среди которых болезнь может приобретать характер
    эпизоотий. Они являются основным резервуаром вируса болезни Ауески в природе.
    Оставаясь вирусоносителями в течение ряда месяцев, грызуны способствуют
    поддержанию эпизоотического процесса, который в их популяции может не
    прерываться годами и тем самим обусловливать стационарность эпизоотическою очага
    в свиноводческих хозяйствах.
