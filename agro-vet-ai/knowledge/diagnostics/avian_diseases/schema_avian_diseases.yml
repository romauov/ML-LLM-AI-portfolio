описание свойств YAML-документа:
  etiology: Этиология болезни. Список строк, описывающих причины болезни.

  pathogenesis: Патогенез болезни. Список строк, описывающих механизм развития болезни.

  epidemiology: Эпидемиология болезни. Список строк, описывающих распространение болезни и способы её передачи.

  clinical findings: Клинические признаки заболевания. Список строк, описывающих проявления болезни.

  differential diagnosis: Дифференциальная диагностика. Список строк, описывающих возможные заболевания, схожие с данным заболеванием.

  diagnosis:
    laboratory_tests_list: Список лабораторных исследований, которые могут применяться для диагностики данного заболевания.
    laboratory findings: Лабораторные данные, подтверждающие диагноз.
    instrumental findings: Инструментальные данные, подтверждающие диагноз.
    postmortem findings: Данные, обнаруженные при вскрытии.

  treatment: Лечение заболевания. Список строк, описывающих методы лечения.

  prognosis: Прогноз заболевания. Список строк, описывающих возможный исход болезни.

  prevention: Профилактика заболевания. Список строк, описывающих меры профилактики.

  diagnostic recommendations: Рекомендации по диагностике заболевания с указанием наиболее приоритетных методов диагностики.

  treatment recommendations: Рекомендации по лечению заболевания с указанием наиболее приоритетных методов лечения.

  notes on clinical findings: Дополнительная информация о клинических проявленяих заболевания.
