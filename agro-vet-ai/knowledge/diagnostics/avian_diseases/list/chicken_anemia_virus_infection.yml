chicken_anemia_virus_infection:
  disease_name: Вирусная инфекция анемии цыплят, Chicken Anemia Virus Infection (CAV), Infectious Anemia of Chickens
  etiology:
    - Инфекционная анемия цыплят вызывается вирусом CAV (вирус анемии цыплят), принадлежащим к роду Gyrovirus семейства Circoviridae.
    - Вирус обладает высокой резистентностью.
    - Вирус CAV является ДНК-содержащим вирусом семейства Circoviridae.
    - Заболевание известно под названиями: инфекционная анемия кур, болезнь «синее крыло», синдром дерматоподобной анемии.

  pathogenesis:
    - Вирус CAV поражает костный мозг, тимус и бурсу Фабрициуса, приводя к угнетению иммунной системы.
    - Вызывает разрушение предшественников эритроцитов, что приводит к анемии.
    - Иммуносупрессия способствует вторичным бактериальным и вирусным инфекциям.
    - Репликация вируса в костном мозге вызывает гибель предшественников эритроцитов, тромбоцитов и лейкоцитов, что ведет к панцитопении.
    - Атрофия тимуса и бурсы Фабрициуса сопровождается выраженным иммунодефицитом.

  epidemiology:
    - К заболеванию наиболее восприимчивы цыплята в возрасте 8-21 дня.
    - Заболеваемость среди восприимчивых цыплят может достигать 60%, а летальность — 10%.
    - Горизонтальный путь: алиментарное, аэрогенное, контактное заражение.
    - Вертикальный путь: трансовариальная передача через инкубационное яйцо, инфицированная сперма самцов.
    - Выделение вируса в окружающую среду с пометом, выдыхаемым воздухом.
    - Бройлеры подвержены заболеванию в большей степени, чем яичные кроссы, из-за высокой интенсивности роста.
    - Вертикальная передача возможна через инкубационное яйцо и сперму инфицированных самцов.
    - Заболевание не представляет опасности для человека.

  clinical_findings:
    - Бледность кожных покровов и слизистых оболочек.
    - Вялость, анорексия, отставание в росте.
    - Кровоизлияния в коже и мышцах.
    - Сухость и растрескивание кожи, дерматиты, взъерошенное оперение.
    - Учащенное дыхание, сонливость, отказ от корма.

  differential_diagnosis:
    - Болезнь Марека.
    - Лейкозы.
    - Болезнь Гамборо.
    - Болезнь Ньюкасла.

  diagnosis:
    laboratory_tests_list:
      - Анализ сыворотки крови на антитела к CAV (РИФ, РНВ, ИФА).
      - Вирусологические исследования эмбрионов, печени, содержимого прямой кишки.
      - Гистологическое и цитологическое исследование тканей.

    laboratory_findings:
      - Обнаружение специфических антител к вирусу CAV.
      - Панцитопения, снижение уровня гематокрита до 6-27% (норма 29-35%).

  postmortem_findings:
    - Общая анемия.
    - Кровоизлияния в мышцах, внутренних органах, слизистой оболочке железистого желудка.
    - Серозный оттек в подкожной клетчатке, голове, груди, концах крыльев.
    - Очаги некроза в селезенке, печени.
    - Атрофия бурсы Фабрициуса, тимуса, лимфоидной ткани селезенки.
    - Разжижение крови, повышенная хрупкость сосудов, геморрагический дерматит.

  treatment:
    - Специфического лечения не разработано.
    - Поддерживающая терапия, направленная на снижение последствий анемии и вторичных инфекций.

  prognosis:
    - При высокой заболеваемости смертность может достигать 10%.
    - Выздоровление возможно при минимальных вторичных инфекциях и надлежащем уходе.

  prevention:
    - Высокая степень биобезопасности.
    - Выявление инфицированных племенных птиц лабораторными методами.
    - Ликвидация вируса в родительских стадах.
    - Вакцинация живой вакциной Нобилис® CAV P4, обеспечивающей иммунитет через 14 дней после однократного введения.
    - Вакцина совместима с Нобилис® Reo 1133, что упрощает применение.
    - Предотвращение заражения при вакцинации против болезни Марека.

  diagnostic_recommendations: |
    Диагностика включает анализ клинических и патологических признаков.
    Лабораторные исследования (РИФ, РНВ, ИФА) позволяют выявить специфические антитела к CAV.
    Вирусологические и гистологические исследования подтверждают наличие вируса.

  treatment_recommendations: |
    Специфической терапии не разработано. Рекомендуется поддерживающее лечение, контроль вторичных 
    инфекций. Вакцинация племенных птиц помогает предотвратить заражение.

  notes_on_clinical_findings: |
    Инфекционная анемия цыплят характеризуется вялостью, бледностью кожи и слизистых, кровоизлияниями 
    в мышцы. Основные поражения выявляются при вскрытии - анемия, некрозы в селезенке, атрофия 
    тимуса и бурсы Фабрициуса. Вирус поражает лимфоидную ткань ЖКТ, тимус, бурсу Фабрициуса, 
    селезенку, вызывая иммунодефицит.