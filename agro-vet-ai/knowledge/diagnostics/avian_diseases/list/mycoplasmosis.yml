mycoplasmosis:
  disease_name: Микоплазмоз птиц, Mycoplasmosis, Chronic Respiratory Disease (CRD)
  etiology:
    - Mycoplasma synoviae (MS)
    - Mycoplasma gallisepticum (MG)

  pathogenesis:
    - Mycoplasma synoviae: поражает верхние дыхательные пути и воздушные мешки, может привести к острым или хроническим заболеваниям суставов и сухожилий (синовит, тендовагинит, бурсит).
    - Mycoplasma gallisepticum: вызывает хроническую респираторную болезнь, устойчива к низким температурам, сульфаниламидам, проходит через бактериальные фильтры.

  epidemiology:
    - Mycoplasma synoviae: инфекция передается через конъюнктиву или верхний дыхательный канал, инкубационный период 11-21 день. Возможна трансварная и боковая передача.
    - Mycoplasma gallisepticum: заражение происходит через яйца (вертикальная передача), а также контактным, воздушным и воздушно-капельным путем. Инкубационный период от 4 дней до 3 недель.

  clinical_findings:
    - Mycoplasma_synoviae:
        - Воспаление суставов и сухожильных оболочек с экссудатом от серого до желтого цвета.
        - Амилоидоз, зеленоватая печень, воспаление суставных бурс, возможны аэросакулиты.
        - У кур отмечается бледность гребешков, хромота, задержка роста.
        - Возможны опухания суставов, вязкий экссудат кремового или серого цвета.
    - Mycoplasma_gallisepticum:
        - Острое_течение:
            - Потеря аппетита, расстройство дыхания, хрипы, истечения из носа.
            - Острый ринит, конъюнктивит, кашель и чихание.
            - Односторонний или двусторонний синусит, особенно у индеек и дичи.
            - Воспаленные подглазные пазухи могут закрывать глаза.
        - Хроническое_течение:
            - Истощение, снижение яйценоскости, птица вытягивает шею.
            - Синусит, катарально-фибринозный некротизирующий ринит, трахеит, бронхит, катарально-крупозная пневмония.

  differential_diagnosis:
    - колибактериоз
    - пастереллез
    - гемофилез
    - инфекционный бронхит
    - ИЛТ
    - аспергиллез
    - авитаминоз А

  diagnosis:
    laboratory_tests_list:
      - Бактериологическое_исследование:
          - Посев на агар Эдварда, бульон Эдварда, среду Мартена, Хоттингера.
          - Выделение колоний с характерной морфологией ("жареное яйцо").
      - Полимеразная_цепная_реакция_(ПЦР):
          - Обнаружение ДНК Mycoplasma gallisepticum и Mycoplasma synoviae.
          - Использование праймеров для генов mgc2, vlhA, pvpA, MGA_0309.
          - Анализ амплифицированного продукта в агарозном геле.
      - Серологические_тесты:
          - Реакция агглютинации на пластинке (РАП).
          - Реакция торможения гемагглютинации (РТГА).
          - Иммуноферментный анализ (ИФА).
          - Реакция сывороточно-капельной агглютинации.
      - Иммунологические_методы:
          - Иммунофлуоресцентный метод (НИФ).
          - Иммунопероксидазный метод (ИП).
          - Реакция подавления роста микоплазм.
      - Биопробы:
          - Инокуляция эмбрионов кур в желточный мешок.
          - Субкультивирование на среды после вскрытия эмбрионов.
      - Инструментальные_методы:
          - Электрофорез ПЦР-продуктов в агарозном геле.
          - Микроскопия колоний в стереоскопическом микроскопе.

    laboratory_findings:
      - Бактериологическое_исследование:
          - Посев на агар и бульон Эдварда, среду Мартена, Хоттингера.
          - Колонии имеют форму "жареного яйца", однако могут быть нетипичными – более пигментированными и не подлежащими пассированию.
          - В бульонной среде отмечается изменение кислотности (смена цвета индикатора с красного на оранжевый или желтый).
          - Аргинин-гидролизирующие виды микоплазм могут маскировать изменение pH, поэтому субкультивирование на твердую среду проводят через 7-10 дней.

      - Метод_ПЦР:
          - Выявление ДНК Mycoplasma gallisepticum и Mycoplasma synoviae.
          - Используются специфические праймеры для генов mgc2, vlhA, pvpA и MGA.
          - Продукт ПЦР MG имеет размер 185 п.о., визуализируется в агарозном геле.

      - Серологический_мониторинг:
          - Реакция агглютинации на пластинке (РАП): положительные сыворотки дают агглютинацию через 2 минуты.
          - Реакция торможения гемагглютинации (РТГА): специфические антитела ингибируют гемагглютинацию, титр определяется по наибольшему разведению сыворотки с полным ингибированием.
          - Иммунофлуоресцентный метод (НИФ): выявление микоплазм в культурах с использованием флуоресцеин-конъюгированных антител.
          - Иммунопероксидазный метод (ИП): выявление колоний с использованием антикроличьего иммуноглобулина, конъюгированного с пероксидазой, дающего окрашенные колонии.

      - Биопробы:
          - Инокуляция материала в желточный мешок куриных эмбрионов.
          - Вскрытие эмбрионов через 5 дней, субкультивирование желтка на агар.

  postmortem_findings:
    - Атрофия мышц, бледность кожи и слизистых оболочек.
    - Катарально-фибринозный некротизирующий ринит, синусит, трахеит, бронхит.
    - Катарально-крупозная пневмония.
    - Серозно-фибринозный аэросаккулит с фибринозными конгломератами в воздушных мешках.
    - Воспаленные подглазные пазухи, содержащие слизеподобные или творожистые экссудаты.

  treatment:
    - применение антибиотиков широкого спектра действия

  prevention:
    - вакцинация (Нобилис® Mg 6/85)
    - ликвидация в племенных стадах через наблюдение и выбраковку
    - предупреждение заноса инфекции в хозяйство
    - повышение естественной резистентности птицы

  diagnostic_recommendations: |
    Для диагностики микоплазмоза птиц, вызванного Mycoplasma gallisepticum (MG) и Mycoplasma 
    synoviae (MS), используются различные методы, включая культуральные, серологические, 
    иммунологические и молекулярные. Культуральные методы, такие как посев на агар и бульон, 
    позволяют выделить и идентифицировать микоплазмы, однако они требуют времени и специальных 
    условий для роста микроорганизмов. Серологические тесты, такие как реакция сывороточной 
    агглютинации (РСА), твердофазный иммуноферментный анализ (ИФА) и реакция торможения 
    гемагглютинации (РТГА), широко применяются для скрининга стад, но их специфичность и 
    чувствительность могут варьироваться. Иммунологические методы, такие как иммунофлуоресценция 
    и иммунопероксидазный метод, используются для идентификации изолятов микоплазм, но требуют 
    очищенных культур. Методы на основе ПЦР, такие как мультиплексная ПЦР, являются наиболее 
    современными и точными, позволяя выявлять ДНК микоплазм непосредственно в тканях или смывах. 
    Эти методы особенно полезны в специализированных лабораториях, где они могут быть валидированы. 
    Предпочтительными методами являются ПЦР и серологические тесты, так как они обеспечивают 
    быстроту и точность диагностики.

  treatment_recommendations: |
    Лечение микоплазмоза птиц включает применение антибиотиков широкого спектра действия, таких 
    как тетрациклины, макролиды и фторхинолоны. Эти препараты эффективны в борьбе с инфекцией, 
    но их применение должно быть строго контролируемым, чтобы избежать развития устойчивости у 
    микоплазм. Вакцинация также является важным методом контроля, особенно в стадах, где 
    заражение неизбежно. Используются как живые, так и инактивированные вакцины. Живые вакцины, 
    такие как штаммы F, ts-11 и 6/85, применяются для профилактики снижения яйценоскости и 
    респираторных заболеваний. Инактивированные вакцины, содержащие концентрированные суспензии 
    микоплазм в масляной эмульсии, вводятся подкожно или внутримышечно и обеспечивают защиту от 
    снижения яйценоскости. Предпочтительным методом является вакцинация, так как она позволяет 
    предотвратить распространение инфекции и снизить экономические потери.

  notes_on_clinical_findings: |
    Клинические признаки микоплазмоза птиц варьируются в зависимости от вида микоплазмы и 
    состояния птицы. У кур, инфицированных Mycoplasma gallisepticum, наблюдаются острый ринит, 
    конъюнктивит, чихание и синусит, особенно у индеек и дичи. Воспаленные подглазные пазухи 
    могут быть настолько увеличены, что закрывают глаза. У индеек часто отмечаются загрязнения 
    перьев крыльев из-за попыток удалить выделения из глаз. Mycoplasma synoviae может вызывать 
    респираторные заболевания, синовит или скрытые инфекции. У кур с инфекционным синовитом 
    наблюдаются бледные гребешки, хромота и задержка роста, а также опухание суставов с вязким 
    экссудатом кремового или серого цвета. В хронических случаях инфекция может привести к 
    снижению яйценоскости и респираторным осложнениям, особенно при наличии вторичных инфекций.
