reoviral_infection:
  disease_name: Реовирусная инфекция птиц, Reoviral Infection, Avian Reovirus Infection
  etiology:
    - Реовирусы птиц относятся к роду ортореовирусов.
    - Существуют патогенные и непатогенные штаммы реовирусов.
    - Основные патогенные штаммы: S1133, 1733, 2408, ERS.
    - Реовирусы – РНК-содержащие вирусы семейства Reoviridae, вызывающие реовирусный теносиновит (вирусный артрит, «слабость» ног).

  pathogenesis:
    - Вирус проникает в организм через фекально-оральный путь или вертикально через яйца.
    - Размножается в эпителиальных клетках кишечника, вызывает воспаление и повреждение тканей.
    - Может распространяться с кровотоком, вызывая поражение суставов и внутренних органов.
    - Основной путь заражения – алиментарный (через пищеварительный тракт) и респираторный.
    - Вирус локализуется в поджелудочной железе, печени, селезенке, сердце, яичниках, почках, фабрициевой сумке.
    - В суставах поражает сухожилия, отвечающие за сгибание и разгибание пальцев лап, вызывая воспаление, скопление экссудата и возможные разрывы.

  epidemiology:
    - Вирус передается фекально-оральным путем.
    - Возможна вертикальная передача через инфицированные яйца.
    - Источником инфекции является больная и переболевшая птица.
    - Вирус распространяется через зараженные корма, воду, подстилку, инвентарь, персонал.
    - Чаще всего встречается среди мясных пород кур.
    - Поражаемые виды: куры, индейки, фазаны.

  clinical_findings:
    - Диарея
    - Хромота и отек суставов
    - Потеря массы тела
    - Вялость, снижение активности
    - Затрудненное дыхание
    - «Ходульная» походка, скрючивание пальцев
    - Снижение продуктивности (яйценоскости), живой массы тела, половой активности

  differential_diagnosis:
    - Инфекционный ларинготрахеит
    - Микоплазмоз
    - Инфекционный бронхит
    - Болезнь Марека
    - Инфекционный энцефаломиелит

  diagnosis:
    laboratory_tests_list:
      - ИФА (иммуноферментный анализ)
      - РПГ (реакция преципитации в геле)
      - ПЦР пораженных тканей
      - Гистопатологическое исследование тканей

    laboratory_findings:
      - Выделение вируса из пораженных тканей
      - Положительные результаты ПЦР
      - Обнаружение антител к реовирусу в крови

  postmortem_findings:
    - Острый катарально-язвенный энтерит
    - Теносиновиты и артриты
    - Острый катаральный ринит и трахеит
    - Гидроперикардит
    - Анемия
    - Гепатит
    - Дряблость сердечной мышцы
    - Желточные перитониты и атрофия яичников

  treatment:
    - Специфическое лечение отсутствует.
    - Симптоматическая терапия для поддержания состояния птицы.

  prognosis:
    - Завиcит от штамма вируса и состояния иммунной системы птицы.
    - Возможны экономические потери из-за снижения продуктивности и роста.

  prevention:
    - Биобезопасность и санитарные меры.
    - Очистка и дезинфекция между циклами выращивания.
    - Вакцинация племенных бройлеров.
    - Использование вакцин: Нобилис® Reo 1133 и Нобилис® Reo inac.
    - Вакцинация эффективна только против вирусных штаммов, соответствующих вакцинным.

  diagnostic_recommendations: |
    Диагноз требует комплексного подхода.
    Серологические тесты (ИФА, РПГ) помогают выявить контакт с вирусом, но не являются окончательными.
    Подтверждение проводится путем гистопатологического исследования пораженных тканей, ПЦР и 
    выделения вируса. Важны клинико-эпизоотологические и патологоанатомические данные.

  treatment_recommendations: |
    Специфического лечения не существует.
    Необходимо поддерживающее лечение, включая контроль вторичных инфекций и обеспечение комфортных 
    условий содержания птицы.

  notes_on_clinical_findings: |
    Клинические признаки заболевания включают поражения кишечника, суставов и дыхательной системы.
    У инфицированных птиц могут наблюдаться диарея, хромота, потеря веса, вялость и затрудненное 
    дыхание. При поражении суставов возможно скопление экссудата, разрыв сухожилий и «ходульная» 
    походка.
