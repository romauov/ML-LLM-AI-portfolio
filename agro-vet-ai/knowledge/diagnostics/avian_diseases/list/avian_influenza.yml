avian_influenza:
  disease_name: Птичий грипп, Avian Influenza (AI), Highly Pathogenic Avian Influenza (HPAI)
  etiology:
    - Птичий грипп вызывается вирусом семейства Orthomyxoviridae, рода Influenza A.
    - Вирус подразделяется на три серологических типа: A, B и C; болезни у птиц вызывает только тип A.
    - Величина вирусных частиц составляет 80-120 нм.
    - Вирусы H5 и H7 наиболее патогенны для птиц, вызывая высокопатогенный грипп.
    - Вирус индуцирует выработку специфических антител в организме птицы.
    - Вирус сохраняет вирулентность при глубоком замораживании (-70°C) в течение более 300 дней.
    - В 1%-ном водном растворе хлорида натрия инфекционные свойства вируса сохраняются 5-7 недель.
    - Обычные дезинфектанты (соляная кислота, фенол, хлорная известь, гидроксид натрия, Виркон С) эффективно инактивируют вирус.
    - Подтипы H5 и H7 низкопатогенного гриппа могут мутировать в высокопатогенные формы.

  epidemiology:
    - Вирус выделяется из ноздрей, клюва, конъюнктив и клоаки.
    - Основные пути передачи: аэрозоли, инфицированный помет, перенос вируса на одежде и оборудовании.
    - Источник инфекции – дикие перелетные водоплавающие птицы.
    - Вирус H5N1 впервые выявлен у людей в 1997 году в Гонконге, смертность достигала 60%.
    - Вирус распространялся из Азии в Европу и Африку.
    - Вспышки птичьего гриппа H7N7 зарегистрированы в Нидерландах в 2003 году, с 89 случаями заражения среди людей и одним летальным исходом.
    - В 2013 году в Китае зафиксирована вспышка H7N9: 130 заболевших, 32 летальных исхода.
    - В 2022 году в России зарегистрировано 21 вспышка болезни среди домашних и диких птиц.
    - Заболеваемость сопровождается высокой смертностью, особенно среди восприимчивых видов птиц.
    - Птичий грипп встречается редко у людей, и чаще всего восприимчивы работники птицефабрик, лабораторий и убойных цехов.

  clinical_findings:
    - Инкубационный период: от нескольких часов до 7 дней.
    - Острое, подострое или хроническое течение.
    - Выраженная депрессия, потеря аппетита, водянистая диарея.
    - Кашель, чихание, хрипы, чрезмерное слезоотделение.
    - Снижение яйценоскости у кур.
    - Конъюнктива гиперемирована и отечна, иногда с кровоизлияниями.
    - Отекшие сережки с цианозом на концах и кровоизлияния на поверхности.
    - Отечные сережки, отек вокруг глаз, головы и шеи.
    - Взъерошенные перья и темная красная кожа.
    - Диффузные геморраги между суставами и лапками.
    - Кровь в клоаке.
    - Некоторые птицы могут восстановиться, даже если были сильно поражены.

  differential_diagnosis:
    - Холера птиц.
    - Хламидиоз.
    - Микоплазмоз.
    - Вилегенный висцеротропный Ньюкасл.

  diagnosis:
    laboratory_tests_list:
      - Вирусологические исследования – выявление вируса гриппа A путем посева на куриные эмбрионы.
      - Молекулярно-генетические методы – ПЦР (полимеразная цепная реакция) для детекции РНК вируса.
      - Серологические исследования – реакция торможения гемагглютинации (РТГА) для определения специфических антител.
      - ОТ-ПЦР в реальном времени – более точный метод обнаружения вируса.

    laboratory_findings:
      - Обнаружение вирусных белков или РНК методом ПЦР, что подтверждает присутствие вируса гриппа A.
      - Выделение вируса из пораженных органов, мазков из трахеи или клоаки, что указывает на активную инфекцию.
      - Обнаружение специфических антител методом серологического исследования (ИФА, РТГА, иммунодиффузия в агаровом геле).
      - Высокие титры вируса в почках при исследовании павших птиц, что указывает на возможное нефротропное действие вируса.
      - Присутствие множественных аминокислотных замен в сайте расщепления гемагглютинина (HA0), что характерно для высокопатогенных штаммов.
      - Выявление антигена вируса гриппа A в 15-минутных экспресс-тестах, хотя чувствительность таких тестов ограничена.
      - Вариабельность выявления антител у разных видов птиц: например, утки могут не вырабатывать преципитирующие антитела после заражения.
      - Применение РТ-ПЦР в реальном времени для быстрого выявления специфичных подтипов H5 и H7 и оценки их патогенности.
      - Обнаружение вируса методом амплификации на основе последовательности нуклеиновых кислот (NASBA), который позволяет детектировать вирус H5/H7 за 6 часов.

  postmortem_findings:
    - Геморрагии в мышцах и внутренних органах.
    - Обезвоживание.
    - В случае высокопатогенных вирусов наблюдается фибринозный экссудат в воздушных мешках, оводке, брюшной полости и перикардиальном мешке.
    - Воспаление конъюнктивы, трахеи и воздушных мешков.
    - Выраженная гиперемия мускулатуры.
    - Регрессия яичников у кур, находящихся в стадии яйцекладки.
    - Отек головы с гиперемией, кровоизлияниями и цианозом гребня, сережек и околоносовых пазух.
    - Везикулы и язвы на гребне.
    - Петехиальные и экхимозные геморраги в абдоминальном жире, различных серозных и слизистых поверхностях, сердце, желудке, зобе и тонкой кишке.
    - Лапки часто отечны с кровоизлияниями. Красное окрашивание голеней.
    - Тушки, пораженные птичьим гриппом, должны быть уничтожены.

  treatment: |
    - На данный момент специфической терапии для лечения птичьего гриппа не существует. 
    Лечение направлено на облегчение симптомов и улучшение условий для восстановления.

  prognosis: |
    Прогноз при высокопатогенной форме болезни часто неблагоприятный, особенно для восприимчивых видов птиц. 
    Смертность может достигать 100%. В случаях низкопатогенной формы возможен более благоприятный исход.

  prevention:
    - Во многих странах птичий грипп подлежит обязательной регистрации.
    - Контроль заболевания регламентируется местными нормативами.
    - В благополучных районах проводится мониторинг и санитарный убой инфицированных животных.
    - Карантинные меры включают ограничение перемещения птицы, дезинфекцию, контроль за здоровьем работников птицеводческих хозяйств.
    - Вспышки в России в 2022 году привели к массовому убою зараженных птиц на предприятиях.
    - Разработка новых вакцин и их применение позволяет контролировать распространение болезни.

  diagnostic_recommendations: |
    Для диагностики птичьего гриппа применяются молекулярно-генетические и серологические методы, 
    а также вирусологические исследования. Золотым стандартом считается выделение вируса путем посева 
    на куриные эмбрионы, однако метод требует значительного времени и лабораторных ресурсов. ПЦР 
    в реальном времени является наиболее чувствительным и быстрым способом выявления вирусной РНК, 
    позволяя идентифицировать высокопатогенные штаммы. Серологические исследования, включая реакцию 
    торможения гемагглютинации (РТГА) и иммуноферментный анализ (ИФА), позволяют определить 
    наличие антител к вирусу. Для подтверждения активной инфекции используются методы 
    экспресс-диагностики на основе выявления антигена. Лабораторные исследования включают анализ 
    крови, мазков из трахеи и клоаки, что позволяет точно определить наличие инфекции и ее тип.

  treatment_recommendations: |
    Специфической терапии против птичьего гриппа не существует, и лечение направлено на поддержку 
    организма и минимизацию клинических проявлений. Ветеринарные мероприятия включают изоляцию 
    заболевших птиц, обеспечение их достаточным количеством воды и питательных веществ, а также 
    контроль вторичных бактериальных инфекций с помощью антибиотиков. Вспышки высокопатогенного 
    птичьего гриппа требуют радикальных мер, включая ликвидацию инфицированных птиц с последующей 
    дезинфекцией помещений. Вакцинация может снизить уровень вирусоносительства в популяции, 
    но не исключает риск инфицирования.

  notes_on_clinical_findings: |
    Птичий грипп у домашних птиц проявляется выраженной депрессией, потерей аппетита, водянистой 
    диареей и респираторными симптомами, такими как кашель, чихание и хрипы. Характерны отеки 
    головы, гиперемия конъюнктивы, кровоизлияния на сережках и лапках. У кур наблюдается снижение 
    яйценоскости. В тяжелых случаях болезнь сопровождается высокой смертностью, особенно при 
    высокопатогенной форме вируса. Вскрытие павших птиц выявляет геморрагии в мышцах и внутренних 
    органах, обезвоживание и воспаление конъюнктивы, трахеи и воздушных мешков.
