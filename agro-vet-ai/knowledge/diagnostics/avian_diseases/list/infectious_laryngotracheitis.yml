infectious_laryngotracheitis:
  disease_name: Инфекционный ларинготрахеит, Infectious Laryngotracheitis (ILT), Avian Laryngotracheitis
  etiology:
    - Контагиозная вирусная болезнь, вызванная ДНК-содержащим вирусом семейства Herpesviridae, подсемейства Alphaherpesviridae.
    - Вирус имеет сферическую форму (до 100 нм), чувствителен к теплу и дезинфектантам, но устойчив в холодное время года.
    - Вирус может сохраняться в организме переболевших птиц до 2 лет.

  pathogenesis:
    - Вирус передаётся от больных и переболевших птиц, а также вакцинированных носителей.
    - Основные пути заражения: воздушно-капельный и контактный через инвентарь, корма, воду, персонал.
    - Вирус тропен к эпителию дыхательных путей, вызывая катаральное и геморрагическое воспаление трахеи.
    - В случае генерализации может проникать в кровь, поражая печень, селезёнку и кишечник.

  epidemiology:
    - Чаще болеют цыплята и молодые куры (3-9 месяцев).
    - Заболеваемость достигает 50-70%, смертность варьируется от 10 до 60% в зависимости от вирулентности штамма.
    - Вирус может распространяться на расстояние до 10 км воздушным путем.
    - Источником инфекции являются больные и переболевшие птицы, а также механические переносчики (крысы, дикие птицы).

  clinical_findings:
    - Инкубационный период: 2-30 дней.
    - Формы течения: сверхострое, острое, подострое, хроническое, абортивное.
    - Признаки: тяжелое дыхание, кашель с выделением крови, цианоз головы, выделения из глаз и ноздрей.
    - Возможны конъюнктивит, воспаление кишечника и снижение яйценоскости.

  differential_diagnosis:
    - Оспа птиц.
    - Инфекционный бронхит.
    - Респираторный микоплазмоз.
    - Болезнь Ньюкасла.
    - Заразный насморк.
    - Пастереллез.
    - Авитаминоз А.

  diagnosis:
    laboratory_tests_list:
      - Полимеразная цепная реакция (ПЦР) – основной метод диагностики, обладающий высокой чувствительностью.
      - Реакция нейтрализации вируса – используется для обнаружения антител в сыворотке.
      - Иммуноферментный анализ (ИФА) – применяется для выявления вирусных антигенов и антител.
      - Иммунофлуоресценция – выявление антигенов вируса в тканях трахеи.
      - Гистологическое исследование – обнаружение внутриядерных включений и синцитиальных клеток.
      - Выделение вируса – инокуляция эмбрионов куриных яиц или клеточных культур.

    laboratory_findings:
      - ПЦР выявляет вирусную ДНК в мазках из трахеи, гортани и конъюнктивы.
      - Реакция нейтрализации вируса показывает наличие специфических антител в сыворотке крови.
      - ИФА фиксирует антигены вируса в соскобах со слизистой трахеи.
      - Иммунофлуоресценция позволяет обнаружить вирусные антигены в эпителии трахеи.
      - Гистологическое исследование выявляет внутриядерные включения, характерные для герпесвирусов.
      - Выделение вируса на хориоаллантоисной оболочке приводит к образованию характерных поражений.

  postmortem_findings:
    - Геморрагическое и катаральное воспаление трахеи.
    - Образование фибринозных пробок в дыхательных путях.
    - Катарально-гнойный кератит и воспаление клоаки.

  treatment:
    - Специфическое лечение не разработано.
    - Поддерживающая терапия, предотвращение вторичных инфекций.

  prognosis:
    - Смертность варьируется от 10 до 60%, особенно высокая при сверхостром течении.
    - Переболевшая птица остается носителем вируса, что способствует стационарности инфекции.

  prevention:
    - Строгие меры биобезопасности.
    - Вакцинация птиц живыми и инактивированными вакцинами (Инновакс ILT, Нобилис ILT, Трахивакс).
    - Раздельное содержание птицы разного возраста.
    - Дезинфекция помещений, оборудования и инкубационных яиц.

  diagnostic_recommendations: |
    Диагноз ставится на основании клинических признаков, патологических изменений и лабораторных 
    исследований. Основные методы диагностики — ПЦР, серологические тесты и выделение вируса.

  treatment_recommendations: |
    Специфического лечения нет. Основное внимание уделяется профилактике вторичных инфекций и 
    поддерживающей терапии. Вакцинация остаётся основным методом предотвращения вспышек заболевания.

  notes_on_clinical_findings: |
    Заболевание сопровождается воспалением дыхательных путей, конъюнктивитом и поражением кишечника.
    Часто осложняется бактериальными инфекциями, что увеличивает смертность.
