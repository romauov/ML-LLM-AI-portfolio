infectious_bursal_disease:
  disease_name: Инфекционная бурсальная болезнь, болезнь Гумборо, инфекционный бурсит, инфекционный птичий нефроз, Infectious Bursal Disease (IBD), Gumboro Disease
  etiology:
    - Болезнь Гамборо вызывается РНК-содержащим безоболочечным вирусом семейства Birnaviridae.
    - Вирус ИББ обладает высокой устойчивостью во внешней среде, включая дезинфицирующие средства.
    - Возбудитель инфекционного бурсита птиц наиболее опасен для цыплят в возрасте от 2 до 20 недель.

  pathogenesis:
    - Вирус поражает фабрициеву сумку, вызывая её воспаление, а затем атрофию.
    - Разрушение лимфоцитов приводит к иммуносупрессии.
    - Основной путь заражения — через пищеварительный тракт.
    - Вирус распространяется по организму и достигает фабрициевой сумки.

  epidemiology:
    - Источником инфекции являются зараженные птицы.
    - Передача вируса происходит через инфицированные корма, воду, подстилку, оборудование.
    - Вирус передается механическими переносчиками (грызуны, мухи, клещи).

  clinical_findings:
    - Ослабленный иммунитет из-за снижения количества лимфоцитов.
    - Повышенная восприимчивость к вторичным инфекциям.
    - Дегидратация, потемнение и депигментация мышц.

  differential_diagnosis:
    - Инфекционный бронхит кур.
    - Болезнь Марека.
    - Болезнь Ньюкасла.

  diagnosis:
    laboratory_tests_list:
      - Гистопатологическое исследование.
      - Серологические исследования (AGID, ИФА, реакция нейтрализации вируса).
      - Выделение вируса на культуре клеток и эмбрионах.
      - Полимеразная цепная реакция (ОТ-ПЦР).
      - Иммунофлуоресценция.
      - Твердофазный иммуносорбентный анализ с захватом антигена (AC-ELISA).

    laboratory_findings:
      - Гистопатология: обнаружение атрофии фабрициевой сумки, лимфоцитарного истощения.
      - Серологические исследования: выявление антител к вирусу ИББ (ИФА, AGID).
      - Выделение вируса: культура клеток показывает цитопатический эффект.
      - ОТ-ПЦР: детекция РНК вируса.
      - Иммунофлуоресценция: специфическое свечение в инфицированных тканях.
      - AC-ELISA: наличие антигенов вируса в образцах бурсы.

  postmortem_findings:
    - Увеличенная фабрициева сумка, возможны кровоизлияния.
    - В хронической стадии — выраженная атрофия фабрициевой сумки.
    - Кровоизлияния в мышцы, бледные почки, увеличение селезёнки.

  treatment:
    - Специфического лечения нет.
    - Симптоматическая терапия.

  prognosis:
    - Высокая восприимчивость к вторичным инфекциям.

  prevention:
    - Вакцинация племенных птиц и молодняка.
    - Использование живых и инактивированных вакцин.
    - Строгий санитарный контроль и дезинфекция.

  diagnostic_recommendations: |
    Диагностика проводится на основании гистопатологических и серологических исследований,
    выделения вируса и ПЦР-диагностики.

  treatment_recommendations: |
    Специфического лечения нет, основное внимание уделяется профилактике и поддерживающей терапии.

  notes_on_clinical_findings: |
    Болезнь Гамборо характеризуется поражением фабрициевой сумки, что ведёт к её воспалению и атрофии.
    Вирус вызывает иммуносупрессию, повышая восприимчивость птицы к другим инфекциям.
