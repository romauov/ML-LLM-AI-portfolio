avian_metapneumovirus_infection:
  disease_name: Инфекция метапневмовируса птиц, Avian Metapneumovirus Infection, Turkey Rhinotracheitis Virus (TRTV)
  etiology:
    - Метапневмовирус птиц (aMPV), принадлежащий к подсемейству Pneumovirus семейства Paramyxoviridae.
    - Известно 4 подтипа вируса: A, B, C, D.
    - РНК-содержащий вирус семейства Paramyxoviridae (род Pneumovirus), возбудитель метапневмовирусной инфекции (МПВИ), синонимы: синдром большой головы цыплят, инфекционный ринотрахеит индеек.
    - Восприимчивы куры и индейки различных возрастов.

  pathogenesis:
    - Вирус передается горизонтально при контакте между птицами.
    - Инфицирование возможно через обсемененные объекты (люди, вода, оборудование).
    - Развивается воспаление дыхательных путей (ринит, трахеит, синусит).
    - При осложнении E. coli возможно развитие полисерозита.
    - Метапневмовирус проникает в организм преимущественно через слизистые оболочки респираторного тракта.
    - Попав воздушно-капельным путем в носовую полость, вирус начинает размножаться в эпителии верхних дыхательных путей, вызывая некроз клеток.
    - В ответ организм птицы выдает местную защитную реакцию в виде гиперемии и отека слизистой.
    - Развиваются воспалительные процессы в носовых пазухах (синусит) и конъюнктиве (конъюнктивит).
    - Вирус может проникать в кровеносную систему, поражая репродуктивный тракт, вызывая снижение яйценоскости.

  epidemiology:
    - Распространяется горизонтально через контакт между птицами.
    - Возможна передача через воду, оборудование и обслуживающий персонал.
    - Заболеваемость достигает 100%, смертность варьируется от 0,5% до 50%.
    - В стаде болезнь быстро распространяется в течение 2-3 дней.

  clinical_findings:
    - У молодых птиц: хрипы, чихание, выделения из носа, пенистый конъюнктивит.
    - Отек подглазничных и окологлазничных пазух, «опухшая голова».
    - У взрослых кур-несушек: снижение яйценоскости до 70%, ухудшение качества скорлупы.
    - У птиц старшего возраста: кашель, тремор головы.
    - В случае ассоциации с ИБК и другими инфекциями могут развиваться дополнительные воспалительные заболевания.
    - При тяжелой форме наблюдается синдром большой головы, что связано с проникновением E. coli и микроскопическими изменениями в организме.

  differential_diagnosis:
    - Инфекционный ларинготрахеит.
    - Респираторный микоплазмоз.
    - Инфекционный бронхит.
    - Реовирусные инфекции.

  diagnosis:
    laboratory_tests_list:
      - ПЦР-диагностика соскобов из трахеи и пазух носа.
      - Выделение вируса из носовых выделений.
      - Серологические методы (НВ, ИФА, МФА).
    laboratory findings:
      - Обнаружение вируса в образцах трахеи и пазух носа.
      - Выявление антител в сыворотке крови (учет поствакцинального ответа).

  postmortem_findings:
    - Ринит, трахеит, синусит.
    - Отек головы с гнойным или творожистым подкожным экссудатом.
    - При осложнении E. coli – полисерозит с фибринозным экссудатом.

  treatment:
    - Специфического лечения не разработано.
    - Поддерживающая терапия, включая антибиотики при вторичных инфекциях.
    - Нет общепринятых методов лечения, только контроль симптомов и поддержание здоровья птицы.

  prognosis:
    - Заболеваемость высокая (до 100%).
    - Мортальность варьируется от 0,5% до 50% в зависимости от осложнений.
    - При неблагоприятных условиях содержания, вторичных инфекциях и плохом иммунном ответе может быть высокая смертность.

  prevention:
    - Вакцинация живыми и инактивированными вакцинами.
    - Для птиц с коротким сроком жизни – только живые вакцины.
    - Для птиц с длительным сроком жизни – первичная вакцинация живыми вакцинами, ревакцинация инактивированными.
    - Соблюдение санитарных норм, исключение контакта с зараженными объектами.
    - Разработка и правильное применение схем вакцинации для защиты стада.

  diagnostic_recommendations: |
    Диагноз ставится на основании клинических признаков и подтверждается лабораторными методами, 
    такими как ПЦР-анализ, выделение вируса, серологические исследования. Важно учитывать 
    возможность присутствия антител после вакцинации и ассоциацию с другими инфекциями.

  treatment_recommendations: |
    Специфического лечения не существует. Поддерживающая терапия направлена на контроль вторичных 
    бактериальных инфекций с использованием антибиотиков. Важны меры профилактики и вакцинации.

  notes_on_clinical_findings: |
    Заболевание характеризуется респираторными симптомами у молодых птиц (чихание, хрипы, ринит, 
    пенистый конъюнктивит) и поражением дыхательных путей. У взрослых кур-несушек наблюдается 
    снижение яйценоскости и ухудшение качества скорлупы. Возможны осложнения, связанные с 
    вторичными инфекциями.
    Важно учитывать влияние неблагоприятных факторов окружающей среды, таких как нарушение 
    микроклимата, переуплотнение, а также наличие сопутствующих заболеваний.