avian_infectious_bronchitis:
  disease_name: Инфекционный бронхит птиц, Avian Infectious Bronchitis (IB), Infectious Bronchitis
  etiology:
    - Возбудитель - РНК-вирус из семейства Coronaviridae, рода Gammacoronavirus.
    - Вирус может мутировать и рекомбинировать, образуя новые серотипы.
    - Некоторые штаммы обладают нефропатогенностью, вызывая почечные поражения.
    - Вирус передается воздушно-капельным, алиментарным и контактным путями.

  pathogenesis:
    - Первичное инфицирование происходит через респираторные пути.
    - Вирус размножается в эпителии трахеи, бронхов и легких, вызывая воспаление.
    - При проникновении в кровь вирус распространяется в почки, кишечник, яичники и яйцеводы.
    - Поражение почек сопровождается интерстициальным нефритом, отложением уратов.
    - У несушек вирус вызывает дистрофические изменения яйцеводов, нарушая яйцекладку.

  epidemiology:
    - Заболевание распространено во всех странах с развитым птицеводством.
    - Цыплята особенно чувствительны, заражение возможно с первого дня жизни.
    - Вирус передается аэрозольно, через инфицированные корма, воду, инвентарь.
    - Основной резервуар - зараженные птицы, выделяющие вирус с выделениями.
    - Факторы риска: скученность, холод, плохая вентиляция, стрессовые условия.

  clinical_findings:
    - Респираторный_синдром:
      - Хрипы, чихание, затрудненное дыхание.
      - Выделения из носа, слезотечение, отек головы.
      - Цианоз гребня и сережек.
      - Открытое дыхание с вытянутой шеей.
      - Птицы становятся вялыми, малоподвижными.
      - Кашель, свисты и другие патологические шумы дыхания.
      - Воспаление воздушных мешков (аэросаккулит), осложняющее течение болезни.
    - Почечная_форма:
      - Усиленная жажда.
      - Обезвоживание, исхудание.
      - Белые уратные отложения в помете.
      - Быстрая смертность среди цыплят.
      - Отложения уратов в почечных канальцах (уратный нефроз).
    - Репродуктивные_нарушения:
      - Снижение яйценоскости до 70%.
      - Яйца с тонкой, деформированной скорлупой.
      - Яйца с водянистым белком.
      - Задержка яйцекладки.
      - Возможны кисты яйцеводов.
      - Обнаружение желтка или сформированного яйца в брюшной полости.
    - Нарушения_пищеварительной_системы:
      - Энтерит, диарея.
      - Снижение всасывания питательных веществ.
      - Общая слабость, угнетенное состояние, потеря массы тела.

  differential_diagnosis:
    - Оспа.
    - Инфекционный ларинготрахеит.
    - Респираторный микоплазмоз.
    - Болезнь Ньюкасла.
    - Синдром снижения яйценоскости (ССЯ-76).
    - Инфекционный кориза.

  diagnosis:
    laboratory_tests_list:
      - Электронная микроскопия.
      - РЗГА (реакция задержки гемагглютинации).
      - ИФА (иммуноферментный анализ).
      - ПЦР (полимеразная цепная реакция).
    laboratory_findings:
      - Электронная_микроскопия:
        - Визуализация вирусных частиц с короноподобными выступами.
      - РЗГА:
        - Рост титров антител в динамике заболевания.
      - ИФА:
        - Обнаружение антител к вирусу ИБК.
        - Максимальные титры через 6-8 недель.
      - ПЦР:
        - Выявление вирусного генома в органах и выделениях.
        - Различение серотипов вируса.
      - РТГА:
        - Определение уровня антител в крови.
        - Положительный результат указывает на перенесенную инфекцию.

  postmortem_findings:
    - Респираторная_форма:
      - Катаральный или серозный трахеит.
      - Отек и гиперемия легких.
      - Фибринозные налеты в бронхах.
      - Помутнение воздушных мешков.
      - Возможны желтые казеозные отложения в брюшных воздушных мешках.
    - Почечная_форма:
      - Уратные отложения в почечных канальцах.
      - Увеличенные, бледные почки.
      - Пятнистая «тигровая» окраска почечной ткани.
      - Возможны отложения уратов в виде кристаллов (уролиты) в почках.
    - Репродуктивные_поражения:
      - Воспаление яйцеводов.
      - Уменьшение фолликулов.
      - Сужение просвета яйцеводов.
      - Кистозные изменения яйцеводов.
      - Обнаружение сформированного яйца или желточного материала в брюшной полости.
    - Пищеварительная_система:
      - Энтерит, гипертрофия кишечных крипт.
      - Инфильтрация лимфоцитами и макрофагами.
      - Нарушение пищеварения, снижение ферментативной активности.

  treatment:
    - Специфического лечения нет, проводится поддерживающая терапия.
    - Антибактериальные препараты применяются для предотвращения вторичных инфекций.
    - Применяются иммуномодуляторы, витамины.
    - Птицам обеспечивают теплое содержание, хорошее питание и чистую воду.

  prognosis:
    - Зависит от возраста птицы, вирулентности штамма, наличия вторичных инфекций.
    - Летальность может достигать 70% в тяжелых случаях.
    - Восстановление репродуктивной функции у несушек занимает 4-6 недель.

  prevention:
    - Жесткие меры биобезопасности.
    - Вакцинация живыми и инактивированными вакцинами.
    - Использование нескольких серотипов в вакцинации для охвата разных вариантов вируса.
    - Контроль условий содержания, вентиляции, температуры.
    - Карантин и санитарные мероприятия при вспышках инфекции.

  diagnostic_recommendations: |
    Диагностика инфекционного бронхита кур основана на лабораторных методах, поскольку клинические 
    признаки неспецифичны. Основным методом является полимеразная цепная реакция с обратной 
    транскрипцией (ОТ-ПЦР), позволяющая выявить генетический материал вируса в пораженных органах 
    и выделениях. Этот метод обладает высокой чувствительностью и специфичностью, а также позволяет 
    идентифицировать серотип вируса. Серологические методы, такие как иммуноферментный анализ (ИФА) 
    и реакция торможения гемагглютинации (РТГА), используются для оценки иммунного ответа, однако 
    они требуют анализа парных проб для точности. Электронная микроскопия и методы выделения вируса 
    в эмбрионах кур полезны, но применяются реже из-за трудоемкости. Оптимальной стратегией является 
    сочетание ОТ-ПЦР для подтверждения наличия вируса и серологических тестов для оценки динамики инфекции

  treatment_recommendations: |
    Специфического лечения инфекционного бронхита кур не существует, поэтому терапия направлена на 
    поддержание состояния птицы и снижение риска вторичных инфекций. Антибиотики применяются для 
    предотвращения бактериальных осложнений, особенно при поражении дыхательных путей. Использование 
    иммуномодуляторов и витаминов способствует укреплению иммунной системы. Важную роль играет 
    поддержание оптимальных условий содержания, включая контроль температуры, влажности и качества 
    вентиляции. Обеспечение доступа к чистой воде и питательному корму необходимо для ускорения 
    восстановления птицы. Основное внимание уделяется профилактике, так как заболевание легко 
    распространяется и может привести к значительным экономическим потерям

  notes_on_clinical_findings: |
    Инфекционный бронхит кур проявляется преимущественно респираторными симптомами, включая хрипы, 
    кашель, чихание, затрудненное дыхание и выделения из носа. При нефропатогенных штаммах отмечаются 
    признаки поражения почек, такие как усиленная жажда, обезвоживание, белые уратные отложения в 
    помете и повышенная смертность среди молодняка. У несушек заболевание приводит к резкому снижению 
    яйценоскости, а также к изменению качества яиц - скорлупа становится тонкой и деформированной, 
    а белок водянистым. Возможны патологические изменения яйцеводов, включая кисты и накопление 
    желточного материала в брюшной полости. Поражения пищеварительной системы проявляются энтеритом 
    и диареей, что способствует снижению массы тела птицы и общей слабости
