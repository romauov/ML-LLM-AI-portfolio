coccidiosis:
  disease_name: Кокцидиоз птиц, Coccidiosis, Avian Coccidiosis
  etiology:
    - Кокцидиоз вызывается одноклеточными паразитами рода Eimeria.
    - У кур описано не менее 9 видов Eimeria, наиболее значимые: E. acervulina, E. brunetti, E. maxima, E. necatrix, E. tenella.
    - Различные виды кокцидий отличаются по локализации в кишечнике, форме ооцист и характеру поражений.
    - Кокцидии строго специфичны для видов хозяев: кокцидии кур не заражают индеек и наоборот.

  pathogenesis:
    - Инфекция реализуется фекально-оральным путем.
    - Спорозоиты высвобождаются после попадания ооцист в организм, вызывая разрушение кишечных клеток.
    - В зависимости от вида Eimeria, паразитирование может происходить в эпителии или подэндотелиальном слое, что влияет на тяжесть инфекции.
    - Цикл развития завершается через 4-8 дней, ооцисты выделяются с фекалиями.
    - Влажная среда (20-30°C) способствует споруляции ооцист за 12-30 часов.

  epidemiology:
    - Основной путь передачи – заглатывание спорулированных ооцист с загрязнённым кормом, водой или подстилкой.
    - Инкубационный период составляет 4-7 суток.
    - Болезнь чаще проявляется весной и летом у птицы, выращиваемой на выгуле.
    - В закрытых помещениях вспышки могут происходить круглогодично.
    - Заболевание особенно опасно для молодняка и ослабленных птиц (например, при болезни Марека или инфекционной бурсальной болезни).

  clinical_findings:
    - Вялость, угнетённое состояние.
    - Потеря аппетита или полное его отсутствие.
    - Снижение массы тела, отставание в росте.
    - Бледность гребня и серёжек (анемия), сухая кожа.
    - Взъерошенные перья, скучивание, опущенные крылья.
    - Обезвоживание.
    - Различные формы диареи:
      - Кровянистая (тяжёлые формы, E. tenella, E. necatrix).
      - Слизистая, светло-коричневая (E. brunetti).
      - Зелёная или коричневатая жидкая (общий симптом).
    - Ускоренное дыхание, тахикардия.
    - В тяжёлых случаях – высокая смертность.

  differential_diagnosis:
    - Некротический энтерит.
    - Колибактериоз.
    - Гистомоноз.
    - Сальмонеллёз.
    - Аскаридоз.
    - Капилляриоз.
    - Лейкоз.
    - Геморрагическая болезнь.

  diagnosis:
    laboratory_tests_list:
      - Клинический анализ крови.
      - Биохимический анализ крови (белки, мочевая кислота).
      - Подсчёт ооцист методом МакМастера.
      - Микроскопия мазков кала.
      - Гистология кишечника.
      - Постмортальное исследование.

    laboratory_findings:
      - Клинический_анализ_крови:
        - Анемия: снижение эритроцитов и гемоглобина.
        - Лейкоцитоз с эозинофилией.
      - Биохимический_анализ:
        - Гипопротеинемия, снижение альбуминов.
        - Повышенная мочевая кислота.
        - Нарушение электролитного баланса (↓Na, ↓K).
        - Повышение АЛТ, АСТ (повреждение печени).
      - Микроскопия_кала:
        - Обнаружение ооцист Eimeria.
      - Метод_МакМастера:
        - Высокая концентрация ооцист.
      - Гистология_кишечника:
        - Отёк, некроз эпителия, воспалительные инфильтраты.

  postmortem_findings:
    - Обезвоживание, снижение массы тела.
    - Воспаление и утолщение стенок кишечника.
    - Петехиальные кровоизлияния на слизистой.
    - Кровь, слизь или некротические массы в кишечнике.
    - Увеличенные слепые отростки (E. tenella).
    - Белесые поперечные поражения в двенадцатиперстной кишке (E. acervulina).
    - Фибринозное воспаление кишечника (E. brunetti).
    - Гематомегалия (в тяжёлых случаях).
    - Гистология: некроз эпителия, воспалительные инфильтраты.

  treatment:
    - Основной метод – применение кокцидиостатиков.
    - Ионофорные (монензин, салиномицин, лазалоцид) и химические (толтразурил, диклазурил, ампролиум).
    - Применение в корме или воде в соответствии с инструкцией.
    - Ампролиум – 5–7 дней в питьевой воде.
    - Толтразурил уничтожает все стадии паразита при однократном применении.
    - Витаминные комплексы (A, K) для поддержки организма.
    - Санитарные меры для предотвращения повторного заражения.

  prognosis:
    - Зависит от вида возбудителя, дозы заражения и иммунного статуса птицы.
    - Лёгкие случаи могут проходить самостоятельно.
    - Без лечения смертность 25-50%.
    - Заболевание приводит к задержке роста, снижению продуктивности.
    - Перенёсшие инфекцию птицы остаются ослабленными.
    - Значительные экономические потери (смертность, затраты на лечение, снижение продуктивности).

  prevention:
    - Биобезопасность в птичниках.
    - Регулярная дезинфекция.
    - Контроль влажности и вентиляции.
    - Ограничение контакта с дикими птицами и грызунами.
    - Кокцидиостатики в корме.
    - Ротация препаратов для предотвращения устойчивости.
    - Вакцинация молодняка.
    - Качественная подстилка, регулярная замена.
    - Изоляция заражённых особей.
    - Полноценное кормление, витамины A, K для иммунитета.

  diagnostic_recommendations: |
    Диагностика кокцидиоза включает несколько методов, которые позволяют точно определить наличие 
    и степень заражения. Основным методом является исследование кала, которое проводится с 
    использованием метода МакМастера. Этот метод позволяет количественно определить количество 
    ооцист в кале, что является важным показателем для оценки степени заражения. Метод доступен 
    и относительно дешев, что делает его предпочтительным для широкого использования.
    Также важным методом является анализ подстилки, который позволяет оценить уровень загрязнения 
    окружающей среды ооцистами. Этот метод особенно полезен для определения тенденций в 
    распространении инфекции на ферме. Патологическое вскрытие является еще одним важным методом 
    диагностики, который позволяет оценить степень повреждения кишечника и определить вид кокцидий. 
    Этот метод требует наличия специалиста и оборудования, но дает наиболее точные результаты.
    Дифференциальная диагностика проводится для исключения других заболеваний с похожими 
    симптомами, таких как некротический энтерит или сальмонеллез. Тест чувствительности к 
    антикокцидийным препаратам (AST) используется для определения эффективности различных 
    препаратов против конкретных штаммов кокцидий, что важно для выбора оптимального лечения.

  treatment_recommendations: |
    Лечение кокцидиоза включает использование кокцидиостатиков, которые могут быть как 
    ионофорными, так и синтетическими. Ионофорные антибиотики, такие как монензин, салиномицин 
    и лазалоцид, широко используются благодаря их эффективности и относительно низкой стоимости. 
    Они действуют на ранние стадии развития паразита, предотвращая его размножение.
    Синтетические препараты, такие как диклазурил и робенидин, также эффективны, но их 
    использование ограничено из-за быстрого развития резистентности у паразитов. Вакцинная 
    защита является альтернативным методом профилактики и лечения, особенно для племенных 
    стад и кур-несушек. Вакцины содержат ослабленные штаммы кокцидий, что позволяет выработать 
    иммунитет у птиц.
    В случае клинического кокцидиоза применяются терапевтические препараты, такие как ампролиум 
    и толтразурил, которые вводятся через питьевую воду. Эти препараты эффективны для быстрого 
    снижения симптомов и предотвращения дальнейшего распространения инфекции. Важно учитывать 
    период ожидания препаратов, особенно при использовании в финишном корме.

  notes_on_clinical_findings: |
    Клинические проявления кокцидиоза зависят от вида кокцидий и степени заражения. У 
    цыплят-бройлеров часто наблюдаются такие симптомы, как вялость, снижение аппетита и 
    привеса, а также взъерошенные перья. В случае острого кокцидиоза слепой кишки (E. tenella) 
    может наблюдаться кровавый понос, что является серьезным признаком заболевания.
    При кокцидиозе тонкой кишки (E. necatrix, E. maxima) содержимое кала может быть слизистым 
    и липким, иногда с примесью крови. Субклинические формы кокцидиоза, хотя и не сопровождаются 
    явными симптомами, приводят к значительному ухудшению производственных показателей, таких 
    как конверсия корма и привесы.
    Важным клиническим признаком является компенсирующий рост, когда после раннего инфицирования 
    темпы роста восстанавливаются, но общая продуктивность стада снижается. Это особенно заметно 
    при сравнении инфицированных и здоровых стад в разные периоды их жизни.
