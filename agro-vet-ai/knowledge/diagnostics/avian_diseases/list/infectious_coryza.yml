infectious_coryza:
  disease_name: Инфекционный насморк птиц, Infectious Coryza, Avibacterium paragallinarum Infection
  etiology:
    - Возбудитель болезни — Haemophilus paragallinarum, мелкие грамотрицательные аэробные коккоподобные палочки.
    - Спор не образуют, неподвижны, вызывают гемолиз эритроцитов.
    - По антигенным свойствам подразделяются на 3 серологические группы: A, B, C с серовариантами.
    - Возбудитель болезни — Avibacterium paragallinarum, грамотрицательная, плейоморфная, неподвижная палочка, не образующая каталазу, микр аэрофильная, требующая для культуры никотинамид аденин динуклеотид (V-фактор).
    - В культуре на кровяном агаре с колонией стафилококков, выделяющих V-фактор, появляются спутанные колонии в форме росы.

  pathogenesis:
    - Возбудитель вызывает воспаление слизистых оболочек, конъюнктивит, ринит и отек тканей.
    - Неполное кормление и дефицит витамина А могут способствовать развитию болезни.

  epidemiology:
    - Источником инфекции являются больные и переболевшие птицы.
    - Заражение происходит аэрогенным и алиментарным путем.
    - Болезнь чаще встречается осенью, зимой и ранней весной.
    - Заражение происходит через инфицированный корм, предметы ухода и инвентарь.
    - Птицы всех возрастов подвержены болезни, особенно старшие.
    - Инкубационный период составляет 1–3 дня, заболевание длится 2–3 недели.
    - Заболевание может длиться дольше при наличии сопутствующих инфекций, таких как микоплазмоз.

  clinical_findings:
    - Отек слизистых оболочек носовой полости, гортани, трахеи.
    - Серозно-фибринозный ринит с выделениями из носа.
    - Серозный и серозно-гнойный конъюнктивит.
    - Атрофия глазного яблока и деформация костей черепа.
    - Катаральный стоматит, фарингит, истощение.
    - В тяжелых случаях — отек одного или обоих подглазничных синусов с отечностью окружающих тканей.
    - Снижение активности, выделения из носа, чихание.

  differential_diagnosis:
    - Респираторный микоплазмоз.
    - Инфекционный бронхит.
    - Птичий холера.
    - Ларинготрахеит.
    - Болезнь Ньюкасла.
    - Инфекционный бронхит.
    - Авиационный грипп.
    - Вирус метапневмовируса птиц (синдром отекшей головы).
    - Дефицит витамина А.

  diagnosis:
    laboratory_tests_list:
      - Выделение возбудителя из патматериала.
      - Идентификация возбудителя по антигенным свойствам.
      - Серологические исследования.
      - ПЦР-исследования.
    laboratory_findings:
      - Выделение Haemophilus paragallinarum.
      - Наличие специфических антител к Haemophilus paragallinarum.
      - ПЦР-тестирование инфраорбитального синуса у живых птиц дает более точные результаты, чем бактериологическое исследование.

  postmortem_findings:
    - Отек слизистых оболочек носовой полости, гортани и трахеи.
    - Отек и воспаление глазных и подкожных тканей.
    - Атрофия глазного яблока.

  treatment:
    - Антибиотики и сульфаниламидные препараты.
    - Лечение на основе результатов подтитров на выделенного возбудителя.
    - Проведение курса антибактериальной терапии.
    - Использование эритромицина и окситетрациклина.
    - В тяжелых случаях, даже при улучшении, болезнь может вернуться после прекращения лечения.
    - Применение сульфаниламидов, таких как триметоприм-сульфаметоксазол.

  prognosis:
    - Заболеваемость может составить 40-70%, летальность 10-35%.
    - Лечение эффективно, но возможны рецидивы после отмены антибиотиков.
    - У птиц, заболевших гемофилезом, может наблюдаться задержка в яйценоскости у молодок и снижение яйценоскости у продуктивных кур.

  prevention:
    - Раздельное содержание птиц разных возрастных групп.
    - Соблюдение плотности посадки и воздушно-влажностного режима.
    - Вакцинация птицы инактивированными вакцинами.
    - Профилактическая вакцинация в случае возникновения болезни.
    - Надежные биозащитные меры и вакцинация.

  diagnostic_recommendations: |
    Для точной диагностики требуется выделить возбудителя из патматериала и провести серологические 
    исследования. Важно провести идентификацию серологической группы возбудителя.

  treatment_recommendations: |
    Для эффективного лечения используйте антибиотики и сульфаниламидные препараты.
    Лечение следует проводить на основе результатов тестов на возбудителя.

  notes_on_clinical_findings: |
    Гемофилез кур протекает с выраженным ринитом и конъюнктивитом.
    Птицы часто истощены, имеют отеки в области глаз и слизистых оболочек.
