newcastle_disease:
  disease_name: Ньюкаслская болезнь, Newcastle Disease (ND), Avian Paramyxovirus Type 1 Infection
  etiology:
    - Высококонтагиозное вирусное заболевание, вызываемое вирулентным РНК-вирусом семейства Paramyxoviridae.
    - Вирус обладает оболочкой с выступами в форме нитей.
    - Чувствителен к липидосодержащим веществам, детергентам, формальдегиду и окислителям.
    - Относительно термостабилен.
    - Различают штаммы низкой вирулентности (лентогенные), средней вирулентности (мезогенные) и высокой вирулентности (велогенные).
    - VVND (Velogenic Viscerotropic Newcastle disease) – наиболее вирулентная форма, вызывает геморрагические поражения ЖКТ, выраженную депрессию и гибель до проявления клинических признаков.
    - Вирус устойчив к экстремальным значениям pH и температуры, сохраняется в костном мозге убитой птицы в течение нескольких недель.

  epidemiology:
    - Болезнь распространяется быстро, признаки появляются у всего стада через 2-12 дней (в среднем 5).
    - Пути_передачи:
      - Контактно (с пометом, пухом, перьями, подстилкой, скорлупой, обувью, транспортом).
      - Алиментарно.
      - Через насекомых и грызунов.
      - Аэрогенно (через кашель, хрипы и дыхательные выделения).
      - Через птиц-резервуаров, включая перелетных.
      - Возможна передача воздушными потоками.

  clinical_findings:
    - Болезнь поражает широкий спектр видов птиц, включая домашних и диких.
    - Инкубационный период – от 2 до 15 дней.
    - Первые признаки – угнетение, сонливость, отказ от корма, потеря аппетита.
    - Респираторные_симптомы:
      - Одышка, клокотание, выделения изо рта.
      - Воспаление трахеи и бронхов.
      - Выделения из глаз, конъюнктивит.
      - Отек головы и нижнего века.
      - Потемнение кожи вокруг глаз ("черный глаз").
    - ЖКТ-симптомы:
      - Водянистый понос зеленовато-белого цвета.
      - Переполненный зоб.
      - Кровавый понос (при тяжелых формах).
    - Неврологические_симптомы:
      - Параличи, парезы крыльев и ног.
      - Дрожание головы, судороги.
      - Нарушение координации движений, круговые движения, искривление шеи (тортиколлис).
      - У взрослых птиц болезнь часто начинается с нервных нарушений, у цыплят – с респираторных симптомов.
    - Хроническая_форма:
      - Длительное снижение яйценоскости.
      - Воспаление дыхательных путей (катаральное воспаление).
      - Возможно развитие перитонита из-за изменения формы яиц.

  diagnosis:
    laboratory_tests_list:
      - Полимеразная цепная реакция (ПЦР)
      - ОТ-ПЦР в реальном времени
      - Серологические_тесты:
        - Реакция торможения гемагглютинации (РТГА)
        - Иммуноферментный анализ (ИФА)
        - Реакция нейтрализации вируса
      - Выделение вируса в куриных эмбрионах
      - Филогенетический анализ последовательности F-гена
      - Определение индекса интрацеребральной патогенности (ICPI)
      - Определение среднего времени гибели эмбрионов (MDT)
      - Внутривенный индекс патогенности (IVPI)
      - Гемагглютинационный тест
      - Иммунофлуоресценция

    laboratory_findings:
      - Выделение вируса из мозга, трахеи, селезенки, печени и крови.
      - ПЦР-анализ:
        - Выявление РНК вируса.
        - ОТ-ПЦР используется для быстрого обнаружения вируса.
      - Серологические_тесты_(РТГА, ИФА):
        - Определение уровня антител.
        - Возможны ложноположительные результаты из-за перекрестной реактивности с другими вирусами.
      - Иммунофлуоресценция:
        - Обнаружение антигена вируса в тканях.
      - Гемагглютинационный_тест:
        - Используется для предварительного выявления вируса.
      - Гистопатология:
        - Кровоизлияния в слизистой ЖКТ.
        - Некрозы в печени и лимфоидных органах.
      - Биохимические_изменения:
        - Повышение уровня ферментов печени.
        - Лейкоцитоз или лейкопения.
        - Увеличение концентрации белка в сыворотке крови.

  postmortem_findings:
    - Острое_течение:
      - Перострые случаи могут не иметь видимых поражений.
      - Кровоизлияния и эрозии в слизистой пищевода.
      - Геморрагии в трахее и бронхах.
      - Отек и гиперемия головного мозга.
      - Геморрагии по всему желудочно-кишечному тракту, склонные к изъязвлению.
      - Воспаление и поражение тонзиллярных крипт и пейеровых бляшек.
      - Кровоизлияния в слизистую оболочку железистого желудка, особенно на границе с пищеводом.
      - Отеки и геморрагии яичников.
    - Хроническое_течение:
      - Катаральное воспаление дыхательных путей.
      - Отек соединительных тканей.

  differential_diagnosis:
    - Инфекционный ларинготрахеит.
    - Пастереллез (куриная холера).
    - Грипп (особенно высокопатогенный птичий грипп - HPAI).
    - Респираторный микоплазмоз.
    - Инфекционный бронхит.
    - Оспа (дифтерическая форма).
    - Орнитоз (пситтакоз).
    - Энцефаломиелит птиц.
    - Дефицит витамина E.
    - Болезнь Марека.
    - Болезнь Пачеко у попугаев.

  prevention:
    - Высокий уровень биобезопасности.
    - Соблюдение санитарных норм.
    - Вакцинация:
      - Нобилис Ма5+Clone 30, Нобилис® ND С2, Нобилис Clone 30 – иммунитет через 5-7 дней.
      - Инновакс ND – рекомбинантная вакцина, снижает риск побочных эффектов.
      - Нобилис® RT+IBmulti+G+ND – защита от нескольких инфекций.